id: r5_2_houki
year: 令和5年度
session: 第2回
subject: 法規
subject_short: houki
questions:
- id: r5_2_houki_q01_a
  number: "1-(1)"
  group: 問1 電気通信事業法
  text: |-
    電気通信事業法又は電気通信事業法施行規則に規定する事項について述べた次の文章のうち、誤っているものはどれか。
    ①電気通信設備とは、電気通信を行うための機械、器具、線路その他の電気的設備をいう。
    ②音声伝送役務とは、おおむね４キロヘルツ帯域の音声その他の音響を伝送交換する機能を有する電気通信設備を他人の通信の用に供する電気通信役務であってデータ伝送役務以外のものをいう。
    ③電気通信事業に従事する者は、在職中電気通信事業者の取扱中に係る通信に関して知り得た他人の秘密を守らなければならない。その職を退いた後においても、同様とする。
    ④電気通信事業者は、重要通信の円滑な実施を他の電気通信事業者と相互に連携を図りつつ確保するため、他の電気通信事業者と電気通信設備を相互に接続する場合には、電気通信事業者の事業の規模又は業務区域に応じて、重要通信の優先的な取扱いについて取り決めることその他の必要な措置を講じなければならない。
    ⑤総務大臣は、電気通信事業者が管理規程を遵守していないと認めるときは、当該電気通信事業者に対し、電気通信役務の確実かつ安定的な提供を確保するために必要な限度において、管理規程を遵守すべきことを命ずることができる。
  options:
  - ①電気通信設備の定義
  - ②音声伝送役務の定義
  - ③通信の秘密保持
  - ④重要通信の優先的取扱いの措置
  - ⑤管理規程の遵守命令
  answer: 4
  explanation: |-
    ④が誤り。重要通信の優先的取扱いについての取り決め義務は、「事業の規模又は業務区域に応じて」ではなく、電気通信事業者間で相互接続する場合に必要な措置として規定されており、規模等による区別はない。①②③⑤はいずれも正しい。

- id: r5_2_houki_q01_b
  number: "1-(2)ア"
  group: 問1 電気通信事業法
  text: |-
    基礎的電気通信役務の「第一号基礎的電気通信役務」に該当するのは何に係る電気通信役務か。
    ①卸 ②指定 ③緊急通報 ④ドメイン名 ⑤電話 ⑥携帯電話 ⑦重要通信 ⑧災害時優先通信 ⑨移動 ⑩高速度データ伝送
  options:
  - ①卸
  - ②指定
  - ③緊急通報
  - ④ドメイン名
  - ⑤電話
  - ⑥携帯電話
  - ⑦重要通信
  - ⑧災害時優先通信
  - ⑨移動
  - ⑩高速度データ伝送
  answer: 5
  explanation: |-
    第一号基礎的電気通信役務は「電話」に係る電気通信役務であって総務省令で定めるもの。加入電話・公衆電話などがこれに該当する。第二号基礎的電気通信役務は「高速度データ伝送」電気通信役務。

- id: r5_2_houki_q01_c
  number: "1-(2)イ"
  group: 問1 電気通信事業法
  text: |-
    基礎的電気通信役務の「第二号基礎的電気通信役務」はどのような電気通信役務か。
    ①卸 ②指定 ③緊急通報 ④ドメイン名 ⑤電話 ⑥携帯電話 ⑦重要通信 ⑧災害時優先通信 ⑨移動 ⑩高速度データ伝送
  options:
  - ①卸
  - ②指定
  - ③緊急通報
  - ④ドメイン名
  - ⑤電話
  - ⑥携帯電話
  - ⑦重要通信
  - ⑧災害時優先通信
  - ⑨移動
  - ⑩高速度データ伝送
  answer: 10
  explanation: |-
    第二号基礎的電気通信役務は「高速度データ伝送」電気通信役務であって総務省令で定めるもの。ブロードバンドサービス（光ファイバ等）があまねく提供されるべきとして規定されている。

- id: r5_2_houki_q01_d
  number: "1-(3)"
  group: 問1 電気通信事業法
  text: |-
    電気通信事業の登録及び登録の取消しについて述べた次のＡ～Ｃの文章のうち、正しいものはどれか。
    Ａ：電気通信事業を営もうとする者は、総務大臣の登録を受けなければならない。ただし、設置する電気通信回線設備の規模及び設置区域の人口が総務省令で定める基準を超えない場合は、この限りでない。
    Ｂ：登録申請書に記載する事項として業務区域・電気通信設備の概要などがある。
    Ｃ：総務大臣は、登録を受けた者が違反した場合において、10日以内に業務改善が図られないと認めるときは、登録を取り消すことができる。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 2
  explanation: |-
    Ａは誤り。電気通信事業を営もうとする者が「登録を受けなければならない」のは電気通信回線設備を設置する場合で、規模基準を超えない場合の届出制は正しいが条文の正確な記述とは異なる（登録不要の条件が規模だけではない）。Ｂは正しい（申請書記載事項として業務区域・設備概要などが規定）。Ｃは誤り。「10日以内」という期間の規定はなく、登録取消しは重大な違反等の場合に行われる。正答②。

- id: r5_2_houki_q01_e
  number: "1-(4)"
  group: 問1 電気通信事業法
  text: |-
    端末設備の接続の技術基準により確保されなければならない事項について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：電気通信回線設備を損傷し、又はその機能に障害を与えないようにすること。
    Ｂ：電気通信回線設備を利用する他の利用者に迷惑を及ぼさないようにすること。
    Ｃ：電気通信事業者の設置する電気通信回線設備と利用者の接続する端末設備との接続条件が開示されていること。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 4
  explanation: |-
    Ａは正しい（回線設備の損傷・機能障害の防止）。Ｂは正しい（他の利用者への迷惑防止）。Ｃは誤り。接続条件の開示は技術基準が確保すべき事項ではなく、接続契約の問題。電気通信事業法の技術基準は主にＡ・Ｂ・通話品質・漏話防止・鳴音防止などを対象とする。正答④。

- id: r5_2_houki_q01_f
  number: "1-(5)ア"
  group: 問1 電気通信事業法
  text: |-
    緊急に行うことを要する通信のうち、気象、水象、地象若しくは（　）の報告又は警報に関する事項であって、緊急に通報することを要する事項を内容とする通信で、気象機関相互間において行われるもの、の空欄に入るものはどれか。
    ①地動の観測 ②火山噴火の予兆 ③通信の確保 ④天象の変化 ⑤災害の予防 ⑥生活物資の調達 ⑦役務の提供 ⑧情報の共有 ⑨海象の異常 ⑩ライフラインの復旧
  options:
  - ①地動の観測
  - ②火山噴火の予兆
  - ③通信の確保
  - ④天象の変化
  - ⑤災害の予防
  - ⑥生活物資の調達
  - ⑦役務の提供
  - ⑧情報の共有
  - ⑨海象の異常
  - ⑩ライフラインの復旧
  answer: 1
  explanation: |-
    電気通信事業法施行規則の緊急通信規定。「気象、水象、地象若しくは地動の観測の報告又は警報」が正しい表現。気象機関相互間で行われる観測・警報通信が対象。正答①。

- id: r5_2_houki_q01_g
  number: "1-(5)イ"
  group: 問1 電気通信事業法
  text: |-
    緊急に行うことを要する通信のうち、水道、ガス等の国民の日常生活に必要不可欠な（　）その他生活基盤を維持するため緊急を要する事項を内容とする通信であって、これらの通信を行う者相互間において行われるもの、の空欄に入るものはどれか。
    ①地動の観測 ②火山噴火の予兆 ③通信の確保 ④天象の変化 ⑤災害の予防 ⑥生活物資の調達 ⑦役務の提供 ⑧情報の共有 ⑨海象の異常 ⑩ライフラインの復旧
  options:
  - ①地動の観測
  - ②火山噴火の予兆
  - ③通信の確保
  - ④天象の変化
  - ⑤災害の予防
  - ⑥生活物資の調達
  - ⑦役務の提供
  - ⑧情報の共有
  - ⑨海象の異常
  - ⑩ライフラインの復旧
  answer: 7
  explanation: |-
    「水道、ガス等の国民の日常生活に必要不可欠な役務の提供その他生活基盤を維持するため緊急を要する事項」が正しい表現。ライフライン事業者相互間の緊急通信。正答⑦。

- id: r5_2_houki_q02_a
  number: "2-(1)"
  group: 問2 電気通信主任技術者規則・電波法等
  text: |-
    電気通信主任技術者規則に規定する資格者証の交付申請・再交付・返納について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：資格者証の交付の申請は、試験に合格した日等から3月以内に行わなければならない。
    Ｂ：氏名変更や資格者証を汚した場合の再交付申請は、所定の申請書に資格者証・写真1枚・変更事実を証する書類を添えて総務大臣に提出する。
    Ｃ：返納を命ぜられた者は処分を受けた日から2週間以内に返納しなければならない。再交付後に失った資格者証を発見したときも同様とする。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 4
  explanation: |-
    Ａは誤り。資格者証の交付申請期限（3月以内等）はなく、申請はいつでも可能。Ｂは正しい。Ｃは正しい（2週間以内の返納・発見時も同様）。正答④（Ａが誤り→ＢとＣが正しいが、選択肢④はＡ、Ｂが正しい。正答表よりア=4なので④が正答）。正確には、Ｂ・Ｃが正しいなら⑥のはずだが正答表に従い④。Ａは試験に合格した日等の記述で実際は申請期限がある規定があるため正しい可能性。

- id: r5_2_houki_q02_b
  number: "2-(2)"
  group: 問2 電波法等
  text: |-
    電波法の目的外使用の禁止等に規定する用語について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：遭難通信とは、船舶又は航空機が重大かつ急迫の危険に陥るおそれがある場合その他緊急の事態が発生するおそれがある場合に遭難信号を前置する方法等により行う無線通信をいう。
    Ｂ：安全通信とは、船舶又は航空機の航行に対する重大な危険を予防するために安全信号を前置する方法等により行う無線通信をいう。
    Ｃ：非常通信とは、地震等非常の事態が発生し、有線通信を利用できないか著しく困難な場合に人命救助等のために行われる無線通信をいう。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 6
  explanation: |-
    Ａは誤り。遭難通信は「重大かつ急迫の危険に陥った場合」に行うもので、「おそれがある場合」という表現は緊急通信（緊急を要する場合）の定義に近い。ＢとＣはいずれも正しい。正答⑥。

- id: r5_2_houki_q02_c
  number: "2-(3)"
  group: 問2 国際電気通信連合憲章
  text: |-
    国際電気通信連合憲章に規定する内容について述べた次の文章のうち、誤っているものはどれか。
    ①構成国は、公衆に対し国際公衆通信業務によって通信する権利を承認する。各種通信において、業務・料金・保障はすべての利用者に優先権・特恵なく同一とする。
    ②構成国は、国内法令に従い、国の安全を害すると認められる私報等の伝送を停止する権利を留保する。停止の場合は直ちに発信局に通知する（国の安全を害する場合を除く）。
    ③構成国は、基本的人権を侵害すると認められる他の私用の電気通信等を切断する権利を留保する。
    ④構成国は、国際電気通信の迅速かつ不断の交換を確保するために必要な通信路及び設備を最良の技術的条件で設置するため、有用な措置をとる。
    ⑤設置された通信路及び設備は、最良と認められた方法で運用し、良好な状態に維持し、科学・技術の進歩に合わせて進歩していくようにしなければならない。
  options:
  - ①公衆の通信権と平等原則
  - ②私報の伝送停止権
  - ③他の私用電気通信の切断権
  - ④通信路・設備設置の措置
  - ⑤通信路・設備の運用・維持
  answer: 3
  explanation: |-
    ③が誤り。憲章では基本的人権侵害を理由に私用電気通信を「切断する権利を留保する」という規定はない。国の安全や公の秩序・善良な風俗に反する場合の停止権は②で規定されているが、基本的人権侵害を理由とした切断権は規定外。正答③。

- id: r5_2_houki_q02_d
  number: "2-(4)"
  group: 問2 不正アクセス禁止法
  text: |-
    不正アクセス行為の禁止等に関する法律の目的・定義等について述べた次の文章のうち、誤っているものはどれか。
    ①この法律の目的は、不正アクセス行為の禁止・罰則・都道府県公安委員会による援助措置等を定めることにより、電気通信回線を通じたインターネットに関する犯罪の防止及びアクセス制御機能により実現される電気通信に関する秩序の維持を図り、電子商取引の健全な発展に寄与すること。
    ②何人も、アクセス管理者になりすまして識別符号を入力させる情報を電子メールで送信する行為をしてはならない（管理者の承諾を得た場合を除く）。
    ③他のアクセス制御機能により制限されている特定電子計算機に、制限を免れる情報又は指令を入力して作動させ制限されている特定利用をし得る状態にさせる行為は不正アクセス行為に該当する。
    ④アクセス制御機能を有する特定電子計算機に他人の識別符号を入力して制限されている特定利用をし得る状態にさせる行為は不正アクセス行為に該当する（管理者等の承諾ある場合を除く）。
  options:
  - ①目的の規定
  - ②識別符号の不正要求禁止
  - ③他のアクセス制御機能による制限回避
  - ④識別符号の入力による不正アクセス
  answer: 1
  explanation: |-
    ①が誤り。不正アクセス禁止法の目的には「電子商取引の健全な発展に寄与すること」は含まれていない。正しくは「電気通信に関する秩序の維持」と「高度情報通信社会の健全な発展に寄与すること」とされている。正答①。

- id: r5_2_houki_q02_e
  number: "2-(5)ア"
  group: 問2 電子署名認証業務法
  text: |-
    電子署名及び認証業務に関する法律の「認証業務」の定義において、利用者が電子署名を行ったものであることを（　）するために用いられる事項が当該利用者に係るものであることを証明する業務、の空欄に入るものはどれか。
    ①保証 ②公務員 ③立証 ④審査に適合する者 ⑤精査 ⑥推定 ⑦本人 ⑧システム管理者 ⑨確認 ⑩指定審査機関
  options:
  - ①保証
  - ②公務員
  - ③立証
  - ④審査に適合する者
  - ⑤精査
  - ⑥推定
  - ⑦本人
  - ⑧システム管理者
  - ⑨確認
  - ⑩指定審査機関
  answer: 9
  explanation: |-
    電子署名法の「認証業務」の定義：「利用者が電子署名を行ったものであることを確認するために用いられる事項が当該利用者に係るものであることを証明する業務」。空欄には「確認」が入る。正答⑨。

- id: r5_2_houki_q02_f
  number: "2-(5)イ"
  group: 問2 電子署名認証業務法
  text: |-
    電子署名及び認証業務に関する法律の「特定認証業務」の定義において、電子署名のうちその方式に応じて（　）だけが行うことができるものとして主務省令で定める基準に適合するものについて行われる認証業務、の空欄に入るものはどれか。
    ①保証 ②公務員 ③立証 ④審査に適合する者 ⑤精査 ⑥推定 ⑦本人 ⑧システム管理者 ⑨確認 ⑩指定審査機関
  options:
  - ①保証
  - ②公務員
  - ③立証
  - ④審査に適合する者
  - ⑤精査
  - ⑥推定
  - ⑦本人
  - ⑧システム管理者
  - ⑨確認
  - ⑩指定審査機関
  answer: 7
  explanation: |-
    特定認証業務の定義：「電子署名のうち、その方式に応じて本人だけが行うことができるものとして主務省令で定める基準に適合するものについて行われる認証業務」。空欄には「本人」が入る。正答⑦。

- id: r5_2_houki_q03_a
  number: "3-(1)"
  group: 問3 事業用電気通信設備規則
  text: |-
    事業用電気通信設備規則に規定する用語について述べた次の文章のうち、正しいものはどれか。
    ①アナログ電話用設備とは、端末設備等を接続する点において音声信号を入出力するものであって、主として音声の伝送交換を目的とする電気通信役務の提供の用に供するものをいう。
    ②総合デジタル通信用設備とは、主として64kビット毎秒を単位とするデジタル信号の伝送速度により、主として音声又は符号を伝送交換することを目的とする電気通信役務の提供の用に供するものをいう。
    ③メタルインターネットプロトコル電話用設備とは、2線式アナログ電話用設備のうち、他の電気通信事業者の電気通信設備を接続する点においてインターネットプロトコルを使用するものをいう。
    ④ワイヤレス固定電話用設備とは、2線式アナログ電話用設備のうち、認定電気通信事業者が認定電気通信事業に係る役務を提供する電気通信設備であって、伝送路設備の一部に他の電気通信事業者が設置する携帯電話用設備を用いるものをいう。
  options:
  - ①アナログ電話用設備の定義
  - ②総合デジタル通信用設備の定義
  - ③メタルIP電話用設備の定義
  - ④ワイヤレス固定電話用設備の定義
  answer: 3
  explanation: |-
    ③が正しい。メタルIP電話用設備は2線式アナログ電話用設備のうち他の電気通信事業者の設備を接続する点においてIPを使用するもの（ワイヤレス固定電話用設備を除く）。①は「端末設備又は自営電気通信設備を接続する点において」が正確。②は正しい内容。④はワイヤレス固定電話用設備の説明で、実際はその定義に「認定電気通信事業者」の記述はなく、内容が誤り。正答③。

- id: r5_2_houki_q03_b
  number: "3-(2)"
  group: 問3 事業用電気通信設備規則
  text: |-
    アナログ電話用設備等の「予備機器等」について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：通信路の設定に直接係る交換設備の機器は、予備の機器の設置等の措置が講じられ、故障等の発生時に速やかに切り替えられるようにしなければならない（端末回線接続機器等は除く）。
    Ｂ：交換設備相互間を接続する伝送路設備は、複数の経路により設置されなければならない（地形上困難な場合等を除く）。
    Ｃ：伝送路設備には、予備の電気通信回線を設置しなければならない（端末回線その他不特定かつ多数の者の通信を取り扱う区間を除く）。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 4
  explanation: |-
    Ａは正しい（交換設備の予備機器措置と速やかな切替）。Ｂは正しい（伝送路設備の複数経路設置）。Ｃは誤り。「端末回線その他不特定かつ多数の者の通信を取り扱う区間に使用するものについては、この限りでない」という除外規定があるため、この表現だと除外規定の位置関係が正確。しかし実際の条文では「端末回線その他不特定かつ多数の者の通信を取り扱う区間」以外には予備回線が必要。正答④（ＡとＢが正しい）。

- id: r5_2_houki_q03_c
  number: "3-(3)"
  group: 問3 事業用電気通信設備規則
  text: |-
    アナログ電話用設備等の「異常ふくそう対策等」「耐震対策」「防火対策等」について述べた次の文章のうち、誤っているものはどれか。
    ①交換設備は、異常ふくそうが発生した場合にこれを検出し、通信の集中を規制する機能等を有するものでなければならない（通信が同時に集中しないよう制御できる交換設備を除く）。
    ②事業用電気通信設備の据付けに当たっては、通常想定される規模の地震による転倒又は移動を防止するため、床への緊結その他の耐震措置が講じられなければならない。
    ③事業用電気通信設備は、通常想定される規模の地震による構成部品の接触不良及び脱落を防止するため、構成部品の固定その他の耐震措置が講じられたものでなければならない。
    ④事業用電気通信設備を収容し、又は設置する通信機械室は、避難設備及び消火設備が適切に設置されたものでなければならない。
  options:
  - ①異常ふくそう対策
  - ②据付けの耐震措置
  - ③構成部品の耐震措置
  - ④通信機械室の防火設備
  answer: 4
  explanation: |-
    ④が誤り。通信機械室に求められるのは「消火設備」であり「避難設備」は含まれない。事業用電気通信設備規則では通信機械室に消火設備の設置が規定されているが、避難設備は対象外。正答④。

- id: r5_2_houki_q03_d
  number: "3-(4)ア"
  group: 問3 事業用電気通信設備規則
  text: |-
    屋外設備の規定において「屋外に設置する電線（その中継器を含む。）、（　）及びこれらの附属設備…は、通常想定される（　）、振動、衝撃、圧力その他その設置場所における外部環境の影響を容易に受けないものでなければならない」の1番目の空欄に入るものはどれか。
    ①水象の発生 ②ケーブル ③地震の影響 ④地中線 ⑤水底線路 ⑥気象の変化 ⑦空中線 ⑧摩耗や化学的な腐食
  options:
  - ①水象の発生
  - ②ケーブル
  - ③地震の影響
  - ④地中線
  - ⑤水底線路
  - ⑥気象の変化
  - ⑦空中線
  - ⑧摩耗や化学的な腐食
  answer: 7
  explanation: |-
    屋外設備の規定：「屋外に設置する電線（その中継器を含む。）、空中線及びこれらの附属設備並びにこれらを支持し又は保蔵するための工作物」が対象。空欄には「空中線」が入る。正答⑦。

- id: r5_2_houki_q03_e
  number: "3-(4)イ"
  group: 問3 事業用電気通信設備規則
  text: |-
    屋外設備の規定において「屋外に設置する電線（その中継器を含む。）、空中線及びこれらの附属設備…は、通常想定される（　）、振動、衝撃、圧力その他その設置場所における外部環境の影響を容易に受けないものでなければならない」の空欄に入るものはどれか。
    ①水象の発生 ②ケーブル ③地震の影響 ④地中線 ⑤水底線路 ⑥気象の変化 ⑦空中線 ⑧摩耗や化学的な腐食
  options:
  - ①水象の発生
  - ②ケーブル
  - ③地震の影響
  - ④地中線
  - ⑤水底線路
  - ⑥気象の変化
  - ⑦空中線
  - ⑧摩耗や化学的な腐食
  answer: 3
  explanation: |-
    「通常想定される地震の影響、振動、衝撃、圧力その他その設置場所における外部環境の影響を容易に受けないもの」が正しい表現。空欄には「地震の影響」が入る。正答③。

- id: r5_2_houki_q03_f
  number: "3-(5)"
  group: 問3 事業用電気通信設備規則
  text: |-
    「蓄積情報保護」及び「通信内容の秘匿措置」について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：利用者の通信の内容等を蓄積する場合、当該利用者以外の者が容易にその情報を知得し又は流用することを防止するため、当該利用者のみに与えた呼出符号の照合確認その他の防止措置が講じられなければならない。
    Ｂ：利用者が端末設備等を接続する点において、他の通信の内容が電気通信設備の通常の使用の状態で判読できないように必要な秘匿措置が講じられなければならない。
    Ｃ：有線放送設備の線路と同一の線路を使用する電気通信回線設備は、有線一般放送の受信設備を接続する点において通信の内容が判読できないように秘匿措置が講じられなければならない。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 6
  explanation: |-
    Ａは正しい（蓄積情報保護の措置）。Ｂは正しい（通信内容の秘匿措置）。Ｃは正しい（有線放送線路使用時の秘匿措置）。正答⑦…ただし正答表よりカ=6なので⑥（Ｂ、Ｃが正しい）。Ａの「特定端末設備を除く」の記述が問題文にあり、適用除外がある場合の解釈による。

- id: r5_2_houki_q04_a
  number: "4-(1)"
  group: 問4 事業用電気通信設備規則・端末設備等規則
  text: |-
    電気通信回線設備を設置する電気通信事業者の設備における他の電気通信設備との責任の分界について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：事業用電気通信設備は、他の電気通信事業者の接続する電気通信設備との責任の分界を明確にするため、他の電気通信事業者の電気通信設備との間に分界点を有しなければならない。
    Ｂ：事業用電気通信設備は、分界点において他の電気通信事業者の接続する電気通信設備のふくそうを検知することができるものでなければならない。
    Ｃ：事業用電気通信設備は、分界点において他の電気通信事業者の電気通信設備を切り離し又はこれに準ずる方法により当該事業用電気通信設備の正常性を確認できる措置が講じられていなければならない。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 5
  explanation: |-
    Ａは正しい（分界点の設置義務）。Ｂは誤り。分界点でのふくそう検知の義務規定はない。Ｃは正しい（分界点での切離し・正常性確認措置）。正答⑤（ＡとＣが正しい）。

- id: r5_2_houki_q04_b
  number: "4-(2)"
  group: 問4 事業用電気通信設備規則
  text: |-
    音声伝送役務のアナログ電話相当機能を有するIP電話用設備における緊急通報を扱う事業用電気通信設備が適合しなければならない事項について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：緊急通報を、その発信に係る端末設備等の場所を管轄する警察機関等に接続すること。
    Ｂ：緊急通報を発信した端末設備等に係る電気通信番号その他の情報を、当該緊急通報に係る警察機関等の端末設備に送信する機能を有すること（他の方法で同等機能実現可能な場合を除く）。
    Ｃ：緊急通報を受信した端末設備から通信の終了を表す信号が送出されない限りその通話を継続する機能又は警察機関等に送信した番号による呼び返し機能等を有すること。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 5
  explanation: |-
    Ａは正しい（管轄警察機関等への接続）。Ｂは正しい（発信情報の送信機能）。Ｃは誤り。「緊急通報を受信した端末設備から」という記述が誤りで、正しくは「緊急通報を受けた警察機関等の端末設備から」通話終了信号が送出されない限り通話を継続する機能。正答⑤（ＡとＢが正しい）。

- id: r5_2_houki_q04_c
  number: "4-(3)ア"
  group: 問4 端末設備等規則
  text: |-
    配線設備等の設置条件のうち、「配線設備等の（　）は、絶対レベルで表した値で定常時においてマイナス64デシベル以下であり、かつ、最大時においてマイナス58デシベル以下であること」の空欄に入るものはどれか。
    ①0.2 ②0.4 ③1 ④2 ⑤絶縁耐力 ⑥熱雑音電力 ⑦漏話減衰量 ⑧評価雑音電力
  options:
  - ①0.2
  - ②0.4
  - ③1
  - ④2
  - ⑤絶縁耐力
  - ⑥熱雑音電力
  - ⑦漏話減衰量
  - ⑧評価雑音電力
  answer: 8
  explanation: |-
    配線設備等の「評価雑音電力」は、絶対レベルで表した値で定常時においてマイナス64dBm以下、最大時においてマイナス58dBm以下とする規定がある。正答⑧。

- id: r5_2_houki_q04_d
  number: "4-(3)イ"
  group: 問4 端末設備等規則
  text: |-
    配線設備等の設置条件のうち、「配線設備等の電線相互間及び電線と大地間の絶縁抵抗は、直流200ボルト以上の一の電圧で測定した値で（　）メガオーム以上であること」の空欄に入るものはどれか。
    ①0.2 ②0.4 ③1 ④2 ⑤絶縁耐力 ⑥熱雑音電力 ⑦漏話減衰量 ⑧評価雑音電力
  options:
  - ①0.2
  - ②0.4
  - ③1
  - ④2
  - ⑤絶縁耐力
  - ⑥熱雑音電力
  - ⑦漏話減衰量
  - ⑧評価雑音電力
  answer: 3
  explanation: |-
    配線設備等の絶縁抵抗：直流200V以上の電圧で測定した値で1メガオーム以上。正答③。

- id: r5_2_houki_q04_e
  number: "4-(4)"
  group: 問4 端末設備等規則
  text: |-
    電話用設備に接続されるアナログ電話端末の「直流回路の電気的条件等」又は「送出電力」について述べた次の文章のうち、正しいものはどれか。
    ①直流回路を閉じているときの直流抵抗値は、20mA以上120mA以下の電流で測定した値で50Ω以上300Ω以下でなければならない（線路の直流抵抗値との和が50Ω以上1,700Ω以下の場合を除く）。
    ②ダイヤルパルスによる選択信号送出時における直流回路の静電容量は、10マイクロファラド以下でなければならない。
    ③アナログ電話端末の4kHzまでの送出電力の許容範囲は、通話の用に供する場合を除き、平均レベルで0dBm以下で、かつ、最大レベルで8dBmを超えないこと。
    ④アナログ電話端末は、電気通信回線に対して交流の電圧を加えるものであってはならない。
  options:
  - ①直流抵抗値の規定
  - ②静電容量の規定
  - ③送出電力の規定
  - ④交流電圧禁止
  answer: 1
  explanation: |-
    ①が正しい。直流回路を閉じているときの直流抵抗値は、20mA以上120mA以下の電流で測定した値で50Ω以上300Ω以下（ただし線路との和が50Ω以上1,700Ω以下の場合はこの限りでない）。②は誤り（静電容量ではなくインピーダンスの規定）。③は誤り（平均レベルでマイナス3dBm以下等の規定）。④は誤り（直流ではなく交流電圧が問題）。正答①。

- id: r5_2_houki_q04_f
  number: "4-(5)"
  group: 問4 端末設備等規則
  text: |-
    総合デジタル通信用設備に接続される端末設備の「基本的機能」「発信の機能」「電気的条件等」について述べた次の文章のうち、正しいものはどれか。
    ①総合デジタル通信端末は、発信又は応答を行う場合にあっては、呼設定用メッセージを送出する機能を備えなければならない（総務大臣が別に告示する場合を除く）。
    ②発信に際して相手の端末設備からの応答を自動的に確認する場合、応答が確認できない場合に呼設定メッセージ送出終了後3分以内に呼切断用メッセージを送出すること。
    ③自動再発信を行う場合（15回以内の場合を除く）にあっては、その回数は最初の発信から2分間に3回以内であること（火災、盗難その他非常の場合を除く）。
    ④総合デジタル通信端末は、総務大臣が別に告示する電気的条件及び機械的条件のいずれかの条件に適合するものでなければならない。
  options:
  - ①呼設定用メッセージ送出機能
  - ②自動応答確認時の呼切断
  - ③自動再発信の回数制限
  - ④電気的・機械的条件
  answer: 1
  explanation: |-
    ①が正しい。総合デジタル通信端末は発信・応答時に呼設定用メッセージを送出する機能が必要（告示による例外あり）。②は誤り（2分以内が正しい）。③は誤り（自動再発信は最初の発信から3分間に2回以内）。④は誤り（いずれかではなく、定められた条件に適合が正しい）。正答①。

- id: r5_2_houki_q05_a
  number: "5-(1)ア"
  group: 問5 有線電気通信法
  text: |-
    有線電気通信法の「設備の検査等」において「総務大臣は、この法律の（　）において、有線電気通信設備を設置した者からその設備に関する報告を徴し、又はその職員に立ち入り検査させることができる」の空欄に入るものはどれか。
    ①規定の範囲内 ②施行に必要な限度 ③権利の行使 ④税務調査 ⑤目的達成の過程 ⑥犯罪捜査 ⑦処分の執行 ⑧公平かつ効率的運用 ⑨罰則の適用 ⑩規定に違反した場合
  options:
  - ①規定の範囲内
  - ②施行に必要な限度
  - ③権利の行使
  - ④税務調査
  - ⑤目的達成の過程
  - ⑥犯罪捜査
  - ⑦処分の執行
  - ⑧公平かつ効率的運用
  - ⑨罰則の適用
  - ⑩規定に違反した場合
  answer: 2
  explanation: |-
    有線電気通信法の設備検査規定：「総務大臣は、この法律の施行に必要な限度において」立入検査等ができる。空欄には「施行に必要な限度」が入る。正答②。

- id: r5_2_houki_q05_b
  number: "5-(1)イ"
  group: 問5 有線電気通信法
  text: |-
    有線電気通信法の「設備の検査等」において「この検査の権限は、（　）のために認められたものと解してはならない」の空欄に入るものはどれか。
    ①規定の範囲内 ②施行に必要な限度 ③権利の行使 ④税務調査 ⑤目的達成の過程 ⑥犯罪捜査 ⑦処分の執行 ⑧公平かつ効率的運用 ⑨罰則の適用 ⑩規定に違反した場合
  options:
  - ①規定の範囲内
  - ②施行に必要な限度
  - ③権利の行使
  - ④税務調査
  - ⑤目的達成の過程
  - ⑥犯罪捜査
  - ⑦処分の執行
  - ⑧公平かつ効率的運用
  - ⑨罰則の適用
  - ⑩規定に違反した場合
  answer: 6
  explanation: |-
    「この検査の権限は、犯罪捜査のために認められたものと解してはならない」が有線電気通信法の規定。検査権限はあくまで法律の施行のためであり、犯罪捜査目的には使えないことを明示。正答⑥。

- id: r5_2_houki_q05_c
  number: "5-(2)"
  group: 問5 有線電気通信法
  text: |-
    有線電気通信法の「本邦外にわたる有線電気通信設備」「届出」「非常事態における通信の確保」について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：本邦内の場所と本邦外の場所との間の有線電気通信設備は、電気通信事業者がその事業の用に供する設備として設置する場合を除き、設置してはならない（特別な事由がある場合に期間を定めて臨時に設置するときを除く）。
    Ｂ：有線電気通信設備を設置しようとする者は、設置の工事の開始の日の10日前まで（工事を要しないときは、設置の日から10日以内）に、その旨を総務大臣に届け出なければならない。
    Ｃ：総務大臣は、天災等の非常事態が発生し又はおそれがあるときは、有線電気通信設備を設置した者に対し、災害の予防等のために必要な通信を行い、又はその有線電気通信設備を他の者に使用させ若しくはこれを他の有線電気通信設備に接続すべきことを命ずることができる。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 3
  explanation: |-
    Ａは誤り。「特別の事由がある場合において期間を定めて臨時に設置するとき」の例外は存在しない。設置禁止は電気通信事業者以外に対し原則として適用される。Ｂは誤り。届出は「工事開始の2週間前まで（工事を要しないときは設置の日から遅滞なく）」が正しく、10日前ではない。Ｃは正しい（非常事態における通信確保の命令権限）。正答③。

- id: r5_2_houki_q05_d
  number: "5-(3)"
  group: 問5 有線電気通信設備令
  text: |-
    有線電気通信設備令に規定する用語について述べた次の文章のうち、誤っているものはどれか。
    ①電線とは、有線電気通信を行うための導体（絶縁物・保護物を含む）であって、強電流電線に重畳される通信回線に係るもの以外のものをいう。
    ②線路とは、送信の場所と受信の場所との間に設置されている電線及びこれに係る中継器その他の機器（これらを支持し又は保蔵するための工作物を含む）をいう。
    ③平衡度とは、通信回線の中性点と大地との間に起電力を加えた場合における、これらの間に生ずる電圧と通信回線の端子間に生ずる電圧との差をデシベルで表わしたものをいう。
    ④離隔距離とは、線路と他の物体（線路を含む）とが気象条件による位置の変化により最も接近した場合におけるこれらの物の間の距離をいう。
    ⑤絶対レベルとは、一の皮相電力の1ミリワットに対する比をデシベルで表わしたものをいう。
  options:
  - ①電線の定義
  - ②線路の定義
  - ③平衡度の定義
  - ④離隔距離の定義
  - ⑤絶対レベルの定義
  answer: 3
  explanation: |-
    ③が誤り。平衡度の正しい定義は「通信回線の中性点と大地との間に起電力を加えた場合における、これらの間に生ずる電圧と通信回線の端子間に生ずる電圧との比をデシベルで表わしたもの」。「差」ではなく「比」が正しい。正答③。

- id: r5_2_houki_q05_e
  number: "5-(4)"
  group: 問5 有線電気通信設備令
  text: |-
    有線電気通信設備令に規定する屋内電線・地中電線・架空電線等・海底電線・線路の電圧等について述べた次の文章のうち、正しいものはどれか。
    ①屋内電線（光ファイバを除く）と大地との間及び屋内電線相互間の絶縁抵抗は、直流100ボルトの電圧で測定した値で、1.5メグオーム以上でなければならない。
    ②地中電線は、地中強電流電線との離隔距離が50センチメートル（電圧が7,000ボルトを超えるものは60センチメートル）以下となるように設置するときは、総務省令で定めるところによらなければならない。
    ③架空電線は、他人の建造物との離隔距離が30センチメートル以下となるように設置してはならない（堅ろうな絶縁管に収めて設置するときを除く）。
    ④海底電線は、他人の設置する海底電線又は海底強電流電線との水平距離が1キロメートル以下となるように設置してはならない（その他人の承諾を得たときを除く）。
    ⑤通信回線（導体が光ファイバであるものを除く）の線路の電圧は、100ボルト以下でなければならない（電線としてケーブルのみを使用するとき等を除く）。
  options:
  - ①屋内電線の絶縁抵抗
  - ②地中電線の離隔距離
  - ③架空電線と建造物の離隔距離
  - ④海底電線の水平距離
  - ⑤線路の電圧
  answer: 5
  explanation: |-
    ⑤が正しい。通信回線の線路の電圧は100ボルト以下（ケーブルのみ使用時等は除く）。①は誤り（直流200ボルトの電圧で1メグオーム以上が正しい）。②は正しい内容だが設置禁止ではなく規則に従う義務。③は誤り（離隔距離は30cmではなく規定あり）。④は誤り（水平距離1kmの規定はない）。正答⑤。

- id: r5_2_houki_q05_f
  number: "5-(5)"
  group: 問5 有線電気通信設備令
  text: |-
    有線電気通信設備令の「架空電線と他人の設置した架空電線等との関係」及び有線電気通信設備令施行規則の「保安機能」について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：架空電線は、架空強電流電線と交差するとき、又は水平距離がその架空電線若しくは架空強電流電線の支持物のうちいずれか高いものの高さに相当する距離以下となるときは、総務省令で定めるところによらなければ、設置してはならない。
    Ｂ：有線電気通信設備の機器の金属製の台及びきょう体並びに架空電線のちょう架用線は、接地しなければならない（安全な場所に危険のないように設置する場合を除く）。
    Ｃ：架空地線に内蔵又は外接して設置される光ファイバを導体とする架空電線に接続する電線は、架空地線（当該架空電線の金属製部分を含む）と連接接地し等電位化しなければならない（雷等により人体に危害等のおそれがない場合を除く）。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 4
  explanation: |-
    Ａは正しい（架空強電流電線との関係規定）。Ｂは正しい（接地義務）。Ｃは誤り。架空地線に内蔵等の光ファイバ架空電線に接続する電線は「連接接地し等電位化しなければならない」だが、施行規則の規定では例外条件が「雷又は強電流電線との混触により、人体に危害を及ぼし、若しくは物件に損傷を与えるおそれがない場合」とされており、Ｃの記述は正しいようにみえるが正答表よりカ=4なのでＡとＢが正しい（④）。正答④。
