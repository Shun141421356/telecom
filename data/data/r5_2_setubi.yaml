questions:
- id: r5_2_setubi_q01_a
  number: "1-(1)ア"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    中継光伝送の再生中継方式と線形中継方式について述べた次の文章の空欄(ア)に入るものはどれか。
    「中継光伝送は、等化増幅、（ア）及び識別再生を行う再生中継と、光信号の等化増幅のみを行う線形中継の二つの方式に大別される。再生中継方式は中継区間で生ずる光信号波形の劣化は累積しないが、（ア）によって抽出される出力波の位相のずれに起因する（イ）の増大などが生ずる。」
    ①量子化雑音 ②保留時間 ③ラベリング ④フィルタリング ⑤ASE雑音 ⑥補間雑音 ⑦ジッタ ⑧リターンロス ⑨符号間干渉 ⑩AGC ⑪リタイミング ⑫マイクロベンディングロス
  options:
  - ①量子化雑音
  - ②保留時間
  - ③ラベリング
  - ④フィルタリング
  - ⑤ASE雑音
  - ⑥補間雑音
  - ⑦ジッタ
  - ⑧リターンロス
  - ⑨符号間干渉
  - ⑩AGC
  - ⑪リタイミング
  - ⑫マイクロベンディングロス
  answer: 11
  explanation: |-
    再生中継では「等化増幅」「リタイミング（タイミング抽出）」「識別再生」の3つを行う。リタイミングにより位相のずれに起因するジッタが累積する。正答⑪。

- id: r5_2_setubi_q01_b
  number: "1-(1)イ"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    再生中継方式において、リタイミングによって抽出される出力波の位相のずれに起因して増大するものはどれか。
    ①量子化雑音 ②保留時間 ③ラベリング ④フィルタリング ⑤ASE雑音 ⑥補間雑音 ⑦ジッタ ⑧リターンロス ⑨符号間干渉 ⑩AGC ⑪リタイミング ⑫マイクロベンディングロス
  options:
  - ①量子化雑音
  - ②保留時間
  - ③ラベリング
  - ④フィルタリング
  - ⑤ASE雑音
  - ⑥補間雑音
  - ⑦ジッタ
  - ⑧リターンロス
  - ⑨符号間干渉
  - ⑩AGC
  - ⑪リタイミング
  - ⑫マイクロベンディングロス
  answer: 7
  explanation: |-
    リタイミングで抽出されるクロックの位相ずれが累積することで「ジッタ（タイミングの揺らぎ）」が増大する。正答⑦。

- id: r5_2_setubi_q01_c
  number: "1-(1)ウ"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    線形中継方式において、光信号増幅に伴い発生して累積するものはどれか。
    ①量子化雑音 ②保留時間 ③ラベリング ④フィルタリング ⑤ASE雑音 ⑥補間雑音 ⑦ジッタ ⑧リターンロス ⑨符号間干渉 ⑩AGC ⑪リタイミング ⑫マイクロベンディングロス
  options:
  - ①量子化雑音
  - ②保留時間
  - ③ラベリング
  - ④フィルタリング
  - ⑤ASE雑音
  - ⑥補間雑音
  - ⑦ジッタ
  - ⑧リターンロス
  - ⑨符号間干渉
  - ⑩AGC
  - ⑪リタイミング
  - ⑫マイクロベンディングロス
  answer: 5
  explanation: |-
    線形中継（光増幅中継）では光ファイバ増幅器（EDFA等）でのASE雑音（Amplified Spontaneous Emission：自然放出光増幅雑音）が累積し受信特性が劣化する。正答⑤。

- id: r5_2_setubi_q01_d
  number: "1-(2)"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    デジタル信号の多重化技術について述べた次の文章のうち、正しいものはどれか。
    ①TDMでは複数のデジタル信号を時間的に少しずつずらして規則正しく配列し、特定パターンのFCSを付加して同期をとる方法が用いられている。
    ②CDMでは、チャネルごとに異なる搬送波を用いて演算処理した多重化信号を伝送する技術が用いられており、受信側では逆の演算処理でチャネルごとの信号を取り出せる。
    ③WDMのうちDWDMのチャネル間の波長間隔はCWDMと比較して広い。
    ④CWDMは一般に多重化する光信号の波長数が数波長から10数波長程度の伝送に用いられる。
  options:
  - ①TDMとFCS
  - ②CDMと搬送波演算
  - ③DWDMの波長間隔
  - ④CWDMの波長数
  answer: 4
  explanation: |-
    ④が正しい。CWDM（粗波長分割多重）は波長間隔が広く（20nm間隔）、多重化する波長数は数波長から10数波長程度。①TDMの同期にFCSではなくフレーム同期パターンを使う。②はCDMではなくCDMAの説明で内容も誤り。③DWDMのチャネル間隔はCWDMより狭い。正答④。

- id: r5_2_setubi_q01_e
  number: "1-(3)"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    光ファイバの非線形光学効果について述べた次の文章のうち、誤っているものはどれか。
    ①高強度の光が光ファイバに入射したとき、光強度に依存して光ファイバの屈折率が変化する現象は、光弾性効果といわれる。
    ②光が光ファイバに入射したとき、その光の強度変化により生ずる屈折率変化で光の位相が変化する現象は、自己位相変調といわれる。
    ③波長の異なる二つの光が光ファイバに入射したとき、一方の光の強度変化により生ずる屈折率変化で他方の光の位相が変化する現象は、相互位相変調といわれる。
    ④波長の異なる三つの光が光ファイバに入射したとき、干渉により入射光とは波長の異なる四つめの光が発生する現象は、四光波混合といわれる。
  options:
  - ①光弾性効果（高強度光と屈折率変化）
  - ②自己位相変調
  - ③相互位相変調
  - ④四光波混合
  answer: 1
  explanation: |-
    ①が誤り。光強度に依存して屈折率が変化する現象は「光カー効果」であり、「光弾性効果」ではない。光弾性効果は機械的応力により屈折率が変化する現象。②③④はいずれも正しい。正答①。

- id: r5_2_setubi_q01_f
  number: "1-(4)"
  group: 問1 中継光伝送・多重化・PON
  text: |-
    PONシステムの種類と特徴について述べた次の文章のうち、誤っているものはどれか。
    ①G-PONは、伝送フレーム形式にGTCフレームを採用し、上りと下りの最大伝送速度がギガビットクラスの光アクセスシステムであり、WDM方式を用いることにより1心の光ファイバで双方向同時に通信できるシステムである。
    ②GE-PONでは、OLT配下の全ONUに対して同一の下り信号が送信される。各ONUは自分宛のフレームをLLIDといわれる識別子を用いて判別する。
    ③GE-PONでは、複数のONUで共用している上り帯域を効率的に使用するため、各ONUのトラヒックの有無にかかわらず固定的に帯域を割り当てるDBAといわれる機能が用いられる。
    ④10G-EPONの規格には、同一光スプリッタ配下に10G-EPON用のONUとGE-PON用のONUのどちらでも接続できる仕様がある。
  options:
  - ①G-PONの特徴
  - ②GE-PONの下り信号とLLID
  - ③GE-PONのDBA機能
  - ④10G-EPONの互換仕様
  answer: 3
  explanation: |-
    ③が誤り。DBA（Dynamic Bandwidth Allocation：動的帯域割当）は各ONUのトラヒックの有無に応じて動的に帯域を割り当てる機能であり、「固定的に帯域を割り当てる」は誤り。①②④はいずれも正しい。正答③。

- id: r5_2_setubi_q02_a
  number: "2-(1)ア"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    LTEのコアネットワークEPCにおける移動端末(UE)登録手順についての説明で、MMEが有する機能「UEの（ア）や認証、ユーザデータパケットの経路設定処理などの機能」の空欄(ア)はどれか。
    ①一斉呼出 ②QoS制御 ③セキュリティ ④サーバ割り当て ⑤移動管理 ⑥イベント通知 ⑦リソース確保 ⑧インタワーク ⑨アタッチ ⑩ローミング ⑪無線データリンク ⑫アンカーポイント
  options:
  - ①一斉呼出
  - ②QoS制御
  - ③セキュリティ
  - ④サーバ割り当て
  - ⑤移動管理
  - ⑥イベント通知
  - ⑦リソース確保
  - ⑧インタワーク
  - ⑨アタッチ
  - ⑩ローミング
  - ⑪無線データリンク
  - ⑫アンカーポイント
  answer: 5
  explanation: |-
    MME（Mobility Management Entity）の主要機能は「移動管理」「認証」「ユーザデータパケットの経路設定処理」など。空欄には「移動管理」が入る。正答⑤。

- id: r5_2_setubi_q02_b
  number: "2-(1)イ"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    LTEのUE登録手順において「UEからMMEに対してネットワークへの登録を要求する（イ）要求を送信する」及び「UEへ（イ）完了通知メッセージを送信する」の空欄(イ)はどれか。
    ①一斉呼出 ②QoS制御 ③セキュリティ ④サーバ割り当て ⑤移動管理 ⑥イベント通知 ⑦リソース確保 ⑧インタワーク ⑨アタッチ ⑩ローミング ⑪無線データリンク ⑫アンカーポイント
  options:
  - ①一斉呼出
  - ②QoS制御
  - ③セキュリティ
  - ④サーバ割り当て
  - ⑤移動管理
  - ⑥イベント通知
  - ⑦リソース確保
  - ⑧インタワーク
  - ⑨アタッチ
  - ⑩ローミング
  - ⑪無線データリンク
  - ⑫アンカーポイント
  answer: 9
  explanation: |-
    LTEのUEがネットワークに登録する手順を「アタッチ（Attach）」という。UEはアタッチ要求メッセージをMMEに送信し、処理完了後にアタッチ完了通知を受信する。正答⑨。

- id: r5_2_setubi_q02_c
  number: "2-(1)ウ"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    LTEのUE登録手順において「eNodeBは、UEとの間の（ウ）を確立するとともに、UEへアタッチ完了通知メッセージを送信する」の空欄(ウ)はどれか。
    ①一斉呼出 ②QoS制御 ③セキュリティ ④サーバ割り当て ⑤移動管理 ⑥イベント通知 ⑦リソース確保 ⑧インタワーク ⑨アタッチ ⑩ローミング ⑪無線データリンク ⑫アンカーポイント
  options:
  - ①一斉呼出
  - ②QoS制御
  - ③セキュリティ
  - ④サーバ割り当て
  - ⑤移動管理
  - ⑥イベント通知
  - ⑦リソース確保
  - ⑧インタワーク
  - ⑨アタッチ
  - ⑩ローミング
  - ⑪無線データリンク
  - ⑫アンカーポイント
