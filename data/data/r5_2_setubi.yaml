- id: r5_2_setubi_q07_e
  number: "7-(2)"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    通話品質を評価する客観評価法又は主観評価法について述べた次の文章のうち、誤っているものはどれか。
    ①測定器を使って音声の品質を機械的に処理し数値化する方法は、客観評価法といわれる。客観評価法では、入力音声と出力音声を比較して音声の明瞭度を測定し、その結果をラウドネス定格と対応したスコアとして出力する。
    ②客観評価法には、PESQ、POLQAなどがある。PESQは、電話帯域音声の受聴品質を推定する客観的な品質評価が可能であり、対象とする品質要因には、音声符号化ひずみ、パケット損失ひずみなどがある。
    ③主観評価法の一つであるオピニオン評価法には、被験者が実際に耳で聞いた試験音声の品質を5段階で評価する方法がある。
    ④オピニオン評価法において、複数の被験者の評点を平均して求めた値は、MOS値といわれる。
  options:
  - ①客観評価法の説明
  - ②PESQとPOLQA
  - ③オピニオン評価法の段階数
  - ④MOS値
  answer: 1
  explanation: |-
    ①が誤り。客観評価法で「ラウドネス定格と対応したスコアとして出力する」という説明は誤り。PESQ等の客観評価法はMOS値（Mean Opinion Score）に対応した推定値を出力する。ラウドネス定格は伝送品質の別の指標。②③④は正しい。正答①。

- id: r5_2_setubi_q07_f
  number: "7-(3)"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    JIS Q 45001：2018労働安全衛生マネジメントシステムにおける用語及び定義について述べた次の文章のうち、誤っているものはどれか。
    ①労働安全衛生方針とは、働く人の労働に関係する負傷及び疾病を防止し、安全で健康的な職場を提供するための方針をいう。
    ②労働安全衛生パフォーマンスとは、働く人の負傷及び疾病の防止の有効性、並びに安全で健康的な職場の提供に関わるパフォーマンスをいう。
    ③労働安全衛生リスクとは、労働に関係する危険な事象又はばく露の起こりやすさと、負傷及び疾病を引き起こす可能性のある原因をいう。
    ④インシデントとは、結果として負傷及び疾病を生じた又は生じ得た、労働に起因する又は労働の過程での出来事をいう。
  options:
  - ①労働安全衛生方針の定義
  - ②労働安全衛生パフォーマンスの定義
  - ③労働安全衛生リスクの定義
  - ④インシデントの定義
  answer: 3
  explanation: |-
    ③が誤り。労働安全衛生リスクとは「労働に関係する危険な事象又はばく露の起こりやすさと、その事象又はばく露によって生じ得る負傷及び疾病の重篤さとの組合せ」をいう。「可能性のある原因」という表現は誤り（ハザードの定義に近い）。正答③。

- id: r5_2_setubi_q07_g
  number: "7-(4)"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    災害時優先電話、災害対策機器及び停電対策について述べた次の文章のうち、正しいものはどれか。
    ①災害時優先電話は、一般に、災害発生時などに行われる通信制限時であっても優先電話への着信を優先して扱うことにより、重要通信を確保するサービスである。
    ②電気通信事業者が配備している災害対策用移動電源車の1台当たりの発電能力は最大で500kVAであり、発電方式はガスタービン発電に統一されている。
    ③移動式ICTユニットは、ICTサービスの提供に必要な装置類を収容した可搬型のユニットであり、Wi-FiによるローカルネットワークやNGNへの接続を短時間で行うことができる。
    ④情報通信ネットワーク安全・信頼性基準における停電対策では、都道府県庁等に設置されている端末設備と接続されている設備は、少なくとも96時間にわたり停止することを考慮することとされている。
  options:
  - ①災害時優先電話の機能
  - ②移動電源車の能力と方式
  - ③移動式ICTユニットの機能
  - ④停電対策の時間
  answer: 3
  explanation: |-
    ③が正しい。移動式ICTユニットは可搬型でWi-Fiによるローカルネットワーク構築や広域ネットワーク（NGNではなく一般に広域ネットワーク）への接続を短時間で行える。①災害時優先電話は「発信」を優先するサービス（着信優先ではない）。②発電方式は統一されていない（ディーゼルも使用）。④96時間の規定は正しい内容。正答③。

- id: r5_2_setubi_q07_h
  number: "7-(5)"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    JIS Z 8115：2019ディペンダビリティ用語に規定されている用語及び定義について述べた次のＡ～Ｃの文章は正しいか。
    Ａ：瞬間アベイラビリティとは、与えられた時点において、アイテムが要求どおりの遂行状態にある確率をいう。
    Ｂ：固有アベイラビリティとは、理想的な運用及び保全の条件下で、設計で規定されるアベイラビリティの値をいい、MTBFをMTBFとMTTRの和で除した式で示される。
    Ｃ：運用アベイラビリティとは、実際の運用及び保全の条件下でのアベイラビリティの実績値をいい、MUTをMUTとMDTの和で除した式で示される。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 7
  explanation: |-
    Ａは正しい（瞬間アベイラビリティの定義）。Ｂは正しい（固有アベイラビリティ=MTBF/(MTBF+MTTR)）。Ｃは正しい（運用アベイラビリティ=MUT/(MUT+MDT)）。正答⑦。

- id: r5_2_setubi_q07_i
  number: "7-(6)ケ"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    非修理系システムの故障率について、故障するまでの運用時間が68、38、73、44、52、17、65、84、30、29時間（計10台）の場合、このシステムの1時間当たりの故障率はどれか。
    ①0.004 ②0.02 ③0.11 ④0.5 ⑤0.98
  options:
  - ①0.004
  - ②0.02
  - ③0.11
  - ④0.5
  - ⑤0.98
  answer: 2
  explanation: |-
    MTBF（平均故障間動作時間）＝運用時間の合計/故障数＝(68+38+73+44+52+17+65+84+30+29)/10＝500/10＝50時間。偶発故障期間では故障率λ＝1/MTBF＝1/50＝0.02（/時間）。正答②。

- id: r5_2_setubi_q07_j
  number: "7-(6)コ"
  group: 問7 設備管理・品質・安全・災害対策・信頼性
  text: |-
    故障率λ=0.02（/時間）のシステムにおいて、信頼度R(t)=e^(-λt)=0.9となるのは稼働開始後何時間か。ただしloge0.9=-0.1とする。
    ①0.5 ②2 ③5 ④9 ⑤450
  options:
  - ①0.5時間
  - ②2時間
  - ③5時間
  - ④9時間
  - ⑤450時間
  answer: 3
  explanation: |-
    R(t)=e^(-λt)=0.9より、-λt=loge(0.9)=-0.1。t=0.1/λ=0.1/0.02=5時間。正答③。

