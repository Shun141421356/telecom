- id: r5_2_setubi_q09_c
  number: "9-(1)ウ"
  group: 問9 セキュリティ
  text: |-
    ポートスキャンの手法について「（ウ）スキャンは標的ポートに対して完全なスリーウェイハンドシェイクを行うため、対象サーバのログに残る可能性は高い」の空欄(ウ)はどれか。
