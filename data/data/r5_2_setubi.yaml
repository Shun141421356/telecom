  - ③pingコマンド
  - ④アプリケーション
  - ⑤データリンク
  - ⑥configコマンド
  - ⑦cdコマンド
  - ⑧TCP接続スキャン
  - ⑨ネットワークインタフェース
  - ⑩TCP SYNスキャン
  - ⑪HTTP
  - ⑫トランスポート
  - ⑬TCP FINスキャン
  - ⑭トンネリング技術
  answer: 10
  explanation: |-
    TCP SYNスキャン（ハーフオープンスキャン）：SYNを送信してSYN/ACKを受信したらRSTを送信してコネクションを確立せずに切断する。ログに残りにくい（ステルススキャン）。正答⑩。

- id: r5_2_setubi_q09_e
  number: "9-(2)"
  group: 問9 セキュリティ
  text: |-
    入退室に関するセキュリティ対策などについて述べた次の文章のうち、誤っているものはどれか。
    ①企業のオフィスなどを用途・重要度・利用者などに応じたセキュリティレベルの違いに基づき分割して、幾つかのセキュリティ区画を設定することは、一般に、ゾーニングといわれる。
    ②入退室を一人ずつしか行えないようにするために二重扉の二つの扉の間には常に一人しか入ることを許可せず、片方の扉が開いているときはもう片方の扉は開かない構造のセキュリティゲートは、一般に、インターロックゲートといわれる。
    ③在室人数が一人になることを避けるために、最初の入室者と最後の退室者は二人以上同時でなければ入室・退室をできなくするルールは、一般に、TPMORといわれる。
    ④一つの監視エリアにおいて、ICカードなどを用い、入室記録後に退室記録がない場合は再入室をできなくしたり、退室記録後に入室記録がない場合は再退室をできなくしたりする機能は、一般に、ピギーバックといわれる。
  options:
  - ①ゾーニングの定義
  - ②インターロックゲートの定義
  - ③TPMORの定義
  - ④ピギーバックの定義
  answer: 4
  explanation: |-
    ④が誤り。設問に述べられている機能は「アンチパスバック」といわれる機能（入室・退室記録の整合性チェック）。ピギーバックは認証した人の後について不正に入室する行為（共連れ）を指す。正答④。

- id: r5_2_setubi_q09_f
  number: "9-(3)"
  group: 問9 セキュリティ
  text: |-
    不正アクセスの手法と対策について述べた次の文章のうち、誤っているものはどれか。
    ①リプレイ攻撃への対策として、パスワードをハッシュ化又は暗号化して秘匿することが有効である。
    ②ブルートフォース攻撃への対策として、ある利用者IDでログインを一定回数連続して失敗すると当該利用者IDをロックして使用できなくすることが有効である。
    ③パスワードリスト攻撃への対策として、パスワードの使い回しをせずに利用しているサービスごとに異なるパスワードを設定することが有効である。
    ④辞書攻撃への対策として、パスワードに無意味で推測が困難な文字列を設定することが有効である。
  options:
  - ①リプレイ攻撃への対策
  - ②ブルートフォース攻撃への対策
  - ③パスワードリスト攻撃への対策
  - ④辞書攻撃への対策
  answer: 1
  explanation: |-
    ①が誤り。リプレイ攻撃は認証データをそのまま使い回す攻撃であり、対策としてはワンタイムパスワード、チャレンジレスポンス方式、タイムスタンプ付き認証などが有効。パスワードのハッシュ化・暗号化は盗聴対策にはなるが、傍受したハッシュ値をそのまま送信するリプレイ攻撃には対応できない。正答①。

- id: r5_2_setubi_q09_g
  number: "9-(4)"
  group: 問9 セキュリティ
  text: |-
    無線LANのセキュリティについて述べた次の文章のうち、誤っているものはどれか。
    ①IEEE802.11iでは、端末の認証にIEEE802.1Xを用いることを規定している。
    ②MACアドレスフィルタリングを用いても、無線区間の通信データは暗号化されず盗聴されるおそれがある。
    ③WPA2方式では、暗号アルゴリズムにDESを採用したTKIPといわれる暗号方式の実装が必須とされている。
    ④WPA2方式は、WEP方式と比較して、セキュリティレベルが高いとされている。
  options:
  - ①IEEE802.11iとIEEE802.1X
  - ②MACアドレスフィルタリングの暗号化
  - ③WPA2とTKIPのアルゴリズム
  - ④WPA2とWEPのセキュリティレベル比較
  answer: 3
  explanation: |-
    ③が誤り。WPA2方式ではAESを用いたCCMPが必須とされている。TKIPはWPA（WPA1）で採用されたRC4ベースの暗号方式であり、WPA2での必須実装ではない。またDESではなくRC4（TKIPの場合）やAES（CCMPの場合）が使用される。正答③。

- id: r5_2_setubi_q09_h
  number: "9-(5)"
  group: 問9 セキュリティ
  text: |-
    電子メールのセキュリティについて述べた次の文章のうち、正しいものはどれか。
    ①送信ドメイン認証は、受信側のメールサーバが送信側のメールサーバの正当性を検証する仕組みであり、SMTP AUTHなどの方式がある。
    ②暗号化電子メールの主な方式には、S/MIMEとPGPがある。S/MIMEは、公開鍵を公的な第三者機関が保証するのに対して、PGPは、公開鍵を利用者どうしで保証しあう。
    ③POP3Sを用いて電子メールを受信する場合、パスワードは暗号化されるがメール本文は暗号化されない。
    ④ISPによる迷惑メール対策として、ISPがあらかじめ用意しているメールサーバ以外からの電子メールを外部ネットワークへ送信しない仕組みであるDMARCを用いることが有効である。
  options:
  - ①送信ドメイン認証とSMTP AUTH
  - ②S/MIMEとPGPの公開鍵保証
  - ③POP3Sの暗号化範囲
  - ④DMARCの説明
  answer: 2
  explanation: |-
    ②が正しい。S/MIMEは認証局（CA）による公開鍵証明書を使用し、PGPは利用者どうしが公開鍵に署名して信頼の輪（Web of Trust）を形成する。①SMTP AUTHは送信ドメイン認証ではなく、メール送信時のユーザ認証方式。③POP3SはSSL/TLSで全通信を暗号化するためメール本文も含めて暗号化される。④設問の説明はOP25B（Outbound Port 25 Blocking）の説明。正答②。
