  explanation: |-
    eNodeBはUEとの間に「無線データリンク（DRB：Data Radio Bearer）」を確立する。これにより通信経路が設定され、UEは通信が可能になる。正答⑪。

- id: r5_2_setubi_q02_d
  number: "2-(2)"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    SIPの構成要素などについて述べた次の文章のうち、正しいものはどれか。
    ①プロキシサーバはSIPメッセージ処理に関する状態を保持するか保持しないかで分類され、状態を保持するものはステートレスプロキシサーバといわれる。
    ②レジストラは、一般に、UACからの登録・更新などのリクエストを受け付ける機能を有しており、受け付ける際にはUACを認証する。
    ③IPネットワーク上のUACの位置情報は、一般に、レジストラで保持され、レジストラは問合せに応じてロケーションサーバなどへ位置情報を提供する。
    ④リダイレクトサーバは、一般に、UACからのリクエストに対してメッセージ内の宛先アドレスを実際の宛先アドレスに変更した後、これをレスポンスに含めて移動先のユーザエージェントサーバに送信する。
  options:
  - ①ステートレスプロキシサーバの定義
  - ②レジストラの機能
  - ③レジストラと位置情報
  - ④リダイレクトサーバの動作
  answer: 2
  explanation: |-
    ②が正しい。レジストラはUACからのREGISTERリクエストを受け付け、認証を行い位置情報を登録する。①状態を保持するのはステートフルプロキシ、保持しないのがステートレス。③位置情報はロケーションサーバが保持する。④リダイレクトサーバはクライアントに転送先を通知するが、自ら転送はしない。正答②。

- id: r5_2_setubi_q02_e
  number: "2-(3)"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    IP電話などで用いられるネットワークスイッチについて述べた次の文章のうち、正しいものはどれか。
    ①レイヤ2スイッチはOSI参照モデルのネットワーク層で動作し、MACアドレスを利用したスイッチング機能を有している。
    ②VLAN機能に対応したレイヤ2スイッチは、一般に、音声品質を確保するためのコリジョンドメイン及びブロードキャストドメインを分割する機能を有していない。
    ③レイヤ3スイッチは、一般に、ルーティング処理をCPU上で動作するソフトウェアで行っているため、ASICやFPGAを用いたハードウェアでルーティング処理を行うルータと比較して、高速な処理を行うことができる。
    ④レイヤ3スイッチのタグVLAN機能を用いると、一般に、タグに優先レベルが付与された音声パケットを優先的に転送でき、音声品質を確保することができる。
  options:
  - ①レイヤ2スイッチの動作層
  - ②VLANとドメイン分割
  - ③レイヤ3スイッチとルータの速度比較
  - ④タグVLANと音声品質
  answer: 4
  explanation: |-
    ④が正しい。レイヤ3スイッチのタグVLAN（IEEE802.1Q）ではタグにCoS（優先度）を付与でき、音声パケットを優先転送して品質を確保できる。①レイヤ2スイッチはデータリンク層で動作。②VLANはブロードキャストドメインを分割できる。③レイヤ3スイッチはハードウェア（ASIC）処理が多く高速。正答④。

- id: r5_2_setubi_q02_f
  number: "2-(4)"
  group: 問2 LTE・SIP・ネットワークスイッチ・呼量
  text: |-
    ある回線群について、1時間にわたって接続呼数を観測したところ、150呼の接続があり、呼の平均保留時間は12分であった。この回線群の回線数が60回線のときの回線能率は＿＿%である。
    ①0.3 ②4 ③12 ④30 ⑤50
  options:
  - ①0.3%
  - ②4%
  - ③12%
  - ④30%
  - ⑤50%
  answer: 5
  explanation: |-
    呼量（アーラン）=呼数×平均保留時間(h)=150呼×（12分/60分）=150×0.2=30アーラン。回線能率=運ばれた呼量/回線数=30/60=0.5=50%。正答⑤。

- id: r5_2_setubi_q03_a
  number: "3-(1)ア"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    電波伝搬に関する説明で「あらゆる方向に一様に電波を放射するアンテナは（ア）アンテナといわれる」の空欄(ア)はどれか。
    ①電界強度 ②パラボラ ③電束密度 ④ダイポール ⑤√2 ⑥2 ⑦3 ⑧4 ⑨ストリップ ⑩磁束密度 ⑪等方性 ⑫電力束密度
  options:
  - ①電界強度
  - ②パラボラ
  - ③電束密度
  - ④ダイポール
  - ⑤√2
  - ⑥2
  - ⑦3
  - ⑧4
  - ⑨ストリップ
  - ⑩磁束密度
  - ⑪等方性
  - ⑫電力束密度
  answer: 11
  explanation: |-
    あらゆる方向に一様に電波を放射するアンテナは「等方性（アイソトロピック）アンテナ」といわれる。理想的なアンテナで、実際には製造できないが計算の基準として用いる。正答⑪。

- id: r5_2_setubi_q03_b
  number: "3-(1)イ"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    等方性アンテナから放射された電波が球面状に広がる場合「球面上における（イ）をS [W/m²]とすると S=P/(4πd²)」の空欄(イ)はどれか。
    ①電界強度 ②パラボラ ③電束密度 ④ダイポール ⑤√2 ⑥2 ⑦3 ⑧4 ⑨ストリップ ⑩磁束密度 ⑪等方性 ⑫電力束密度
  options:
  - ①電界強度
  - ②パラボラ
  - ③電束密度
  - ④ダイポール
  - ⑤√2
  - ⑥2
  - ⑦3
  - ⑧4
  - ⑨ストリップ
  - ⑩磁束密度
  - ⑪等方性
  - ⑫電力束密度
  answer: 12
  explanation: |-
    単位面積当たりの電力を「電力束密度」といい、単位はW/m²。等方性アンテナから放射された電力Pが距離dの球面上で S=P/(4πd²) と表される。正答⑫。

- id: r5_2_setubi_q03_c
  number: "3-(1)ウ"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    自由空間伝搬損失において、送受信アンテナ間の距離が2倍になると、自由空間伝搬損失は何倍になるか。
    ①電界強度 ②パラボラ ③電束密度 ④ダイポール ⑤√2 ⑥2 ⑦3 ⑧4 ⑨ストリップ ⑩磁束密度 ⑪等方性 ⑫電力束密度
  options:
  - ①電界強度
  - ②パラボラ
  - ③電束密度
  - ④ダイポール
  - ⑤√2
  - ⑥2
  - ⑦3
  - ⑧4
  - ⑨ストリップ
  - ⑩磁束密度
  - ⑪等方性
  - ⑫電力束密度
  answer: 8
  explanation: |-
    自由空間伝搬損失は距離の2乗に比例する（L∝d²）。距離が2倍になると損失は4倍（6dB増加）になる。正答⑧。

- id: r5_2_setubi_q03_d
  number: "3-(2)"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    デジタル無線伝送に用いられる変調方式の種類・特徴などについて述べた次の文章のうち、正しいものはどれか。
    ①ASKでは変調信号により搬送波の振幅を変化させており、オンオフキーイング（OOK）は4値ASKの一例である。
    ②PSKでは変調信号により搬送波の位相を変化させており、信号点を45度ごとに配置するものとしてQPSKやπ/4シフトQPSKがある。
    ③FSKでは変調信号により搬送波の周波数を変化させており、一般に、搬送波の振幅は一定である。
    ④スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域の信号を直接乗積する手法は、一般に、周波数ホッピング（FH）といわれる。
  options:
  - ①ASKとOOK
  - ②PSKとQPSK
  - ③FSKの特徴
  - ④直接乗積と周波数ホッピング
  answer: 3
  explanation: |-
    ③が正しい。FSK（周波数偏移変調）は変調信号により搬送波の周波数を変化させ、振幅は一定に保たれる。①OOKは2値ASKの一例。②QPSKは90度ごとに4つの信号点を配置し、π/4シフトQPSKは45度ずつずれた2つのQPSKを使用する（45度ごとではない）。④直接乗積はDS（直接拡散）であり周波数ホッピングではない。正答③。

- id: r5_2_setubi_q03_e
  number: "3-(3)"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    衛星移動通信について述べた次の文章のうち、誤っているものはどれか。
    ①衛星と基地地球局の間の回線はフィーダリンクといわれ、電離層・降雨減衰などの影響を考慮した回線設計が必要。
    ②衛星と移動地球局の間の回線はサービスリンクといわれ、ビル陰による受信レベル変動や建物侵入損失も考慮した回線設計が必要。
    ③低軌道の非静止衛星を用いることにより、静止衛星と比較してアンテナの小型化・通信速度の向上・遅延時間の短縮が期待できる。
    ④低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、3機の非静止衛星を用いる必要がある。
  options:
  - ①フィーダリンクの説明
  - ②サービスリンクの説明
  - ③低軌道衛星の利点
  - ④低軌道衛星による連続通信に必要な機数
  answer: 4
  explanation: |-
    ④が誤り。低軌道（LEO）衛星は地球を高速で周回するため、連続通信サービスを提供するには多数（数十〜数百機）の衛星コンステレーションが必要。3機では不可能（静止衛星であれば3機で地球全体をほぼカバーできる）。正答④。

- id: r5_2_setubi_q03_f
  number: "3-(4)"
  group: 問3 電波伝搬・変調方式・衛星通信・5G
  text: |-
    第5世代移動通信システム（5G）のネットワーク構成及び機能について述べた次の文章のうち、誤っているものはどれか。
    ①5Gのコアネットワーク（5Gコア）では、様々なネットワーク機能を共通のハードウェア上で動作させることができるネットワーク機能の仮想化技術が用いられている。
    ②5GにはSA（Standalone）方式とNSA（Non-Standalone）方式があり、NSA方式ではネットワークスライシング技術を用いたサービスを提供することができる。
    ③SA方式では、5Gの基地局（gNodeB）は5Gコアに接続されており、ユーザデータ・制御信号ともNR（New Radio）回線を用いて送受信される。
    ④NSA方式では、gNodeBはLTEで利用されているEPCに接続されており、ユーザデータはNR回線で送受信され、制御信号はLTE回線で送受信される。
  options:
  - ①5Gコアのネットワーク仮想化
  - ②SAとNSAおよびネットワークスライシング
  - ③SA方式の構成
  - ④NSA方式の構成
  answer: 2
  explanation: |-
    ②が誤り。ネットワークスライシング技術を用いたサービスを提供できるのはSA方式（5Gコアを使用）であり、NSA方式（EPCを使用）ではネットワークスライシングは提供できない。正答②。

- id: r5_2_setubi_q04_a
  number: "4-(1)ア"
  group: 問4 電源設備・二次電池
  text: |-
    通信装置への給電方式について「直流給電方式では、商用の交流電力を整流器で直流電力に変換し、蓄電池を常時（ア）しながら、その端子電圧を許容範囲内に（イ）する電圧（イ）器を介して通信装置に供給する」の空欄(ア)はどれか。
    ①昇圧 ②全浮動充電 ③均等充電 ④補充電 ⑤非共振 ⑥降圧 ⑦共振 ⑧変成 ⑨静止 ⑩部分浮動充電 ⑪並列冗長 ⑫補償
  options:
  - ①昇圧
  - ②全浮動充電
  - ③均等充電
  - ④補充電
  - ⑤非共振
  - ⑥降圧
  - ⑦共振
  - ⑧変成
  - ⑨静止
  - ⑩部分浮動充電
  - ⑪並列冗長
  - ⑫補償
  answer: 2
  explanation: |-
    直流給電方式では蓄電池を常時「全浮動充電（フロート充電）」しながら給電する。これにより停電時は蓄電池から自動的に給電が継続される。正答②。

- id: r5_2_setubi_q04_b
  number: "4-(1)イ"
  group: 問4 電源設備・二次電池
  text: |-
    直流給電方式における「端子電圧を許容範囲内に（イ）する電圧（イ）器」の空欄(イ)はどれか。
    ①昇圧 ②全浮動充電 ③均等充電 ④補充電 ⑤非共振 ⑥降圧 ⑦共振 ⑧変成 ⑨静止 ⑩部分浮動充電 ⑪並列冗長 ⑫補償
  options:
  - ①昇圧
  - ②全浮動充電
  - ③均等充電
  - ④補充電
  - ⑤非共振
  - ⑥降圧
  - ⑦共振
  - ⑧変成
  - ⑨静止
  - ⑩部分浮動充電
  - ⑪並列冗長
  - ⑫補償
  answer: 12
  explanation: |-
    端子電圧を許容範囲内に保つのは「補償（電圧補償）」の機能であり、「電圧補償器」が正しい。電圧降下を補償して一定電圧を供給する装置。正答⑫。

- id: r5_2_setubi_q04_c
  number: "4-(1)ウ"
  group: 問4 電源設備・二次電池
  text: |-
    交流給電方式について「インバータに半導体スイッチング素子を用いた（ウ）形交流電源装置により所要の交流電力に変換して通信装置に供給する。（ウ）形交流電源装置は、回転部分がないため機械的摩耗劣化がない」の空欄(ウ)はどれか。
    ①昇圧 ②全浮動充電 ③均等充電 ④補充電 ⑤非共振 ⑥降圧 ⑦共振 ⑧変成 ⑨静止 ⑩部分浮動充電 ⑪並列冗長 ⑫補償
  options:
  - ①昇圧
  - ②全浮動充電
  - ③均等充電
  - ④補充電
  - ⑤非共振
  - ⑥降圧
  - ⑦共振
  - ⑧変成
  - ⑨静止
  - ⑩部分浮動充電
  - ⑪並列冗長
  - ⑫補償
  answer: 9
  explanation: |-
    半導体スイッチング素子を用いたインバータによる交流電源装置は「静止形交流電源装置（静止形インバータ）」。回転部分がないため機械的摩耗劣化がない。正答⑨。

- id: r5_2_setubi_q04_d
  number: "4-(2)"
  group: 問4 電源設備・二次電池
  text: |-
    受電設備における進相コンデンサと直列リアクトルについて述べた次の文章のうち、正しいものはどれか。
    ①負荷設備は一般に誘導性であるため、配電系統の電力は進み無効電力を多く含んでおり進み力率となる。進相コンデンサはこの進み無効電力を吸収し力率を改善するために用いられる。
    ②進相コンデンサは回路から切り離された直後は残留電荷が残っており感電の危険がある。このため別のコンデンサ素子を付加している。
    ③進相コンデンサに対して直列に接続される直列リアクトルには、進相コンデンサ投入時の過大な突入電流を抑制する効果や高調波電流の流出を抑制する効果がある。
    ④進相コンデンサと直列リアクトルの設置位置は、経済性や省エネルギー性を考慮して、各負荷設備の入力側とするのが一般的である。
  options:
  - ①進相コンデンサと進み無効電力
  - ②残留電荷と別コンデンサ
  - ③直列リアクトルの効果
  - ④設置位置
  answer: 3
  explanation: |-
    ③が正しい。直列リアクトルは進相コンデンサ投入時の突入電流抑制と高調波電流の流出抑制効果がある。①誘導性負荷では遅れ無効電力（遅れ力率）が問題。②残留電荷の放電には放電抵抗を使用。④実際の設置位置は受電用変圧器の高圧側が一般的（経済性の観点）。正答③。

- id: r5_2_setubi_q04_e
  number: "4-(3)"
  group: 問4 電源設備・二次電池
  text: |-
    自励式インバータの種類・特徴などについて述べた次の文章のうち、誤っているものはどれか。
    ①電圧形インバータでは、一般に、出力電圧の波形は方形波となり、出力電流は正弦波交流に近い波形となる。
    ②電圧形インバータでは、一般に、直流側にコンデンサが接続されている。
    ③電流形インバータは、電圧形インバータと比較して、一般に、電源インピーダンスが小さく、過電圧保護は容易であるが、過電流保護は難しい。
    ④電流形インバータでは、一般に、直流側にリアクトルが接続されている。
  options:
  - ①電圧形インバータの出力波形
  - ②電圧形インバータの直流側
  - ③電流形インバータの特性
  - ④電流形インバータの直流側
  answer: 3
  explanation: |-
    ③が誤り。電流形インバータは電圧形と比較して電源インピーダンスが大きい（直流側にリアクトルを持つため）。また過電流保護は容易であるが、過電圧保護が難しい。正答③。

- id: r5_2_setubi_q04_f
  number: "4-(4)"
  group: 問4 電源設備・二次電池
  text: |-
    二次電池の種類・特徴などについて述べた次の文章のうち、誤っているものはどれか。
    ①シール鉛蓄電池は、液式鉛蓄電池と異なり、補水・比重測定・均等充電の定期作業が不要である。
    ②シール鉛蓄電池には、電池内部で発生する酸素ガスを負極に集め、負極で発生する水素ガスと電気化学的に反応させて元の水に戻す機能がある。
    ③ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較してエネルギー密度が高く、放電時の電圧変動が小さい。
    ④リチウムイオン二次電池は、負極にリチウムイオンを吸蔵した炭素材料を用いており、ニッケル水素電池と比較してエネルギー密度は高いが、作動電圧は低い。
  options:
  - ①シール鉛蓄電池の定期作業
  - ②シール鉛蓄電池の酸素ガス処理
  - ③ニッケル水素電池の特徴
  - ④リチウムイオン電池の特徴
  answer: 4
  explanation: |-
    ④が誤り。リチウムイオン二次電池の作動電圧は約3.6～3.7Vであり、ニッケル水素電池の約1.2Vと比較して高い。エネルギー密度が高いという点は正しい。正答④。

- id: r5_2_setubi_q05_a
  number: "5-(1)ア"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    仮想記憶方式について「仮想記憶を実現する方式には、大別してページング方式と（ア）方式がある」の空欄(ア)はどれか。
    ①LFU ②LIFO ③オーバレイ ④ネゴシエーション ⑤TLB ⑥スレッド ⑦セグメント ⑧フラグメンテーション ⑨LRU ⑩セマフォ ⑪スワッピング ⑫スラッシング
  options:
  - ①LFU
  - ②LIFO
  - ③オーバレイ
  - ④ネゴシエーション
  - ⑤TLB
  - ⑥スレッド
  - ⑦セグメント
  - ⑧フラグメンテーション
  - ⑨LRU
  - ⑩セマフォ
  - ⑪スワッピング
  - ⑫スラッシング
  answer: 7
  explanation: |-
    仮想記憶の実現方式は「ページング方式」と「セグメント方式」に大別される。セグメント方式ではプログラムを意味のある固まり（セグメント）に分割して管理する。正答⑦。

- id: r5_2_setubi_q05_b
  number: "5-(1)イ"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    ページング方式のページ置き換えアルゴリズムで「最後に参照してから経過している時間が最も長いページを置き換える（イ）方式」の空欄(イ)はどれか。
    ①LFU ②LIFO ③オーバレイ ④ネゴシエーション ⑤TLB ⑥スレッド ⑦セグメント ⑧フラグメンテーション ⑨LRU ⑩セマフォ ⑪スワッピング ⑫スラッシング
  options:
  - ①LFU
  - ②LIFO
  - ③オーバレイ
  - ④ネゴシエーション
  - ⑤TLB
  - ⑥スレッド
  - ⑦セグメント
  - ⑧フラグメンテーション
  - ⑨LRU
  - ⑩セマフォ
  - ⑪スワッピング
  - ⑫スラッシング
  answer: 9
  explanation: |-
    LRU（Least Recently Used）方式：最後に参照してから最も時間が経過したページを置き換えるアルゴリズム。参照局所性の原理に基づき、よく使われるページを主記憶に残す。正答⑨。

- id: r5_2_setubi_q05_c
  number: "5-(1)ウ"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    ページング方式で「ページインやページアウトが頻発するとOSが仮想記憶への入出力にCPUの処理能力のほとんどを割いてしまい、プログラムが進まなくなってしまう（ウ）が起こる」の空欄(ウ)はどれか。
    ①LFU ②LIFO ③オーバレイ ④ネゴシエーション ⑤TLB ⑥スレッド ⑦セグメント ⑧フラグメンテーション ⑨LRU ⑩セマフォ ⑪スワッピング ⑫スラッシング
  options:
  - ①LFU
  - ②LIFO
  - ③オーバレイ
  - ④ネゴシエーション
  - ⑤TLB
  - ⑥スレッド
  - ⑦セグメント
  - ⑧フラグメンテーション
  - ⑨LRU
  - ⑩セマフォ
  - ⑪スワッピング
  - ⑫スラッシング
  answer: 12
  explanation: |-
    スラッシング（Thrashing）：ページインとページアウトが頻発し、OSがほとんどのCPU時間を仮想記憶の入出力処理に費やしてしまい、実際の処理が進まなくなる現象。主記憶が不足しているときに発生しやすい。正答⑫。

- id: r5_2_setubi_q05_d
  number: "5-(2)"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    SQLについて述べた次の文章のうち、誤っているものはどれか。
    ①SQLを用いて実現できる機能には、RDBの表などを定義するための機能、トランザクション管理の機能などがある。
    ②RDBのデータを操作するには、端末から直接SQL操作用のコマンドを起動する方法、親言語で書かれたソースプログラムの中にSQL文を直接埋め込んで起動する方法などがある。
    ③SQLの予約語は、一般に、変数名・プログラム名・表の名前などに使用することが禁止されている半角及び全角の文字列である。
    ④RDBの表は順序付けられていない行の集合体であり、SQLにより行を表に追加・削除することができる。
  options:
  - ①SQLの機能
  - ②RDBデータの操作方法
  - ③SQLの予約語
  - ④RDBの表の特性
  answer: 3
  explanation: |-
    ③が誤り。SQLの予約語は「半角」文字列のみであり、全角文字は予約語に該当しない。SQLは英語ベースの言語であり、半角英字の予約語（SELECT、FROM、WHERE等）のみが禁止対象となる。正答③。

- id: r5_2_setubi_q05_e
  number: "5-(3)"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    サーバの負荷分散などについて述べた次のＡ～Ｃの文章は正しいか。
    Ａ：DSR（Direct Server Return）を用いると、クライアントからのリクエストは負荷分散装置が受け取り複数のサーバに振り分けるが、サーバからのレスポンスは負荷分散装置を経由せずに直接クライアントに返すことができる。
    Ｂ：1台のサーバがリクエストを処理し、残りのサーバが障害に備える形態は、一般に、アクティブ・アクティブ冗長構成といわれる。
    Ｃ：DNSラウンドロビンでは、DNSキャッシュの影響を一切受けずに負荷分散させたいサーバのIPアドレスを順番に返すため、複数のサーバにリクエストを常に均等に振り分けることができる。
  options:
  - ①Ａのみ正しい
  - ②Ｂのみ正しい
  - ③Ｃのみ正しい
  - ④Ａ、Ｂが正しい
  - ⑤Ａ、Ｃが正しい
  - ⑥Ｂ、Ｃが正しい
  - ⑦Ａ、Ｂ、Ｃいずれも正しい
  - ⑧Ａ、Ｂ、Ｃいずれも正しくない
  answer: 1
  explanation: |-
    Ａは正しい（DSRの動作）。Ｂは誤り。1台が稼働し残りが待機する構成はアクティブ・スタンバイ冗長構成。アクティブ・アクティブは複数台が同時に稼働する構成。Ｃは誤り。DNSラウンドロビンはDNSキャッシュの影響を受けるため、常に均等な振り分けは保証されない。正答①。

- id: r5_2_setubi_q05_f
  number: "5-(4)"
  group: 問5 コンピュータ・データベース・ネットワーク仮想化
  text: |-
    ネットワークの仮想化技術などについて述べた次の文章のうち、正しいものはどれか。
    ①ルータ・ゲートウェイ・ファイアウォールなど専用ハードウェアを用いて実現されているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらの機能を実現する技術は、VRF（Virtual Routing and Forwarding）といわれる。
    ②タグVLANでは、VLANタグをIPヘッダに付加することにより所属するVLANを識別する。
    ③VXLAN（Virtual eXtensible Local Area Network）は、イーサネットフレーム全体をカプセル化することにより、レイヤ3ネットワーク上に論理的なレイヤ2ネットワークを構築する。
    ④SDNに関する標準化活動を行っているONF（Open Networking Foundation）において、SDNはネットワーク制御機能とデータ転送機能を統合したものであり、プログラムによりネットワークの制御が実現できるものとされている。
  options:
  - ①VRFの定義
  - ②タグVLANのタグ付与位置
  - ③VXLANの機能
  - ④SDNとONFの定義
  answer: 3
  explanation: |-
    ③が正しい。VXLANはイーサネットフレーム全体をUDPパケットにカプセル化することにより、レイヤ3ネットワーク上に論理的なレイヤ2ネットワークを構築するトンネリング技術。①はNFV（Network Function Virtualization）の説明。②タグVLANのタグはイーサネットフレームのヘッダ部分に付加（IPヘッダではない）。④SDNはネットワーク制御機能とデータ転送機能を分離したもの。正答③。

- id: r5_2_setubi_q06_a
  number: "6-(1)ア"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    ICMPv4はIPv4で「送信したパケットに対する（ア）通知、ネットワークからの情報取得などに用いられる」の空欄(ア)はどれか。
    ①ARP ②VRRP ③優先制御 ④イベント ⑤LCP ⑥番号 ⑦近隣探索 ⑧ルータ広告 ⑨エラー ⑩RARP ⑪SCTP ⑫輻輳
  options:
  - ①ARP
  - ②VRRP
  - ③優先制御
  - ④イベント
  - ⑤LCP
  - ⑥番号
  - ⑦近隣探索
  - ⑧ルータ広告
  - ⑨エラー
  - ⑩RARP
  - ⑪SCTP
  - ⑫輻輳
  answer: 9
  explanation: |-
    ICMPの主要な用途は「エラー通知」とネットワーク情報取得。ICMPv4のエラーメッセージには宛先到達不能（Destination Unreachable）、Time Exceeded等がある。空欄には「エラー」が入る。正答⑨。

- id: r5_2_setubi_q06_b
  number: "6-(1)イ"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    IPv4では「通信相手のIPアドレスからMACアドレスを調べるプロトコルである（イ）」の空欄(イ)はどれか。
    ①ARP ②VRRP ③優先制御 ④イベント ⑤LCP ⑥番号 ⑦近隣探索 ⑧ルータ広告 ⑨エラー ⑩RARP ⑪SCTP ⑫輻輳
  options:
  - ①ARP
  - ②VRRP
  - ③優先制御
  - ④イベント
  - ⑤LCP
  - ⑥番号
  - ⑦近隣探索
  - ⑧ルータ広告
  - ⑨エラー
  - ⑩RARP
  - ⑪SCTP
  - ⑫輻輳
  answer: 1
  explanation: |-
    ARP（Address Resolution Protocol）：IPアドレスからMACアドレスを解決するプロトコル。IPv4ネットワークでLAN内の機器と通信する際に使用する。正答①。

- id: r5_2_setubi_q06_c
  number: "6-(1)ウ"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    ICMPv6はIPv4のARPに相当する機能・IPアドレスの自動設定の機能などを提供する（ウ）を備えている、の空欄(ウ)はどれか。
    ①ARP ②VRRP ③優先制御 ④イベント ⑤LCP ⑥番号 ⑦近隣探索 ⑧ルータ広告 ⑨エラー ⑩RARP ⑪SCTP ⑫輻輳
  options:
  - ①ARP
  - ②VRRP
  - ③優先制御
  - ④イベント
  - ⑤LCP
  - ⑥番号
  - ⑦近隣探索
  - ⑧ルータ広告
  - ⑨エラー
  - ⑩RARP
  - ⑪SCTP
  - ⑫輻輳
  answer: 7
  explanation: |-
    ICMPv6の「近隣探索（Neighbor Discovery）」プロトコルはIPv4のARPに相当するアドレス解決機能、ルータ探索、アドレス自動設定などの機能を提供する。正答⑦。

- id: r5_2_setubi_q06_d
  number: "6-(2)"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    LANの構成技術の一つであるリンクアグリゲーションについて述べた次の文章のうち、誤っているものはどれか。
    ①リンクアグリゲーションは、2台のスイッチ間にある複数の物理リンクを束ねて一つの論理リンクとして扱う技術であり、データ転送の高速化を図ることができる。
    ②リンクアグリゲーションでは、構成する複数の物理リンクのいずれかに故障が発生したとき、故障したリンクを閉塞し、残った正常なリンクで通信を継続することができる。
    ③リンクアグリゲーションでは、一般に、光スプリッタを用いて光信号を複数の物理リンクに振り分けてデータ転送することにより、トラヒックを分散させることができる。
    ④リンクアグリゲーションを設定する場合は、対向するスイッチ間において各ポートの識別情報やグループ化するための情報を事前に共有する必要がある。
  options:
  - ①高速化と論理リンク化
  - ②故障時の通信継続
  - ③光スプリッタによるトラヒック分散
  - ④ポート情報の共有
  answer: 3
  explanation: |-
    ③が誤り。リンクアグリゲーションは複数の物理リンクをスイッチングで束ねる技術であり、光スプリッタは使用しない。光スプリッタはPONシステムなどで使用する受動光分岐素子。正答③。

- id: r5_2_setubi_q06_e
  number: "6-(3)"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    IPv6などにおけるルーティングプロトコルについて述べた次の文章のうち、正しいものはどれか。
    ①RIPngは、AS内の経路制御を行うディスタンスベクタ型のプロトコルである。
    ②RIPv2は認証機能を有していないが、RIPngは認証機能を有している。
    ③OSPFv3は、AS間の経路制御を行うパスベクタ型のプロトコルである。
    ④OSPFv3で用いられるHelloなどのOSPFパケットは、UDPを使用して交換される。
  options:
  - ①RIPngの種類と型
  - ②RIPv2とRIPngの認証機能
  - ③OSPFv3の種類と型
  - ④OSPFv3のパケット伝送
  answer: 1
  explanation: |-
    ①が正しい。RIPng（IPv6用RIP）はAS内（IGP）の経路制御を行うディスタンスベクタ型プロトコル。②RIPv2は認証機能を持ち、RIPngはIPv6のIPsecに依存して認証を行う（独自認証機能を持たない）。③OSPFv3はAS内（IGP）のリンクステート型プロトコル。④OSPFパケットはIPを直接使用（プロトコル番号89）。正答①。

- id: r5_2_setubi_q06_f
  number: "6-(4)"
  group: 問6 ICMPv6・リンクアグリゲーション・ルーティング・TCP/UDP
  text: |-
    TCPおよびUDPで使用されるポート番号の特徴などについて述べた次の文章のうち、正しいものはどれか。
    ①TCPおよびUDPは、通信しているアプリケーションを識別するため、8bitで構成されるポート番号を用いている。
    ②ポート番号は使用されるTCP、UDPごとに決められることから、TCPを使用するアプリケーションとUDPを使用する別のアプリケーションには同じポート番号を割り当てることができる。
    ③ルータは一般に、宛先及び送信元のMACアドレス、宛先及び送信元のTCPまたはUDPのポート番号の四つの情報を用いて、TCPまたはUDPの通信フローを特定することが可能である。
    ④ウェルノウンポート番号は、HTTP、TELNET、FTPなどのアプリケーションプロトコルごとに動的に割り当てられて使用されるポート番号である。
  options:
  - ①ポート番号のビット数
  - ②TCPとUDPで同じポート番号の使用
  - ③ルータによる通信フロー特定
  - ④ウェルノウンポート番号の定義
  answer: 2
  explanation: |-
    ②が正しい。ポート番号はTCPとUDPで独立して管理されるため、同じ番号をTCPの別サービスとUDPの別サービスに使用することが可能（例：TCPとUDP両方で同じ番号を使うサービスも多い）。①ポート番号は16bit（0〜65535）。③ルータはIPアドレスを使用（MACアドレスはL2）。④ウェルノウンポートは0〜1023の固定割り当て。正答②。

