- id: r5_2_setubi_q08_e
  number: "8-(2)"
  group: 問8 情報通信ネットワーク安全・信頼性基準・ソフトウェア開発・ITアセット管理
  text: |-
    ソフトウェアの開発モデルについて述べた次の文章のうち、誤っているものはどれか。
    ①ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用できる。
    ②簡単な試作ソフトウェアを作成して、ユーザの評価と改善を繰り返しながらユーザ要求を明確にしていく進め方は、ウォーターフォールモデルにおける要求定義の特徴である。
    ③ウォーターフォールモデルの設計工程では、一般に、要求定義から外部設計、内部設計といった工程が進むにつれて、段階的に設計が詳細化される。
    ④ウォーターフォールモデルのテスト工程では、一般に、単体テストから結合テスト、システムテスト、運用テストといった工程が進むにつれて、順次統合化が進められる。
  options:
  - ①ウォーターフォールの特徴
  - ②試作によるユーザ要求の明確化
  - ③設計工程の段階的詳細化
  - ④テスト工程の統合化
  answer: 2
  explanation: |-
    ②が誤り。試作ソフトウェアを作成してユーザの評価と改善を繰り返す進め方は「プロトタイピングモデル」の特徴であり、ウォーターフォールモデルの特徴ではない。ウォーターフォールは各工程を逐次的に一方向に進める。正答②。

- id: r5_2_setubi_q08_f
  number: "8-(3)"
  group: 問8 情報通信ネットワーク安全・信頼性基準・ソフトウェア開発・ITアセット管理
  text: |-
    JIS X 0164-5：2019 ITアセットマネジメントに規定されている用語及び定義について述べた次の文章のうち、誤っているものはどれか。
    ①ソフトウェアライセンシーとは、決められたソフトウェアパッケージのためのソフトウェアライセンスを発行する権利をもった個人又は組織をいう。
    ②バンドルとは、一つの購入アイテムとして複数の製品の権利を販売するマーケティング及びライセンス戦略としての製品のグループ化をいう。
    ③ベースラインとは、構成品目がそのライフサイクル上の決められた時期に、媒体に関係なく、正式に指定し確定された構成品目の正式版として認定されたものをいう。
    ④CMDBとは、各関連した構成品目の詳細及びその重要な関係性の詳細を全て包含したデータベースをいう。
  options:
  - ①ソフトウェアライセンシーの定義
  - ②バンドルの定義
  - ③ベースラインの定義
  - ④CMDBの定義
  answer: 1
  explanation: |-
    ①が誤り。ソフトウェアライセンシーとはソフトウェアのライセンスを受ける権利をもつ個人または組織（ライセンスを受ける側）をいう。ライセンスを発行する権利を持つのは「ソフトウェアライセンサー（ライセンサー）」。正答①。

