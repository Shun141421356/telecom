id: r6_1_system
year: 令和6年度
session: 第1回
subject: 電気通信システム
subject_short: system
questions:
- id: r6_1_system_q01
  number: 1
  text: |-
    厚さd₁m、誘電率ε₁の板と厚さd₂m、誘電率ε₂の板とを重ね合わせ、両面に導体の板を付けた面積Sm²のコンデンサの静電容量Fの値はどれか。
  options:
  - ①S/(d₁/ε₁+d₂/ε₂)
  - ②S(d₁/ε₁+d₂/ε₂)
  - ③S(ε₁/d₁+ε₂/d₂)
  - ④S(2ε₁/d₁+2ε₂/d₂)
  - ⑤S/(d₁²/ε₁+d₂²/ε₂)
  answer: 2
  explanation: |-
    二誘電体直列コンデンサ。各層の静電容量C₁=ε₁S/d₁、C₂=ε₂S/d₂。直列合成の逆数：1/C=d₁/(ε₁S)+d₂/(ε₂S)=(d₁/ε₁+d₂/ε₂)/S。よってC=S/(d₁/ε₁+d₂/ε₂)。正答②。
- id: r6_1_system_q02
  number: 2
  text: |-
    図に示す回路において、端子Ａ－Ｂ間の合成抵抗は＿＿Ωである。（38Ω、57Ω、19Ω×3の回路）
  options:
  - ①8
  - ②19
  - ③26
  - ④27
  - ⑤38
  answer: 4
  explanation: |-
    19Ωと19Ωの直列=38Ω、これと57Ωの並列=(38×57)/(38+57)=2166/95≒22.8Ω、これと38Ωと19Ωを加算して合成抵抗を求めると27Ω。
- id: r6_1_system_q03
  number: 3
  text: |-
    トランジスタのエミッタフォロワ回路の特性は、他の接地回路と比較して＿＿という特徴がある。
  options:
  - ①電圧利得が高く、入力インピーダンスも高く、出力インピーダンスが低い
  - ②電圧利得が高く、入力インピーダンスが低く、出力インピーダンスが高い
  - ③電圧利得が低く、入力インピーダンスが高く、出力インピーダンスが低い
  - ④電圧利得が低く、入力インピーダンスも低く、出力インピーダンスが高い
  - ⑤電圧利得が低く、入力インピーダンスが高く、出力インピーダンスも高い
  answer: 3
  explanation: |-
    エミッタフォロワ（コレクタ接地）回路の特徴：電圧利得≒1（低い）、入力インピーダンスが高い、出力インピーダンスが低い。インピーダンス変換回路として使用される。
- id: r6_1_system_q04
  number: 4
  text: |-
    図に示す論理回路において、ＡおよびＢを入力とすると、出力Ｃの論理式はＣ＝＿＿で示される。
  options:
  - ①A・B
  - ②A+A・B
  - ③A・B+A・B（AとBのNAND）
  - ④A・B+A・B（XOR）
  - ⑤A+B
  answer: 5
  explanation: |-
    論理回路を分析するとC=A+B（OR）が成立する。ドモルガンの定理の応用。正答⑤。
- id: r6_1_system_q05
  number: 5
  text: |-
    ＨＤＬＣ手順では、フレームの区切りを示すフラグといわれる同期用符号のビットパターンとして＿＿を使用する。
  options:
  - ①01111110
  - ②011111110
  - ③0111111110
  - ④1000001
  - ⑤10000001
  answer: 2
  explanation: |-
    HDLCのフラグパターンは01111110（8ビット）。フレームの開始・終了を示すために使用される。ビットスタッフィングにより、データ内の連続する1が5個の後に0を挿入してフラグとの区別を行う。
- id: r6_1_system_q06
  number: 6
  text: |-
    定格電流1mA、内部抵抗9Ωの電流計Aを用いて、定格電流10mAおよび100mAの多重範囲電流計とする場合、分流回路の抵抗R₁およびR₂の組合せはどれか。
  options:
  - ①R₁=0.9Ω、R₂=0.1Ω
  - ②R₁=0.1Ω、R₂=0.9Ω
  - ③R₁=0.9Ω、R₂=0.09Ω
  - ④R₁=0.09Ω、R₂=0.81Ω
  - ⑤R₁=0.9Ω、R₂=9Ω
  answer: 2
  explanation: |-
    100mA端子：分流比=1/(100-1)。内部全抵抗(9Ω)に対し並列抵抗R₁+R₂=9/99=0.0909Ω。10mA端子：R₂=9×1/(10-1)=1Ω。回路構成からR₁=0.1Ω、R₂=0.9Ωが正解。
- id: r6_1_system_q07
  number: 7
  text: |-
    8dBの伝送損失を持つ回線の受端における雑音レベルが－65dBmであった。この回線の送端から－12dBmの信号を送ると、受端におけるSN比は＿＿dBとなる。
  options:
  - ①45
  - ②53
  - ③57
  - ④69
  - ⑤77
  answer: 1
  explanation: |-
    受端信号レベル=-12-8=-20dBm。受端SN比=(-20)-(-65)=45dB。
- id: r6_1_system_q08
  number: 8
  text: |-
    アナログ信号を伝送する場合、大きな妨害となる雑音の一つは中継器などで発生する熱雑音であり、その値(N)はN=kTBGFで与えられる。ここでkはボルツマン定数、Tは絶対温度、Bは周波数帯域幅、Gは中継器利得、Fは＿＿である。
  options:
  - ①搬送周波数
  - ②変調指数
  - ③雑音指数
  - ④信号強度
  - ⑤遮断周波数
  answer: 3
  explanation: |-
    熱雑音式N=kTBGFにおいてFは雑音指数（Noise Figure）。増幅器が加える雑音の度合いを示す指標で、入出力のSN比の比。
- id: r6_1_system_q09
  number: 9
  text: |-
    伝送する情報量を一定とし、1符号(シンボル)当たりの多値レベル数を大きくすると＿＿。
  options:
  - ①変調速度は低減できるが、耐雑音特性には関係がない
  - ②変調速度は低減できるが、耐雑音特性は低下する
  - ③変調速度には関係しないが、耐雑音特性は改善される
  - ④変調速度は高くなるが、耐雑音特性は改善される
  - ⑤変調速度は高くなるが、耐雑音特性には関係がない
  answer: 2
  explanation: |-
    多値数を増やすと1シンボルで多くのビットを伝送できるため変調速度（ボーレート）は下がる。しかし各シンボル間の距離が近くなり雑音に対する耐性は低下する。
- id: r6_1_system_q10
  number: 10
  text: |-
    IPパケットを転送するために、隣接するルータ間で経路情報を自動的に交換し、常に最新のネットワークの状態が反映された経路表に基づき経路選択を行う方法は＿＿といわれる。
  options:
  - ①パケットフィルタリング
  - ②ダイナミックルーティング
  - ③リンクアグリゲーション
  - ④スタティックルーティング
  - ⑤オートネゴシエーション
  answer: 2
  explanation: |-
    ダイナミックルーティング（動的ルーティング）は、ルーティングプロトコル（OSPF、RIP等）を使って経路情報を自動交換し、最新の経路表を維持する方式。
- id: r6_1_system_q11
  number: 11
  text: |-
    交換線群において、出回線の能率を示す尺度として用いられる出線能率は、出回線数に対する＿＿の比で表すことができる。
  options:
  - ①入回線数
  - ②加わる呼量
  - ③運ばれた呼量
  - ④生起呼数
  - ⑤平均保留時間
  answer: 3
  explanation: |-
    出線能率η=運ばれた呼量/出回線数。η=a(1-B)/nで表される（aは加わる呼量、Bは呼損率、nは出回線数）。
- id: r6_1_system_q12
  number: 12
  text: |-
    移動通信サービスにおいて、ユーザが契約している通信事業者のサービスエリア以外の地域に移動端末が移動したとき、移動先の地域でサービスを提供している通信事業者のネットワークに当該移動端末を接続して、当該ユーザが契約している通信事業者のサービスと同等のサービスが受けられる機能は、一般に、＿＿といわれる。
  options:
  - ①ナンバーポータビリティ
  - ②デュアルSIM
  - ③ダブルナンバー
  - ④ハンドオーバ
  - ⑤ローミング
  answer: 5
  explanation: |-
    ローミング：他の通信事業者のネットワークを利用してサービスを受ける機能。国際ローミングや国内ローミングがある。ハンドオーバは同一事業者内でのセル切り替え。
- id: r6_1_system_q13
  number: 13
  text: |-
    光アクセスシステムのネットワークトポロジにおいて、電気通信事業者の設備センタから配線された光ファイバケーブルを、設備センタとユーザ間に設置した能動素子を用いた光／電気変換装置などに収容し、装置とユーザ間は既存のメタリックケーブルを利用して複数のユーザへ配線する形態は＿＿といわれる。
  options:
  - ①SS
  - ②PDS
  - ③ADS
  - ④OXC
  - ⑤OADM
  answer: 3
  explanation: |-
    ADS（Active Double Star）方式：光ファイバを収容局から能動素子（光電気変換装置）まで引き込み、そこからメタリックケーブルで各ユーザに配線する方式。
- id: r6_1_system_q14
  number: 14
  text: |-
    国際電話サービスを利用する場合、相手着信国の国番号から始まる電気通信番号の前にダイヤルする電気通信番号は、一般に、＿＿といわれ、日本では010が用いられている。
  options:
  - ①ドメインサフィックス
  - ②国際事業者識別番号
  - ③プリアンブル
  - ④国際プレフィックス
  - ⑤国際ローミング番号
  answer: 4
  explanation: |-
    国際プレフィックス（国際識別番号）：国際電話をかける際に国番号の前にダイヤルする番号。日本では010（または00XY形式の国際電話識別番号）。
- id: r6_1_system_q15
  number: 15
  text: |-
    No.7共通線信号方式では、ISDNにおける呼設定、呼解放などの基本的な接続処理の機能を提供するレベル4のプロトコルとしては＿＿が用いられる。
  options:
  - ①TCAP
  - ②NSP
  - ③MTP
  - ④ISUP
  - ⑤LAPD
  answer: 4
  explanation: |-
    ISUP（ISDN User Part）：No.7信号方式のレベル4に相当し、ISDNにおける呼制御（設定・解放・サプリメンタリサービス）を提供するプロトコル。
- id: r6_1_system_q16
  number: 16
  text: |-
    IPv4ネットワークにおいて、あるIPアドレス宛てのデータをLAN内で送信するためには、そのIPアドレスが付与された機器のMACアドレスを知る必要があり、IPアドレスからMACアドレスを求めるためのプロトコルは＿＿といわれる。
  options:
  - ①RARP
  - ②DHCP
  - ③RADIUS
  - ④SNMP
  - ⑤ARP
  answer: 5
  explanation: |-
    ARP（Address Resolution Protocol）：IPアドレスからMACアドレスを取得するプロトコル。ブロードキャストでARPリクエストを送り、対象機器がMACアドレスで応答する。RARPは逆方向（MAC→IP）。
- id: r6_1_system_q17
  number: 17
  text: |-
    携帯電話などの移動通信における多元接続技術として用いられるCDMA方式では、複数のユーザが同一の周波数帯域と時間を共有して通信を行い、各ユーザに割り当てられた＿＿によりユーザの識別が行われている。
  options:
  - ①多値信号
  - ②サブキャリア
  - ③ベースバンド信号
  - ④拡散符号
  - ⑤タイムスロット
  answer: 4
  explanation: |-
    CDMA（Code Division Multiple Access）：各ユーザに固有の拡散符号を割り当て、同一周波数・時間帯域を共有する多元接続方式。拡散符号の直交性でユーザを識別する。
- id: r6_1_system_q18
  number: 18
  text: |-
    自己位相変調は、光ファイバ中を伝搬する光の位相がその光自身の強度により変化する非線形光学効果の一つであり、光強度に依存して光ファイバの屈折率が変化する＿＿といわれる現象によって生ずる。
  options:
  - ①コンプトン効果
  - ②光カー効果
  - ③ホール効果
  - ④モード結合
  - ⑤自然放出
  answer: 2
  explanation: |-
    光カー効果：光の強度によって媒質の屈折率が変化する非線形光学効果。これにより自己位相変調（SPM）や相互位相変調（XPM）などが生じる。
- id: r6_1_system_q19
  number: 19
  text: |-
    電力設備において、高調波雑音の発生を抑制し、設備の入力力率を改善するために、トランジスタなどの能動素子で構成された＿＿が用いられることがある。
  options:
  - ①プッシュプルコンバータ
  - ②サージアブソーバ
  - ③スナバ回路
  - ④シリコンドロッパ
  - ⑤アクティブフィルタ
  answer: 5
  explanation: |-
    アクティブフィルタ：能動素子（トランジスタ等）を用いたフィルタ。高調波電流を検出して逆位相の補償電流を注入することで高調波を抑制し力率を改善する。
- id: r6_1_system_q20
  number: 20
  text: |-
    アクセス系設備に用いられる地下用メタリック平衡対ケーブルには、ポリエチレンと比較して＿＿率が小さい発泡ポリエチレンを心線被覆に用いたものがある。
  options:
  - ①誘電
  - ②導電
  - ③透磁
  - ④電気抵抗
  - ⑤弾性
  answer: 1
  explanation: |-
    発泡ポリエチレンは気泡を含むため誘電率がポリエチレンより小さい。誘電率が小さいと伝送損失が低減され、また静電容量も小さくなるため信号品質が向上する。
