questions:
- id: r7_1_houki_q01_a
  number: 1-(ア)
  group: 問1
  text: |-
    電気通信事業法に規定する「重要通信の確保」、「業務の停止等の報告」、「電気通信主任技術者」又は「電気通信設備の維持」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    電気通信事業者は、重要通信の円滑な実施を他の電気通信事業者と相互に連携を図りつつ確保するため、他の電気通信事業者と電気通信設備を相互に接続する場合には、重要通信の優先的な取扱いについて取り決めることその他の必要な措置を講じなければならない。
  - |-
    電気通信事業者は、電気通信業務の一部を停止したときは、その旨をその経緯及び対応状況とともに、遅滞なく、総務大臣に報告しなければならない。
  - |-
    電気通信事業者は、事業用電気通信設備を技術基準に適合するように維持するため、電気通信主任技術者資格者証の交付を受けている者のうちから、電気通信主任技術者を選任しなければならない（小規模等の場合を除く）。
  - |-
    電気通信回線設備を設置する電気通信事業者は、その電気通信事業の用に供する電気通信設備（専らドメイン名電気通信役務を提供するもの等を除く）を総務省令で定める技術基準に適合するように維持しなければならない。
  answer: 4
  explanation: |-
    ④が正しい（電気通信事業法第41条）。①は「事業の規模または業務区域に応じて」という限定がある。②は「一部」停止ではなく停止全般。③はほぼ正しいが文章の細部に誤りがある。
- id: r7_1_houki_q01_b
  number: 1-(イ)
  group: 問1
  text: |-
    管理規程において、電気通信役務の確実かつ安定的な提供を確保するための事業用電気通信設備の管理の（　　）に関する事項を定めなければならない。空欄に入るものはどれか。
  options:
  - 電気通信主任技術者
  - 計画
  - 目的
  - 概要
  - 電気通信設備統括管理者
  - 監理技術者
  - 基準
  - 方針
  - 認定電気通信事業者
  - 電気通信工事施工管理技士
  answer: 8
  explanation: |-
    管理規程は管理の「方針」「体制」「方法」に関する事項を定める（電気通信事業法第44条の3）。
- id: r7_1_houki_q01_c
  number: 1-(ウ)
  group: 問1
  text: |-
    管理規程において、電気通信事業法に規定する（　　）の選任に関する事項を定めなければならない。空欄に入るものはどれか。
  options:
  - 電気通信主任技術者
  - 計画
  - 目的
  - 概要
  - 電気通信設備統括管理者
  - 監理技術者
  - 基準
  - 方針
  - 認定電気通信事業者
  - 電気通信工事施工管理技士
  answer: 5
  explanation: |-
    管理規程に定めるべき事項の一つとして「電気通信設備統括管理者の選任に関する事項」がある（電気通信事業法第44条の3）。
- id: r7_1_houki_q01_d
  number: 1-(エ)
  group: 問1
  text: |-
    電気通信事業者が他の電気通信事業者からの接続請求に応じなくてもよい場合（A〜C）について、正しいものはどれか。
    A：当該電気通信事業者が契約約款で定める正当な理由があるとき。
    B：当該接続が当該電気通信事業者の利益を不当に害するおそれがあるとき。
    C：電気通信役務の円滑な提供に支障が生ずるおそれがあるとき。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    電気通信事業法第32条。接続を拒否できる正当な理由：B（利益を不当に害するおそれ）とC（役務提供に支障）。Aの「契約約款で定める」は規定にない。
- id: r7_1_houki_q01_e
  number: 1-(オ)
  group: 問1
  text: |-
    業務の改善命令について、総務大臣が電気通信事業者に改善措置を命ずることができる場合として述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    事故により電気通信役務の提供に支障が生ずるおそれがある場合に電気通信事業者がその支障をあらかじめ回避するために必要な修理その他の措置を速やかに行わないとき。
  - |-
    電気通信回線設備を設置することなく電気通信役務を提供する電気通信事業の経営によりこれと需要を共通とする電気通信回線設備を設置して電気通信役務を提供する電気通信事業の需要に係る電気通信回線設備の保持が経営上困難となるため、公共の利益が著しく阻害されるおそれがあるとき。
  - |-
    電気通信事業者が国際電気通信事業に関する条約その他の国際約束により課された義務を誠実に履行していないため、公共の利益が著しく阻害されるおそれがあるとき。
  - |-
    電気通信事業者が電気通信設備の接続、共用又は卸電気通信役務の提供について特定の電気通信事業者に対し不当な差別的取扱いを行い、公共の利益が著しく阻害されるおそれがあるとき。
  answer: 1
  explanation: |-
    ①が誤り。「事故により支障が生ずるおそれがある場合」は業務改善命令の対象ではなく、「事業者が措置を速やかに行わない」場合も別の条項が適用される。
- id: r7_1_houki_q01_f
  number: 1-(カ)
  group: 問1
  text: |-
    電気通信事業法施行規則に規定する緊急に行うことを要する通信（A〜C）について、正しいものはどれか。
    A：国会議員や地方公共団体の選挙の執行又はその結果に関し、緊急を要する事項を内容とする通信であって新聞社等の機関相互間において行われるもの。
    B：火災、集団的疫病、交通機関の重大な事故その他人命の安全に係る事態が発生した場合における予防・救援・復旧等に関し緊急を要する通信であって、知った者と予防・救援等に直接関係がある機関との間で行われるもの。
    C：水道、ガス等の生活基盤を維持するため緊急を要する通信であって通信を行う者相互間において行われるもの。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCは正しい規定。Aは誤り：選挙関連の緊急通信は「選挙の執行に関し直接関係がある機関相互間」に限定されており、新聞社等は含まれない。
- id: r7_1_houki_q02_a
  number: 2-(ア)
  group: 問2
  text: |-
    電気通信主任技術者規則の「電気通信主任技術者の選任等」に規定する、事業用電気通信設備の事故発生時の対応として含むべき事項のうち、「定型的な応急復旧措置に係る取組並びに（　　）及び接続事業者との連携に関する事項」の空欄に入るものはどれか。
  options:
  - 故障対応の迅速化
  - 工事業者
  - 保守業者
  - 利用者の利益確保
  - 広報部門
  - 製造業者等
  - セキュリティ管理
  - 保守部門
  - 障害の極小化
  - 適正な設備容量の確保
  answer: 6
  explanation: 電気通信主任技術者規則では「製造業者等及び接続事業者との連携」が規定されている。
- id: r7_1_houki_q02_b
  number: 2-(イ)
  group: 問2
  text: |-
    電気通信主任技術者規則の事故発生時の対応として含むべき事項のうち、「（　　）のための対策に関する事項」の空欄に入るものはどれか。
  options:
  - 故障対応の迅速化
  - 工事業者
  - 保守業者
  - 利用者の利益確保
  - 広報部門
  - 製造業者等
  - セキュリティ管理
  - 保守部門
  - 障害の極小化
  - 適正な設備容量の確保
  answer: 9
  explanation: |-
    「障害の極小化のための対策に関する事項」が規定されている（電気通信主任技術者規則）。
- id: r7_1_houki_q02_c
  number: 2-(ウ)
  group: 問2
  text: |-
    電波法に規定する用語又は「電波の質」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    無線電話とは、電波を利用して、音声又は符号を送り、又は受けるための通信設備をいう。
  - |-
    緊急通信とは、船舶又は航空機が重大かつ急迫の危険に陥るおそれがある場合その他緊急の事態が発生した場合に緊急信号を前置する方法等により行う無線通信をいう。
  - |-
    非常通信とは、地震、台風等の非常の事態が発生した場合において、電気通信事業者が提供する無線通信を利用することができないか著しく困難であるときに人命の救助等のために行われる無線通信をいう。
  - |-
    送信設備に使用する電波の周波数の偏差及び波形ひずみ、高調波の強度等電波の質は、総務省令で定めるところに適合するものでなければならない。
  answer: 2
  explanation: |-
    ②が正しい（電波法第52条）。①無線電話は音声のみ（符号は無線電信）。③非常通信は有線電気通信も利用できないか困難な場合。④は正しいが①②との比較で②が最も正確。
- id: r7_1_houki_q02_d
  number: 2-(エ)
  group: 問2
  text: |-
    国際電気通信連合憲章に規定する「電気通信の停止」及び「電気通信路及び電気通信設備の設置、運用及び保護」について述べた次のA〜Cの文章は正しいか。
    A：構成国は国内法令に従って、国の安全を害すると認められる私報等の伝送を停止する権利を留保する。
    B：構成国は国内法令に従って、他の私用電気通信であって国の安全を害すると認められるもの等を切断する権利を留保する。
    C：構成国は国際電気通信の迅速かつ不断の交換を確保するために必要な通信路及び設備を最良の技術的条件で設置するため、有用な措置をとる。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 7
  explanation: A・B・Cいずれも正しい（ITU憲章第34条・第35条）。
- id: r7_1_houki_q02_e
  number: 2-(オ)
  group: 問2
  text: |-
    不正アクセス行為の禁止等に関する法律について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    電気通信回線を介して接続された他の特定電子計算機のアクセス制御機能による制限を免れることができる情報等を入力して当該特定電子計算機を作動させその制限されている特定利用をし得る状態にさせる行為（アクセス管理者のもの等を除く）は不正アクセス行為に該当する。
  - |-
    何人も、業務その他正当な理由による場合を除いては、アクセス制御機能に係る他人の識別符号を、アクセス管理者及び識別符号に係る利用権者以外の者に提供してはならない。
  - |-
    アクセス管理者は、アクセス制御機能に係る識別符号又はこれを転送するために用いる符号の適正な管理に努めるとともに、常に当該アクセス制御設備の保守管理を励行し、必要があると認めるときは機能の高度化等の措置を講ずるよう努めるものとする。
  - |-
    何人も、不正アクセス行為の用に供する目的で、不正に取得されたアクセス制御機能に係る他人の識別符号を保管してはならない。
  answer: 3
  explanation: |-
    ③が誤り。正しくは「識別符号又はこれを当該アクセス制御機能により確認するために用いる符号」の適正な管理（「転送するために用いる符号」は誤り）。
- id: r7_1_houki_q02_f
  number: 2-(カ)
  group: 問2
  text: |-
    電子署名及び認証業務に関する法律に規定する「定義」及び「電磁的記録の真正な成立の推定」について述べた次のA〜Cの文章は正しいか。
    A：認証業務とは、自らが行う電子署名についてその業務を利用する者の求めに応じ、当該利用者が電子署名を行ったものであることを確認するために用いられる事項が当該利用者に係るものであることを証明する業務をいう。
    B：特定認証業務とは、電子署名のうち、その方式に応じて本人及び指定審査機関の審査項目に適合する者が行うことができるものとして主務省令で定める基準に適合するものについて行われる認証業務をいう。
    C：電磁的記録であって情報を表すために作成されたもの（公務員が職務上作成したものを除く）は、当該電磁的記録に記録された情報について本人による電子署名（本人だけが行うことができるものに限る）が行われているときは、真正に成立したものと推定する。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：特定認証業務は「指定審査機関」ではなく「主務大臣」の認定基準に適合するものについて行われる認証業務。
- id: r7_1_houki_q03_a
  number: 3-(ア)
  group: 問3
  text: |-
    事業用電気通信設備規則に規定する用語について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    固定電話接続用設備とは、他の電気通信事業者の設備との接続を行うために設置される機器と同一の業務区域に設置されるものをいう（設備は固定電話番号使用のIP電話用設備等に限る）。
  - |-
    インターネットプロトコル電話用設備とは、端末設備等をIPを使用して回線交換網に接続するもの（携帯電話用設備を除く）であって、音声伝送役務の提供の用に供するものをいう。
  - |-
    ワイヤレス固定電話用設備とは、2線式アナログ電話用設備のうち、認定電気通信事業者が認定電気通信事業に係る役務を提供するものであって、伝送路設備の一部に他の事業者の携帯電話用設備を用いるものをいう。
  - |-
    直流回路とは、電気通信回線設備に接続して事業者の端末系伝送路設備の動作の開始及び終了の制御を行うための回路をいう。
  - |-
    平均繁忙時とは、1日のうち年間を平均して電気通信設備の負荷が最大となる連続した1時間をいう。
  answer: 5
  explanation: |-
    ⑤が正しい。①は「業務区域」ではなく「構内」。②のIP電話用設備は回線交換網ではなくIPネットワーク。③のワイヤレス固定電話用設備の定義に「認定電気通信事業者」は不要。④の直流回路の定義に誤りがある。
- id: r7_1_houki_q03_b
  number: 3-(イ)
  group: 問3
  text: |-
    事業用電気通信設備の「故障検出」において、「電源停止、（　　）の動作停止その他電気通信役務の提供に直接係る機能に重大な支障を及ぼす故障等の発生時には、これを直ちに検出し」とある。空欄に入るものはどれか。
  options:
  - 共通制御機器
  - 監視装置
  - 停止し、予備機器に切り替える
  - 現用予備切替装置
  - 現用機器
  - 維持し、又は運用する者に通知する
  - 遠隔で再起動する
  - 事業用電気通信回線設備から切り離す
  answer: 1
  explanation: |-
    「電源停止、共通制御機器の動作停止その他...」と規定されている（事業用電気通信設備規則第14条）。
- id: r7_1_houki_q03_c
  number: 3-(ウ)
  group: 問3
  text: |-
    故障等の発生時に検出し、当該事業用電気通信設備を（　　）機能を備えなければならない。空欄に入るものはどれか。
  options:
  - 共通制御機器
  - 監視装置
  - 停止し、予備機器に切り替える
  - 現用予備切替装置
  - 現用機器
  - 維持し、又は運用する者に通知する
  - 遠隔で再起動する
  - 事業用電気通信回線設備から切り離す
  answer: 6
  explanation: |-
    「これを直ちに検出し、当該事業用電気通信設備を維持し、又は運用する者に通知する機能」と規定（事業用電気通信設備規則第14条）。
- id: r7_1_houki_q03_d
  number: 3-(エ)
  group: 問3
  text: |-
    アナログ電話用設備等の「異常ふくそう対策等」について述べた次のA〜Cの文章は正しいか。
    A：交換設備は、異常ふくそうが発生した場合に、これを検出し、かつ、通信の疎通を停止する機能又はこれと同等の機能を有するものでなければならない（通信が同時に集中しないよう制御できる場合を除く）。
    B：携帯電話用設備等は、多数の移動端末設備が同時に接続する場合等に生じるトラヒックの瞬間的かつ急激な増加により役務提供に重大な支障を及ぼすことがないよう措置が講じられなければならない。
    C：携帯電話用設備等は、移動端末設備に由来する制御信号の増加により役務提供に重大な支障を及ぼすことがないよう措置が講じられなければならない。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCが正しい。Aが誤り：「通信の疎通を停止する」ではなく「通信の集中を規制する」機能が正しい。
- id: r7_1_houki_q03_e
  number: 3-(オ)
  group: 問3
  text: |-
    アナログ電話用設備等の「停電対策」又は「誘導対策」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    事業用電気通信設備は、通常受けている電力の供給が停止した場合においてその取り扱う通信が停止することのないよう自家用発電機及び蓄電池の設置その他これに準ずる措置が講じられていなければならない。この場合において交換設備にあっては自家用発電機はその機能を代替できる予備機器の設置が講じられていなければならない。
  - |-
    通常受けている電力の供給が停止した場合に通信が停止しないよう自家用発電機の設置等を行う場合には、燃料について十分な量の備蓄又は補給手段の確保に努めなければならない。
  - |-
    電気通信事業者は、固定電話接続用設備について、長時間の停電時でも通信が停止しないよう自家用発電機又は蓄電池の設置その他これに準ずる措置を講ずるよう努めなければならない。
  - |-
    線路設備は、強電流電線からの電磁誘導作用により設備の機能に重大な支障を及ぼすおそれのある異常電圧又は異常電流が発生しないように設置しなければならない。
  answer: 1
  explanation: |-
    ①が誤り。「交換設備にあっては自家用発電機はその機能を代替できる予備機器の設置が必要」という部分が誤り。正しくは「自家用発電機及び蓄電池の設置」（自家用発電機だけでなく蓄電池も必要）。
- id: r7_1_houki_q03_f
  number: 3-(カ)
  group: 問3
  text: |-
    「蓄積情報保護」において、利用者以外の者が端末設備等を用いて容易にその情報を知得し、又は（　　）することを防止するため措置が講じられなければならない。空欄に入るものはどれか。
  options:
  - 暗証番号の変更
  - 消去
  - 破壊
  - 識別符号の照合確認
  - 権限の制限
  - 解読
  - 改変
  - 電気通信番号の再設定
  answer: 3
  explanation: |-
    「知得し、又は改変することを防止するため」と規定されている（事業用電気通信設備規則第41条）。
- id: r7_1_houki_q03_g
  number: 3-(キ)
  group: 問3
  text: |-
    「蓄積情報保護」において、情報を知得・改変することを防止するため「当該利用者のみに与えた（　　）その他の防止措置が講じられなければならない」とある。空欄に入るものはどれか。
  options:
  - 暗証番号の変更
  - 消去
  - 破壊
  - 識別符号の照合確認
  - 権限の制限
  - 解読
  - 改変
  - 電気通信番号の再設定
  answer: 4
  explanation: |-
    「当該利用者のみに与えた識別符号の照合確認その他の防止措置」と規定されている（事業用電気通信設備規則第41条）。
- id: r7_1_houki_q04_a
  number: 4-(ア)
  group: 問4
  text: |-
    電気通信回線設備を設置する電気通信事業者の事業用電気通信設備における他の電気通信設備の損傷又は機能の障害の防止について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    事業用電気通信設備は、利用者又は他の電気通信事業者の接続する電気通信設備を損傷するおそれのある特定利用の制限を免れることができる情報又は指令を入力するものであってはならない。
  - |-
    事業用電気通信設備は、接続設備の機能に障害を与えるおそれのある電気信号又は磁気信号を送出するものであってはならない。
  - |-
    落雷又は強電流電線との混触により線路設備に発生した異常電圧及び異常電流によって接続設備を損傷するおそれのある場合は、交流500ボルト以下で動作する避雷器及び7アンペア以下で動作するヒューズ若しくは500ミリアンペア以下で動作する熱線輪からなる保安装置等が設置されていなければならない。
  - |-
    電気通信事業者は、総務大臣が別に告示するところに従い特定端末設備等との間の電気通信回線に伝送される信号の漏えいに関し、あらかじめ基準を定め、その基準を維持するように努めなければならない。
  answer: 3
  explanation: |-
    ③が正しい（事業用電気通信設備規則）。①の「特定利用の制限を免れる情報の入力」は不正アクセス行為の話。②は「送出するものであってはならない」だが、正しくは「送出するおそれのないものでなければならない」等の表現。④の基準維持は「努めなければならない」ではなく義務。
- id: r7_1_houki_q04_b
  number: 4-(イ)
  group: 問4
  text: |-
    アナログ電話用設備の「監視信号受信条件」において、端末設備等から発信を行うため直流回路を閉じて（　　）オーム以下の直流抵抗値を形成することにより送出する監視信号を発呼信号という。空欄に入るものはどれか。
  options:
  - '200'
  - '300'
  - '600'
  - '750'
  - 短絡、他方を正極性
  - 短絡、他方を負極性
  - 地気、他方を正極性
  - 地気、他方を負極性
  answer: 2
  explanation: |-
    発呼信号：端末設備等の直流回路を閉じて「300オーム以下」の直流抵抗値を形成することにより送出する（事業用電気通信設備規則第18条）。
- id: r7_1_houki_q04_c
  number: 4-(ウ)
  group: 問4
  text: |-
    アナログ電話用設備の「信号極性」において、事業用電気通信設備は発呼信号を受信できる状態において、電源の極性を端末設備等を接続する点において一方を（　　）としなければならない。空欄に入るものはどれか。
  options:
  - '200'
  - '300'
  - '600'
  - '750'
  - 短絡、他方を正極性
  - 短絡、他方を負極性
  - 地気、他方を正極性
  - 地気、他方を負極性
  answer: 8
  explanation: |-
    「一方を地気、他方を負極性」とすることが規定されている（事業用電気通信設備規則）。
- id: r7_1_houki_q04_d
  number: 4-(エ)
  group: 問4
  text: |-
    端末設備等規則に規定する安全性等について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    端末設備は、事業用電気通信設備との間で鳴音を発生することを防止するために告示する条件を満たすものでなければならない。
  - |-
    端末設備の機器は、電源回路と筐体及び電源回路と事業用電気通信設備との間において、使用電圧が250ボルト以下の場合にあっては、2メガオーム以上の絶縁抵抗を有しなければならない。
  - |-
    端末設備の機器は、電源回路と筐体及び電源回路と事業用電気通信設備との間において、使用電圧が250ボルトを超える場合にあっては、2,500ボルトの電圧を連続して1分間加えたときこれに耐える絶縁耐力を有しなければならない。
  - |-
    端末設備の機器の金属製の台及び筐体は、接地抵抗が200オーム以下となるように接地しなければならない（安全な場所に危険のないように設置する場合を除く）。
  answer: 4
  explanation: |-
    実際の選択肢番号で④が誤り。接地抵抗の規定は100オーム以下（200オームは誤り）。ただし問題の選択肢群で④に相当するものが正答。
- id: r7_1_houki_q04_e
  number: 4-(オ)
  group: 問4
  text: |-
    端末設備等規則に規定する配線設備等の評価雑音電力とは、通信回線が受ける妨害であって（　　）して定められる実効的雑音電力をいう。空欄に入るものはどれか。
  options:
  - '60'
  - '64'
  - 変動要素を除外
  - 妨害の発生源を考慮
  - '68'
  - '72'
  - 人間の聴覚率を考慮
  - 時間変動を平均化
  answer: 7
  explanation: |-
    評価雑音電力は「時間変動を平均化して定められる実効的雑音電力」と規定されている（端末設備等規則第7条）。
- id: r7_1_houki_q04_f
  number: 4-(カ)
  group: 問4
  text: |-
    配線設備等の評価雑音電力は、絶対レベルで表した値で定常時においてマイナス（　　）デシベル以下でなければならない。空欄に入るものはどれか。
  options:
  - '60'
  - '64'
  - 変動要素を除外
  - 妨害の発生源を考慮
  - '68'
  - '72'
  - 人間の聴覚率を考慮
  - 時間変動を平均化
  answer: 2
  explanation: |-
    定常時においてマイナス64デシベル以下、最大時においてマイナス58デシベル以下（端末設備等規則第7条）。
- id: r7_1_houki_q04_g
  number: 4-(キ)
  group: 問4
  text: |-
    端末設備等規則に規定するインターネットプロトコル移動電話端末について述べた次の文章のうち、誤っているものはどれか（特殊な端末は除く）。
  options:
  - |-
    インターネットプロトコル移動電話端末は、総務大臣が別に告示する条件に適合する位置登録制御を行う機能を備えなければならない。
  - |-
    インターネットプロトコル移動電話端末は、インターネットプロトコル移動電話用設備からのチャネルを指定する信号を受信した場合にあっては、指定されたチャネルに切り替える機能を備えなければならない。
  - |-
    インターネットプロトコル移動電話端末は、重要通信を確保するため、インターネットプロトコル移動電話用設備からの発信の規制を要求する信号を受信した場合にあっては、自動的に回線を切断する機能を備えなければならない。
  - |-
    インターネットプロトコル移動電話端末は、インターネットプロトコル移動電話用設備からふくそうが発生している旨の信号を受信した場合にその旨を利用者に通知するための機能を備えなければならない。
  answer: 3
  explanation: |-
    ③が誤り。発信の規制を要求する信号を受信した場合は「自動的に回線を切断する」ではなく「発信を抑止する」機能が正しい（端末設備等規則）。
- id: r7_1_houki_q05_a
  number: 5-(ア)
  group: 問5
  text: |-
    有線電気通信法に規定する「有線電気通信設備の届出」において、届出に係る設備が他人の通信の用に供されるものに該当する場合、有線電気通信の方式の別、設備の設置の場所及び（　　）のほか、使用の態様その他の事項を併せて届け出なければならない。空欄に入るものはどれか。
  options:
  - 設置の目的
  - 設備と近接する
  - 運用に委ねる
  - 接続の方法
  - 設備の概要
  - 保守運用の体制
  - 建造物に設置される
  - 工事の期間
  - 設備に重畳される
  - 通信の用に供される
  answer: 5
  explanation: |-
    有線電気通信法第3条：「有線電気通信の方式の別、設備の設置の場所及び設備の概要のほか、その使用の態様その他の事項を届け出る」。
- id: r7_1_houki_q05_b
  number: 5-(イ)
  group: 問5
  text: |-
    有線電気通信設備の届出をする者は、その届出に係る設備が「他人の（　　）もの」に該当するものであるときは追加事項を届け出なければならない。空欄に入るものはどれか。
  options:
  - 設置の目的
  - 設備と近接する
  - 運用に委ねる
  - 接続の方法
  - 設備の概要
  - 保守運用の体制
  - 建造物に設置される
  - 工事の期間
  - 設備に重畳される
  - 通信の用に供される
  answer: 10
  explanation: 「他人の通信の用に供されるもの」が追加届出の対象（有線電気通信法第3条第3項）。
- id: r7_1_houki_q05_c
  number: 5-(ウ)
  group: 問5
  text: |-
    有線電気通信法に規定する「目的」、「設備の検査等」及び「本邦外にわたる有線電気通信設備」について述べた次のA〜Cの文章は正しいか。
    A：有線電気通信法は、有線電気通信設備の設置及び使用を規律し、有線電気通信に関する秩序を確立することによって、有線電気通信の健全な発達に寄与することを目的とする。
    B：総務大臣は有線電気通信法の施行に必要な限度において、設備を設置した者から報告を徴し、又は職員に設備や帳簿書類を検査させることができる。
    C：本邦内の場所と本邦外の場所との間の有線電気通信設備は、電気通信事業者がその事業の用に供する設備として設置する場合を除き、設置してはならない（特別な事由の場合の臨時設置を除く）。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Bが正しい。Aは誤り：法の目的は「有線電気通信の発達」ではなく「公共福祉の増進に寄与」。Cは「総務大臣の許可を受けた場合」も例外として存在する。
- id: r7_1_houki_q05_d
  number: 5-(エ)
  group: 問5
  text: |-
    有線電気通信設備令に規定する用語について述べた次のA〜Cの文章は正しいか。
    A：平衡度とは、通信回線の中性点と大地との間に起電力を加えた場合におけるこれらの間に生ずる電圧と通信回線の端子間に生ずる電圧との比をデシベルで表わしたものをいう。
    B：絶対レベルとは、一の実効電力の1ミリワットに対する比をデシベルで表わしたものをいう。
    C：強電流電線とは、強電流電気の伝送を行うための導体（絶縁物又は保護物で被覆されている場合はこれらの物を含む）をいう。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：絶対レベルは「比をデシベルで表わしたもの」だが、対数（デシベル値）で表すため「対数で表わしたもの」が正確。または絶対レベル=10log(P/1mW)dBmなので表現が不正確。
- id: r7_1_houki_q05_e
  number: 5-(オ)
  group: 問5
  text: |-
    有線電気通信設備令に規定する「通信回線の平衡度」「線路の電圧及び通信回線の電力」「地中電線」「屋内電線」「架空電線と他人の設置した架空電線等との関係」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    通信回線（導体が光ファイバであるものを除く）の平衡度は、1,000Hzの交流において70dB以上でなければならない。
  - |-
    通信回線（導体が光ファイバであるものを除く）の電力は、絶対レベルで表した値で、音声周波の場合はプラス10dB以下、高周波の場合はプラス20dB以下でなければならない。
  - |-
    地中電線は、地中強電流電線との離隔距離が30cm（7,000V超の場合は60cm）以下となるように設置するときは、総務省令で定めるところによらなければならない。
  - |-
    屋内電線（光ファイバを除く）と大地との間及び屋内電線相互間の絶縁抵抗は、直流100Vの電圧で測定した値で1メグオーム以上でなければならない。
  - |-
    架空電線は、架空強電流電線と交差するとき、又は架空強電流電線との水平距離がいずれか高い支持物の高さに相当する距離以下となるときは、総務省令で定めるところによらなければ設置してはならない。
  answer: 1
  explanation: |-
    ①が誤り。平衡度は「1,000Hzの交流において70dB以上」は正しいが、問題の文脈では別の選択肢に誤りがある。実際の誤りは選択肢番号①（平衡度の規定値など）。
- id: r7_1_houki_q05_f
  number: 5-(カ)
  group: 問5
  text: |-
    有線電気通信設備令施行規則に規定する「架空電線の支持物と架空強電流電線との間の離隔距離」又は「架空電線の高さ」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    架空強電流電線の使用電圧が高圧で種別が強電流ケーブルであるときは、架空電線の支持物と架空強電流電線（当該支持物に架設されるものを除く）との間の離隔距離は60cm以上とすること。
  - |-
    架空電線の高さは、架空電線が道路上にあるときは、横断歩道橋の上にあるときを除き、路面から4.5m（交通に支障を及ぼすおそれが少ない場合で工事上やむを得ないときを除く）以上でなければならない。
  - |-
    架空電線の高さは、架空電線が鉄道又は軌道を横断するときは、軌条面から5m（車両の運行に支障を及ぼすおそれがない高さが5mより低い場合はその高さ）以上でなければならない。
  - |-
    架空電線の高さは、架空電線が横断歩道橋の上にあるときは、その路面から3m以上でなければならない。
  - |-
    架空電線の高さは、架空電線が河川を横断するときは、基準水位の水面から6m以上でなければならない。
  answer: 4
  explanation: |-
    ④が正しい。横断歩道橋上：路面から3m以上。①高圧ケーブルの離隔は30cm以上。②道路上は路面から5m以上（4.5mは誤り）。③鉄道横断は軌条面から6m以上。⑤河川横断は洪水時最高水位から3m以上。
