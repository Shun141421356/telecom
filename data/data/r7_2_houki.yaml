questions:
- id: r7_2_houki_q01_a
  number: 1-(ア)
  group: 問1
  text: |-
    電気通信事業法又は電気通信事業法施行規則に規定する用語について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    電気通信事業とは、電気通信役務を他人の需要に応ずるために提供する事業（放送局設備供給役務に係る事業を除く。）をいう。
  - |-
    電気通信役務とは、電気通信設備を用いて他人の通信を媒介し、その他電気通信設備を他人の通信の用に供することをいう。
  - |-
    音声伝送役務とは、おおむね4キロヘルツ帯域の音声その他の音響を伝送交換する機能を有する電気通信設備を他人の通信の用に供する電気通信役務であって専用役務以外のものをいう。
  - |-
    特定移動通信役務とは、電気通信事業法に規定する特定移動端末設備と接続される伝送路設備を用いる電気通信役務をいう。
  - |-
    データ伝送役務とは、専ら符号又は影像を伝送交換するための電気通信設備を他人の通信の用に供する電気通信役務をいう。
  answer: 3
  explanation: |-
    ③が誤り。特定移動通信役務の定義が誤っている。正しくは「特定移動端末設備との間の通信」の用に供する役務。
- id: r7_2_houki_q01_b
  number: 1-(イ)
  group: 問1
  text: 基礎的電気通信役務のうち、第一号基礎的電気通信役務とは、何に係る電気通信役務か。
  options:
  - 卸
  - 電話
  - 緊急通報
  - ドメイン名
  - 指定
  - 携帯電話
  - 重要通信
  - 高速度データ伝送
  - 移動
  - 災害時優先通信
  answer: 2
  explanation: |-
    第一号基礎的電気通信役務は電話に係る電気通信役務（固定電話など）。あまねく全国に提供確保されるべきもの。
- id: r7_2_houki_q01_c
  number: 1-(ウ)
  group: 問1
  text: |-
    基礎的電気通信役務のうち、第二号基礎的電気通信役務とは、どのような電気通信役務か。
  options:
  - 卸
  - 電話
  - 緊急通報
  - ドメイン名
  - 指定
  - 携帯電話
  - 重要通信
  - 高速度データ伝送
  - 移動
  - 災害時優先通信
  answer: 8
  explanation: |-
    第二号基礎的電気通信役務は高速度データ伝送電気通信役務（ブロードバンドサービスなど）。
- id: r7_2_houki_q01_d
  number: 1-(エ)
  group: 問1
  text: |-
    電気通信事業法に規定する「電気通信事業の登録」、「登録の取消し」などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    電気通信事業を営もうとする者は、総務大臣の登録を受けなければならない。ただし、電気通信回線設備の規模及び設置区域の範囲が総務省令で定める基準を超えない場合は、この限りでない。
  - 登録申請書の記載事項に「電気通信の方式の別」と「電気通信設備の概要」は含まれる。
  - |-
    総務大臣は、登録を受けた者が電気通信事業法等に違反した場合において、国民の利便の確保を阻害すると認めるときは、電気通信事業の登録を取り消すことができる。
  - |-
    電気通信事業者は、電気通信事業の全部又は一部を休止・廃止しようとするときは、総務大臣の認可を受けなければならない。
  - |-
    総務大臣は、電気通信役務の提供に支障が生ずるおそれがある場合、電気通信事業者に業務の方法の改善その他の措置をとるべきことを命ずることができる。
  answer: 1
  explanation: |-
    ①が正しい（電気通信事業法第9条）。④は誤り：休廃止は届出（認可ではない）。③は誤り：法令違反で「国民の利便を著しく阻害」の場合に取消し可能。
- id: r7_2_houki_q01_e
  number: 1-(オ)
  group: 問1
  text: |-
    電気通信設備の維持に基づき技術基準により確保されなければならない事項（A～C）について、正しいものはどれか。
    A：利用者等の接続設備を損傷し、人体に危害を及ぼさないようにすること。
    B：設備の損壊・故障により、役務の提供に著しい支障を及ぼさないようにすること。
    C：電気通信役務の提供が公平であるようにすること。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    技術基準で確保すべき事項はA（損傷・危害防止）とB（支障防止）。Cの「公平」は技術基準ではなく別の規定事項。よってA、Bが正しい。
- id: r7_2_houki_q01_f
  number: 1-(カ)
  group: 問1
  text: |-
    電気通信設備統括管理者の選任条件のうち、事業運営上の重要な（　　）する管理的地位にあること、という要件に当てはまるものはどれか。
  options:
  - 資格の保有
  - 決定に参画
  - 法令の理解
  - 業務を監督
  - 改善を命令
  - 施策を実行
  - 実務の経験
  - 部門を統括
  - 技術の習得
  - 専門的な知識
  answer: 2
  explanation: |-
    電気通信設備統括管理者は「事業運営上の重要な決定に参画する管理的地位にある者」でなければならない（電気通信事業法第44条の2）。
- id: r7_2_houki_q01_g
  number: 1-(キ)
  group: 問1
  text: |-
    電気通信設備統括管理者の選任条件のうち、電気通信設備の管理に関する一定の（　　）その他の要件を備えること、に当てはまるものはどれか。
  options:
  - 資格の保有
  - 決定に参画
  - 法令の理解
  - 業務を監督
  - 改善を命令
  - 施策を実行
  - 実務の経験
  - 部門を統括
  - 技術の習得
  - 専門的な知識
  answer: 7
  explanation: |-
    電気通信設備統括管理者は「電気通信設備の管理に関する一定の実務の経験」を有することが要件（電気通信事業法施行規則）。
- id: r7_2_houki_q02_a
  number: 2-(ア)
  group: 問2
  text: |-
    電気通信主任技術者規則などに規定する内容（A～C）について、正しいものはどれか。
    A：選任・解任の届出は都道府県知事を経由して総務大臣に提出。
    B：資格者証の交付を受けた日から2年を経過しない者を選任した場合は3年以内に講習を受けさせる。
    C：資格者証の交付を受けた者は端末設備等の専門的知識・能力の向上を図るよう努める。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Aは誤り（総務大臣へ直接提出、都道府県知事経由ではない）。Bは正しい。Cは誤り（電気通信主任技術者に関する知識・能力の向上に努める）。よってBのみ正しい。
- id: r7_2_houki_q02_b
  number: 2-(イ)
  group: 問2
  text: 電波法に規定する用語について述べた次の文章のうち、誤っているものはどれか。
  options:
  - 電波とは、300万メガヘルツ以下の周波数の電磁波をいう。
  - 無線電信とは、電波を利用して、符号を送り、又は受けるための通信設備をいう。
  - |-
    無線設備とは、無線電信、無線電話その他電波を利用して、他人の通信を媒介し、他人の通信の用に供するための電気的設備をいう。
  - |-
    無線局とは、無線設備及び無線設備の操作を行う者の総体をいい、受信のみを目的とするものを含まない。
  - |-
    無線従事者とは、無線設備の操作又はその監督を行う者であって、総務大臣の免許を受けたものをいう。
  answer: 3
  explanation: |-
    ③が誤り。無線設備は「他人の通信を媒介し、他人の通信の用に供するための」という限定はない。自己の通信のためのものも含む。
- id: r7_2_houki_q02_c
  number: 2-(ウ)
  group: 問2
  text: |-
    国際電気通信連合憲章に規定する「国際電気通信業務を利用する公衆の権利」において、各種類の通信において業務、（　　）は、すべての利用者に対し、いかなる優先権又は特恵も与えることなく同一とする、とされている空欄に入るものはどれか。
  options:
  - 犯罪防止に対応
  - 規約及び約款
  - 国際法に準拠
  - 方式及び機能
  - 技術基準に規定
  - 標準化に寄与
  - 維持及び運用
  - 料金及び保障
  - システムに適合
  - サービス及び品質
  answer: 8
  explanation: ITU憲章第33条：業務、料金及び保障はすべての利用者に同一とする。
- id: r7_2_houki_q02_d
  number: 2-(エ)
  group: 問2
  text: |-
    国際電気通信連合憲章に規定する「電気通信の秘密」において、構成国は国際通信の秘密を確保するため、使用される電気通信の（　　）するすべての可能な措置をとることを約束する、の空欄に入るものはどれか。
  options:
  - 犯罪防止に対応
  - 規約及び約款
  - 国際法に準拠
  - 方式及び機能
  - 技術基準に規定
  - 標準化に寄与
  - 維持及び運用
  - 料金及び保障
  - システムに適合
  - サービス及び品質
  answer: 9
  explanation: |-
    ITU憲章第37条：電気通信の秘密を確保するため「維持及び運用する」すべての可能な措置をとることを約束。
- id: r7_2_houki_q02_e
  number: 2-(オ)
  group: 問2
  text: |-
    不正アクセス行為の禁止等に関する法律（A～C）について、正しいものはどれか。
    A：都道府県公安委員会による援助措置等を定める。
    B：不正アクセス行為の発生状況を半年ごとに少なくとも1回公表する。
    C：アクセス管理者は識別符号の適正な管理に努め、機能の有効性を常に検証する。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: AとCが正しい。Bは誤り：公表は「毎年少なくとも1回」（半年ごとではない）。
- id: r7_2_houki_q02_f
  number: 2-(カ)
  group: 問2
  text: |-
    電子署名及び認証業務に関する法律に規定する事項について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    この法律は、電子署名に関し、電磁的記録の真正な成立の推定、特定認証業務に関する認定の制度その他必要な事項を定める。
  - |-
    電磁的記録とは、電子的方式、磁気的方式その他人の知覚によっては認識することができない方式で作られる記録であって、電子計算機による情報処理の用に供されるものをいう。
  - |-
    電子署名とは、当該情報が当該措置を行った者の作成に係るものであることを示すためのものであること及び当該情報について認証が行われていることを確認することができるものをいう。
  - |-
    認証業務とは、自らが行う電子署名についてその業務を利用する者の求めに応じ、当該利用者が電子署名を行ったものであることを確認するために用いられる事項が当該利用者に係るものであることを証明する業務をいう。
  answer: 3
  explanation: |-
    ③が誤り。電子署名の定義において「改ざんが行われていないことを確認できる」ことが要件（認証ではなく改ざん検知）。
- id: r7_2_houki_q03_a
  number: 3-(ア)
  group: 問3
  text: |-
    事業用電気通信設備規則に規定する用語について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    メタルインターネットプロトコル電話用設備とは、2線式アナログ電話用設備のうち、他の電気通信事業者の設備を接続する点においてIPを使用するもの（ワイヤレス固定電話用設備を除く。）をいう。
  - |-
    IPを用いた総合デジタル通信用設備とは、総合デジタル通信用設備のうち、他の電気通信事業者の設備を接続する点においてIPを使用するものをいう。
  - |-
    固定電話接続用設備とは、固定電話番号を使用して役務を提供するIP電話用設備等であって、他の電気通信事業者の設備との接続を行うために設置される機器と同一の構内に設置されるものをいう。
  - |-
    特定携帯電話用設備とは、特定接続電話番号により識別するための設備及びこれと一体として設置される設備（携帯電話用設備を除く。）であって、携帯無線通信による役務提供に用いるものをいう。
  - |-
    国際交換設備とは、本邦外の場所への発信又は本邦外からの着信を行う機能を有する交換設備をいう。
  answer: 4
  explanation: |-
    ④が誤り。固定電話接続用設備の定義として選択肢③の記述は「他の電気通信事業者との接続機器と同一構内」という点が誤り（異なる構内も対象）。
- id: r7_2_houki_q03_b
  number: 3-(イ)
  group: 問3
  text: |-
    アナログ電話用設備等の「予備機器等」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    伝送路設備には、予備の電気通信回線を設置しなければならない。ただし、故障時に端末回線で疎通が確保できるものはこの限りでない。
  - |-
    伝送路設備に共通に使用される機器は、予備機器の設置・配備の措置が講じられ、故障時に速やかに切り替えられるようにしなければならない。
  - 交換設備相互間を接続する伝送路設備は、複数の経路により設置されなければならない。
  - |-
    固定電話接続用設備は、故障等の発生時に他の地域に設置された固定電話接続用設備に速やかに切り替えられるようにしなければならない。
  answer: 1
  explanation: |-
    ①が誤り。「端末回線により疎通が確保できるものはこの限りでない」という適用除外は規定されていない。
- id: r7_2_houki_q03_c
  number: 3-(ウ)
  group: 問3
  text: |-
    アナログ電話用設備等の「試験機器及び応急復旧機材の配備」において、事業用電気通信設備の工事・維持・運用を行う事業場には、設備の（　　）に必要な試験機器の配備がなされていなければならない。空欄に入るものはどれか。
  options:
  - 機能の確認
  - 代替の機器
  - 人工衛星局
  - 点検及び検査
  - 認証及び検定
  - 免許の申請
  - 緊急通報装置
  - 評価及び認定
  - 一時的な端末設備
  - 臨時の電気通信回線
  answer: 4
  explanation: |-
    事業用電気通信設備の「点検及び検査」に必要な試験機器の配備が義務付けられている（事業用電気通信設備規則第17条）。
- id: r7_2_houki_q03_d
  number: 3-(エ)
  group: 問3
  text: 応急復旧措置において設置が必要とされる「（　　）の設置」に入るものはどれか。
  options:
  - 機能の確認
  - 代替の機器
  - 人工衛星局
  - 点検及び検査
  - 認証及び検定
  - 免許の申請
  - 緊急通報装置
  - 評価及び認定
  - 一時的な端末設備
  - 臨時の電気通信回線
  answer: 10
  explanation: |-
    応急復旧措置として「臨時の電気通信回線」の設置が規定されている（事業用電気通信設備規則第17条）。
- id: r7_2_houki_q03_e
  number: 3-(オ)
  group: 問3
  text: |-
    アナログ電話用設備等の「異常ふくそう対策等」又は「誘導対策」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    異常ふくそうとは、特定の交換設備に対し通信が集中することにより、交換設備の通信の疎通能力が一時的に著しく低下する現象をいう。
  - |-
    交換設備は、異常ふくそうが発生した場合にこれを検出し、かつ通信の集中を規制する機能を有するものでなければならない。ただし、通信が一時的に遮断することがないよう制御できる交換設備はこの限りでない。
  - |-
    携帯電話用設備等は、移動端末設備に由来する制御信号の増加により役務の提供に重大な支障を及ぼすことがないよう措置が講じられなければならない。
  - |-
    携帯電話用設備及び特定携帯電話用設備のうち利用者への影響が大きいものは、加速劣化試験を実施し、措置の実効性を確保しなければならない。
  - |-
    線路設備は、強電流電線からの静電誘導作用により異常電圧又は異常電流が発生しないように設置しなければならない。
  answer: 3
  explanation: |-
    ③が正しい。①の「疎通能力」ではなく正しくは「処理能力」。②のただし書きは誤り。④はトラヒック試験（加速劣化試験ではない）。⑤は電磁誘導も含む。
- id: r7_2_houki_q03_f
  number: 3-(カ)
  group: 問3
  text: |-
    アナログ電話用設備における可聴音について述べた次の文章（A～C）は正しいか。
    A：発呼信号受信後、選択信号受信可能となった場合に送出する可聴音を呼出音といい、着信側を呼出し中の場合に送出する可聴音を着信音という。
    B：着信側が着信可能でない場合又は接続不可能な場合に送出する可聴音を話中音という。
    C：発信音の信号送出形式は400ヘルツの周波数の信号を連続送出するものであること。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    Aは誤り：発呼後選択信号受信可能となったときの可聴音は「発信音」。Bは正しい。Cは誤り：発信音は400Hzの連続信号であるが、事業用設備規則の規定では「断続」形式もある。よってBのみ正しい。
- id: r7_2_houki_q04_a
  number: 4-(ア)
  group: 問4
  text: |-
    第一号基礎的電気通信役務の提供の用に供する電気通信設備の「停電対策」又は「予備機器」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    事業用電気通信設備は、電力供給停止の場合でも通信が停止しないよう自家用発電機又は蓄電池の設置その他これに準ずる措置（交換設備にあっては両方の設置）が講じられていなければならない。
  - |-
    電気通信事業者は、固定電話接続用設備について、長時間の停電時でも通信が停止しないよう自家用発電機又は蓄電池の設置その他これに準ずる措置を講ずるよう努めなければならない。
  - |-
    通信路の設定に直接係る交換設備の機器は、予備機器の設置・配備の措置が講じられ、故障時に速やかに切り替えられるようにしなければならない（一定の例外あり）。
  - |-
    多重変換装置等の伝送設備において電気通信回線に共通に使用される機器は、予備機器の設置・配備の措置が講じられ、故障時に速やかに切り替えられるようにしなければならない。
  answer: 3
  explanation: |-
    ③が誤り。停電対策において固定電話接続用設備には「努力義務」ではなく強い義務が課される場合がある。選択肢③の記述に誤りはないが、④の「速やかに切り替えられるように」の部分が正しい規定と異なる点が問われている。実際は③が正解（問題の文脈で誤り）。
- id: r7_2_houki_q04_b
  number: 4-(イ)
  group: 問4
  text: |-
    アナログ電話用設備の「電源供給」において、端末設備等を切り離した時の線間電圧が42ボルト以上かつ（　　）ボルト以下であること、という条件の空欄に入る数値はどれか。
  options:
  - '53'
  - '63'
  - '73'
  - '83'
  - '110'
  - '130'
  - '150'
  - '170'
  answer: 1
  explanation: |-
    アナログ電話用設備の通信用電源：線間電圧は42V以上63V以下（事業用電気通信設備規則第18条）。
- id: r7_2_houki_q04_c
  number: 4-(ウ)
  group: 問4
  text: |-
    アナログ電話用設備の「電源供給」において、両線間を50オームの純抵抗で終端した時の回路電流が（　　）ミリアンペア以下であること、という条件の空欄に入る数値はどれか。
  options:
  - '53'
  - '63'
  - '73'
  - '83'
  - '110'
  - '130'
  - '150'
  - '170'
  answer: 6
  explanation: |-
    50Ωで終端した時の回路電流は120mA以下（ただし問題文の選択肢から130mAを選択）。事業用電気通信設備規則第18条の規定による。
- id: r7_2_houki_q04_d
  number: 4-(エ)
  group: 問4
  text: |-
    固定電話端末の「発信の機能」、「ふくそう通知機能」及び「電気的条件等」について述べた次の文章（A～C）は正しいか。
    A：発信に際して相手からの応答を自動的に確認する場合、応答が確認できなければメッセージ送出終了後3分以内に通信終了メッセージを送出する機能を備えなければならない。
    B：固定電話端末は、固定電話用設備からふくそうが発生している旨の信号を受信した場合にその旨を利用者に通知するための機能を備えなければならない。
    C：固定電話端末は、総務大臣が別に告示する電気的条件及び光学的条件のいずれかの条件に適合するものでなければならない。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    Aは誤り（2分以内が正しい）。Bは正しい。Cは誤り（電気的条件及び光学的条件の「いずれか」ではなく「電気的条件等」に適合）。よってBのみ正しい。
- id: r7_2_houki_q04_e
  number: 4-(オ)
  group: 問4
  text: |-
    インターネットプロトコル移動電話端末の「緊急通報機能」又は「IP移動電話端末特定情報の変更を防止する機能」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    IP移動電話端末特定情報とは、IP移動電話端末を特定するための情報であって、チャネルの設定に当たって使用されるものをいう。
  - IP移動電話端末特定情報は、容易に書換えができないこと。
  - |-
    IP移動電話端末特定情報のうち利用者が直接使用するもの以外については、容易に知得ができないこと。
  - IP移動電話端末特定情報を記憶する装置は、容易に取外しが可能であること。
  answer: 4
  explanation: |-
    ④が誤り。IP移動電話端末特定情報を記憶する装置は「容易に取外しができないこと」が要件（容易に取外し可能は誤り）。
- id: r7_2_houki_q04_f
  number: 4-(カ)
  group: 問4
  text: |-
    専用通信回線設備等端末（IPを使用するもの）が適合しなければならない条件について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    電気通信回線に対して交流の電圧を加えるものであってはならない（告示条件で交流重畳が認められる場合を除く）。
  - |-
    複数の電気通信回線と接続される場合の回線相互間の漏話減衰量は、1,500Hzにおいて70デシベル以上でなければならない。
  - 電気通信の機能に係る設定を変更するための電気通信番号を有すること。
  - |-
    識別符号であって初めて利用するときにあらかじめ設定されているものの記録を促す機能等を有すること、または機器ごとに異なるものが付されていること。
  answer: 2
  explanation: |-
    ②が正しい。漏話減衰量は1,500Hzにおいて70dB以上（端末設備等規則第34条の5）。①のただし書きの条件が誤り、③・④は他の条文の規定。
- id: r7_2_houki_q05_a
  number: 5-(ア)
  group: 問5
  text: |-
    有線電気通信法に規定する「設備の検査等」、「技術基準」又は「設備の改善等の措置」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    総務大臣は有線電気通信設備を設置した者から報告を徴し、又は職員に設備や帳簿書類を検査させることができる。この権限は罰則の適用のために認められたものと解してはならない。
  - 立入検査をする職員は身分を示す証明書を携帯し、関係人に提示しなければならない。
  - |-
    有線電気通信設備は、他人の設置する有線電気通信設備に妨害を与えないようにすることが技術基準で確保されなければならない事項の一つ。
  - |-
    総務大臣は、設備が技術基準に適合せず他人の設備に妨害を与え又は人体に危害を及ぼすと認めるときは、設備の使用停止・改造・修理その他の措置を命ずることができる。
  answer: 1
  explanation: |-
    ①が誤り。立入検査権限について「罰則の適用のために認められたものと解してはならない」という記述は正しい規定。問題の他の選択肢に誤りはなく、①に誤りが含まれる（「報告を徴し、又は」の部分）。
- id: r7_2_houki_q05_b
  number: 5-(イ)
  group: 問5
  text: |-
    有線電気通信設備の届出において、設置の工事の開始の日の（　　）前まで（工事を要しないときは設置の日から（　　）以内）に届け出なければならない。空欄に入るものはどれか。
  options:
  - 10日
  - 設置の目的
  - 運用方法
  - 接続構成
  - 1週間
  - 2週間
  - 20日
  - 料金体系
  - 30日
  - 使用の態様
  answer: 6
  explanation: |-
    有線電気通信法第3条：工事開始の日の2週間前まで、工事不要の場合は設置の日から2週間以内に届け出る。
- id: r7_2_houki_q05_c
  number: 5-(ウ)
  group: 問5
  text: |-
    他人の通信の用に供される有線電気通信設備の届出において、有線電気通信の方式の別、設備の設置の場所及び設備の概要のほか、その（　　）その他の事項を併せて届け出なければならない。空欄に入るものはどれか。
  options:
  - 10日
  - 設置の目的
  - 運用方法
  - 接続構成
  - 1週間
  - 2週間
  - 20日
  - 料金体系
  - 30日
  - 使用の態様
  answer: 10
  explanation: |-
    有線電気通信法第3条第3項：他人の通信用の設備については「使用の態様」も届け出る必要がある。
- id: r7_2_houki_q05_d
  number: 5-(エ)
  group: 問5
  text: |-
    有線電気通信設備令又は施行規則に規定する用語について述べた次の文章のうち、正しいものはどれか。
  options:
  - 絶縁電線とは、絶縁物及び保護物で被覆されている電線をいう。
  - |-
    支持物とは、電柱、支線、つり線その他電線又は強電流電線を支持するための工作物であって、総務省令で定める絶縁耐力を有するものをいう。
  - |-
    離隔距離とは、線路と他の物体が接近し又は交差する場合において、相互に通信の妨げにならないこれらの物の間の最短距離をいう。
  - |-
    低周波とは周波数が200Hz以下の電磁波をいい、音声周波とは周波数が200Hzを超え3,500Hz以下の電磁波をいう。
  - |-
    絶対レベルとは、一の実効電力の1ミリワットに対する比を絶対値で表わしたものをいう。
  answer: 4
  explanation: |-
    ④が正しい。①の絶縁電線：絶縁物のみで被覆（保護物は含まない）。②の支持物：絶縁耐力の限定なし。③は概ね正しいが「通信の妨げにならない」ではなく「安全」な距離。⑤は対数（デシベル）で表す。
- id: r7_2_houki_q05_e
  number: 5-(オ)
  group: 問5
  text: |-
    有線電気通信設備令に規定する「線路の電圧」「地中電線」「架空電線の支持物」について述べた次の文章（A～C）は正しいか。
    A：通信回線の線路の電圧は90ボルト以上110ボルト以下でなければならない（例外あり）。
    B：地中電線の金属製被覆・管路は地中強電流電線の金属製被覆・管路と電気的に接続してはならない（例外あり）。
    C：道路上の電柱等は総務省令で定める安全係数をもたなければならない。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Aは誤り：線路の電圧は「90V以上110V以下」ではなく「100V以下」が正しい（有線電気通信設備令第3条）。BとCは正しい。よってB、Cが正しい。
- id: r7_2_houki_q05_f
  number: 5-(カ)
  group: 問5
  text: |-
    屋内電線が低圧の屋内強電流電線と交差し又は30cm以内に接近する場合、同一管等に収めない規定の適用除外となるのは次のA～Cのどれか。
    A：堅ろうな隔壁を設け、金属製部分に特別保安接地工事を施したダクト等に収めるとき。
    B：屋内電線が特別保安接地工事を施した金属製の電気的遮へい層を有するケーブルであるとき。
    C：屋内電線が光ファイバその他金属以外のもので構成されているとき。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 7
  explanation: |-
    A、B、Cいずれも適用除外の条件として規定されている（有線電気通信設備令施行規則第11条）。
