questions:
- id: r7_2_system_q01
  number: 1
  text: |-
    透磁率がμ H/m、磁路の平均の長さがℓ m、断面積がA m²の環状鉄心に巻数がそれぞれN₁、N₂の二つのコイルが巻かれているとき、相互インダクタンスM（H）はどれか。ただし、漏れ磁束は無視するものとする。
  options:
  - μN₁N₂ / (A・ℓ)
  - AN₁N₂ / (μ・ℓ)
  - μAN₁N₂ / ℓ
  - μN₁²N₂² / A
  - μAN₁²N₂² / ℓ
  answer: 3
  explanation: |-
    環状鉄心の相互インダクタンス M = μAN₁N₂/ℓ。透磁率μ、断面積A、巻数の積N₁N₂に比例し、磁路長ℓに反比例する。
- id: r7_2_system_q02
  number: 2
  text: |-
    図に示す不平衡ブリッジ回路において、回路に流れる全電流が6 Aであるとき、端子A－B間に加えた交流電圧（V）はどれか。
  options:
  - '10'
  - '12'
  - '14'
  - '18'
  - '22'
  answer: 2
  explanation: |-
    回路の合成抵抗を計算する。1Ω+1.5Ωの直列=2.5Ω、4Ω+2Ω=6Ω、2Ωと合わせて並列合成後、全電流6Aで電圧V=2×6=12V。
- id: r7_2_system_q03
  number: 3
  text: |-
    図に示す論理回路を入出力とも正論理で使用するとき、この回路はどの回路として動作するか。
  options:
  - AND
  - NAND
  - OR
  - NOR
  - XOR
  answer: 2
  explanation: |-
    ダイオードと抵抗で構成された回路で、正論理で使用するとNAND回路として動作する。
- id: r7_2_system_q04
  number: 4
  text: |-
    図に示す論理回路において、X = A̅・(B+C) をベン図で表すと正しいものはどれか。
  options:
  - ①
  - ②
  - ③
  - ④
  - ⑤
  answer: 5
  explanation: |-
    X = A̅・(B+C)は、AでないかつBまたはCの領域。ベン図ではAの外側でBまたはCの内側の部分が斜線となる。
- id: r7_2_system_q05
  number: 5
  text: |-
    データ伝送における同期方式には、特定のビットパターンとして01111110を送信データの前後に付加することによって、送信側と受信側の間で伝送ブロックの開始と終了の同期をとる（　　）同期がある。
  options:
  - フラグ
  - クロック
  - スタッフ
  - 調歩
  - SYN
  answer: 1
  explanation: |-
    01111110というフラグパターンを用いてフレームの開始・終了を示す方式はフラグ同期（HDLC等で使用）。
- id: r7_2_system_q06
  number: 6
  text: |-
    定格電流1 mA、内部抵抗9.9 Ωの電流計Aを用いて、定格電流10 mA及び100 mAの多重範囲電流計とする場合、分流回路の抵抗R₁及びR₂の組合せはどれか。
  options:
  - R₁＝0.11 Ω、R₂＝0.99 Ω
  - R₁＝0.99 Ω、R₂＝0.11 Ω
  - R₁＝0.99 Ω、R₂＝0.09 Ω
  - R₁＝0.09 Ω、R₂＝0.81 Ω
  - R₁＝0.11 Ω、R₂＝8.99 Ω
  answer: 1
  explanation: |-
    100mA端子の分流抵抗R₁：9.9×1/(100-1)≒0.1Ω。10mA端子のR₂は計算によりR₁＝0.11Ω、R₂＝0.99Ωが正解。
- id: r7_2_system_q07
  number: 7
  text: |-
    伝送帯域幅とデータ伝送速度の関係を表す法則は、一般に、（　　）の定理といわれ、信号電力、雑音電力及び使用する通信路の周波数帯域幅が決まると、その通信路で送れる最大伝送速度（通信容量）が計算できる。
  options:
  - テブナン
  - クーロン
  - ホール
  - ベルヌーイ
  - シャノン
  answer: 5
  explanation: |-
    シャノンの定理（シャノン・ハートレーの定理）：C = B・log₂(1+S/N)。帯域幅Bと信号対雑音比S/Nから最大通信容量Cが求まる。
- id: r7_2_system_q08
  number: 8
  text: |-
    通信線路１の特性インピーダンスが540 Ω、通信線路２の特性インピーダンスが960 Ωのとき、巻線比（n₁：n₂）が（　　）の変成器を使うと線路の接続点における反射損失はゼロとなる。ただし、変成器は理想的なものとする。
  options:
  - 2：3
  - 3：4
  - 4：3
  - 4：5
  - 5：4
  answer: 2
  explanation: |-
    インピーダンス整合条件：n₁/n₂ = √(Z₁/Z₂) = √(540/960) = √(9/16) = 3/4。よって巻線比は3：4。
- id: r7_2_system_q09
  number: 9
  text: |-
    アナログ信号をデジタル信号に変換して伝送するデジタル伝送方式において、アナログ信号を標本化することにより得られる（　　）信号は、アナログ信号波形の大きさをパルスの振幅で表している。
  options:
  - PCM
  - PWM
  - PPM
  - PAM
  - PNM
  answer: 4
  explanation: |-
    PAM（Pulse Amplitude Modulation：パルス振幅変調）信号は、標本化によりアナログ信号の振幅をパルスの高さで表す。PCMはその後量子化・符号化したもの。
- id: r7_2_system_q10
  number: 10
  text: |-
    ルータにおいて、音声品質を確保するためにキューにパケットの転送順位を付け、音声パケットを高い順位のキューに入れ、低い順位のキューのパケットよりも先に転送する処理は、一般に、（　　）制御といわれる。
  options:
  - 帯域
  - ウィンドウ
  - 優先
  - 経路
  - フロー
  answer: 3
  explanation: |-
    音声パケットを優先的に転送する仕組みは優先制御（QoS：Quality of Service）の一手法。遅延に敏感な音声トラフィックに高優先度を付与する。
- id: r7_2_system_q11
  number: 11
  text: |-
    ある回線群において、T分間の呼量と呼数を調査したところ、運んだ呼量はacアーランで、運んだ呼数がC呼であった。この回線群の運んだ呼の平均回線保留時間（秒）はどれか。
  options:
  - acC×60×60 / T
  - acT / (C×60)
  - acT / C
  - acT×60×60 / C
  - acT×60 / C
  answer: 5
  explanation: |-
    呼量(アーラン) = 呼数 × 平均保留時間 / 観測時間。ac = C×h / (T×60) より h = acT×60 / C（秒）。
- id: r7_2_system_q12
  number: 12
  text: |-
    異なる電気通信事業者のネットワーク相互を接続するための接続点は、一般に、（　　）といわれる。
  options:
  - POI
  - AP
  - UNI
  - SNI
  - GK
  answer: 1
  explanation: |-
    POI（Point of Interface）：異なる電気通信事業者間のネットワーク接続点。UNIはユーザ－網インタフェース、SNIはサービスノードインタフェース。
- id: r7_2_system_q13
  number: 13
  text: |-
    メタルケーブルでの固定電話サービスの提供・維持が著しく不経済となるエリアにおいて提供される電話サービスとしてメタルケーブルの代わりに（　　）を利用する形態のものは、ワイヤレス固定電話といわれる。
  options:
  - デジタル簡易無線
  - 携帯電話網
  - MCA無線
  - 衛星通信回線
  - FWA
  answer: 2
  explanation: |-
    ワイヤレス固定電話は、メタルケーブルの代替として携帯電話網を利用して固定電話サービスを提供する形態。FWAは無線アクセスシステムの一種。
- id: r7_2_system_q14
  number: 14
  text: |-
    電気通信番号制度にて定められた電気通信番号種別のうち、データ伝送携帯電話番号（020番号帯）は、IoT機器の普及に伴い創設された（　　）等専用番号として用いられている。
  options:
  - LNP
  - MNP
  - MVNO
  - APN
  - M2M
  answer: 5
  explanation: |-
    020番号帯はM2M（Machine to Machine）等のIoT機器専用番号として創設された。LNP/MNPは番号ポータビリティ、MVNOは仮想移動通信事業者。
- id: r7_2_system_q15
  number: 15
  text: |-
    無線LANの伝送方式には、小出力電力で耐干渉性や秘匿性を確保するため、衛星通信でも利用されている（　　）方式を用いたものがある。
  options:
  - ベースバンド
  - 周波数変調
  - 振幅変調
  - スペクトル拡散
  - 多値変調
  answer: 4
  explanation: |-
    スペクトル拡散（SS：Spread Spectrum）方式は、信号を広い周波数帯域に拡散することで耐干渉性・秘匿性を確保。衛星通信や無線LANで使用。
- id: r7_2_system_q16
  number: 16
  text: |-
    セキュリティの確保などを目的に、情報通信事業者が設置し、提供しているサーバの一部又は全部を借用して自社の情報システムを運用する形態は、一般に、（　　）といわれる。
  options:
  - ホスティング
  - ハウジング
  - ロードバランシング
  - アライアンス
  - システムインテグレーション
  answer: 1
  explanation: |-
    ホスティング：事業者が提供するサーバを借用してシステムを運用する形態。ハウジングは自社サーバを事業者のデータセンターに設置する形態。
- id: r7_2_system_q17
  number: 17
  text: |-
    開口面アンテナにおいて、アンテナの開口面積をS、電波の波長をλとすると、Sが一定の条件では、アンテナの利得はどうなるか。
  options:
  - λに比例する
  - λの2乗に比例する
  - λに反比例する
  - λの2乗に反比例する
  - λの影響を受けない
  answer: 4
  explanation: |-
    開口面アンテナの利得 G = 4πS/λ²。開口面積Sが一定のとき、利得はλ²に反比例する。波長が短い（周波数が高い）ほど利得が大きくなる。
- id: r7_2_system_q18
  number: 18
  text: |-
    GE-PONシステムにおけるOLTでは、複数のONUからの上り信号が衝突するのを防ぐため、OLTと各ONUとの間の伝送時間をあらかじめ測定する（　　）といわれる処理を行っている。
  options:
  - スクリーニング
  - フィルタリング
  - レンジング
  - チャーピング
  - リンクアグリゲーション
  answer: 3
  explanation: |-
    レンジング（Ranging）：GE-PONでOLTが各ONUまでの往復遅延時間を測定し、上り信号の送信タイミングを制御して衝突を防ぐ処理。
- id: r7_2_system_q19
  number: 19
  text: 三相変圧器のY結線において、各相とも同じ電圧のとき、線間電圧は相電圧の何倍か。
  options:
  - 1/3
  - 1/2
  - 1/√3
  - 1/√2
  - √3
  answer: 5
  explanation: |-
    Y（スター）結線では、線間電圧 = √3 × 相電圧。線間電圧は相電圧の√3倍（約1.732倍）になる。
- id: r7_2_system_q20
  number: 20
  text: |-
    光通信システムに用いられるエルビウム添加光ファイバ増幅器（EDFA）は、コアにエルビウムを添加した光ファイバ内に所要の波長の励起光を入射することにより発生する（　　）を利用して光信号を増幅するものである。
  options:
  - 自然放出
  - 誘導ラマン散乱
  - レイリー散乱
  - 誘導放出
  - 誘導ブリルアン散乱
  answer: 4
  explanation: |-
    EDFAは励起光によりエルビウムイオンを励起状態にし、信号光により誘導放出を起こすことで光信号を増幅する。自然放出はASE雑音の原因となる。
