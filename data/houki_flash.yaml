id: houki_flash
subject: 法規フラッシュカード
description: 法規条文の数値・語句穴埋め暗記カード
cards:

# ===== 端末設備等規則 =====

- id: fc_001
  category: 数値
  front: |-
    【端末設備等規則】配線設備等の絶縁抵抗
    配線設備等の電線相互間及び電線と大地間の絶縁抵抗は、直流（　①　）ボルト以上の一の電圧で測定した値で（　②　）メガオーム以上であること。
  blanks:
    - ①: "200"
    - ②: "1"
  source: 端末設備等規則 第9条

- id: fc_002
  category: 数値
  front: |-
    【端末設備等規則】配線設備等の評価雑音電力
    配線設備等の評価雑音電力は、絶対レベルで表した値で定常時においてマイナス（　①　）デシベル以下であり、かつ、最大時においてマイナス（　②　）デシベル以下であること。
  blanks:
    - ①: "64"
    - ②: "58"
  source: 端末設備等規則 第9条

- id: fc_003
  category: 数値
  front: |-
    【端末設備等規則】アナログ電話端末の直流抵抗値
    直流回路を閉じているときのアナログ電話端末の直流抵抗値は、（　①　）ミリアンペア以上（　②　）ミリアンペア以下の電流で測定した値で（　③　）オーム以上（　④　）オーム以下でなければならない。
  blanks:
    - ①: "20"
    - ②: "120"
    - ③: "50"
    - ④: "300"
  source: 端末設備等規則 第11条

- id: fc_004
  category: 数値
  front: |-
    【端末設備等規則】アナログ電話端末の静電容量
    直流回路を開いているときのアナログ電話端末の呼出信号受信時における直流回路の静電容量は、（　①　）マイクロファラド以下であり、インピーダンスは（　②　）ボルト、（　③　）ヘルツの交流に対して（　④　）キロオーム以上でなければならない。
  blanks:
    - ①: "5"
    - ②: "75"
    - ③: "16"
    - ④: "1"
  source: 端末設備等規則 第11条

- id: fc_005
  category: 数値
  front: |-
    【端末設備等規則】アナログ電話端末の選択信号送出
    アナログ電話端末は、自動的に選択信号を送出する場合にあっては、直流回路を閉じてから（　①　）秒以上経過後に選択信号の送出を開始する機能を備えなければならない。
    （ただし、電気通信回線からの発信音又はこれに相当する可聴音を確認した後に選択信号を送出する場合を除く。）
  blanks:
    - ①: "3"
  source: 端末設備等規則 第13条

- id: fc_006
  category: 数値
  front: |-
    【端末設備等規則】絶縁耐力（750V超・600V超の場合）
    端末設備の機器は、その電源回路と筐体及びその電源回路と事業用電気通信設備との間において、使用電圧が（　①　）ボルトを超える直流及び（　②　）ボルトを超える交流の場合にあっては、その使用電圧の（　③　）倍の電圧を連続して（　④　）分間加えたときこれに耐える絶縁耐力を有しなければならない。
  blanks:
    - ①: "750"
    - ②: "600"
    - ③: "1.5"
    - ④: "10"
  source: 端末設備等規則 第7条

- id: fc_007
  category: 数値
  front: |-
    【端末設備等規則】総合デジタル通信端末の自動再発信
    自動再発信を行う場合（自動再発信の回数が（　①　）回以内の場合を除く。）にあっては、その回数は最初の発信から（　②　）分間に（　③　）回以内であること。
  blanks:
    - ①: "15"
    - ②: "3"
    - ③: "2"
  source: 端末設備等規則 第34条

- id: fc_008
  category: 数値
  front: |-
    【端末設備等規則】総合デジタル通信端末の自動応答確認
    発信に際して相手の端末設備からの応答を自動的に確認する場合にあっては、電気通信回線からの応答が確認できない場合、呼設定メッセージ送出終了後（　①　）分以内に呼切断用メッセージを送出するものであること。
  blanks:
    - ①: "2"
  source: 端末設備等規則 第34条

# ===== 事業用電気通信設備規則 =====

- id: fc_009
  category: 数値
  front: |-
    【事業用電気通信設備規則】保安装置
    落雷又は強電流電線との混触により線路設備に発生した異常電圧及び異常電流によって接続設備を損傷するおそれのある場合は、交流（　①　）ボルト以下で動作する避雷器及び（　②　）アンペア以下で動作するヒューズ若しくは（　③　）ミリアンペア以下で動作する熱線輪からなる保安装置が設置されていなければならない。
  blanks:
    - ①: "200"
    - ②: "9"
    - ③: "200"
  source: 事業用電気通信設備規則 第20条

- id: fc_010
  category: 数値
  front: |-
    【事業用電気通信設備規則】電圧区分（高圧）
    電圧は、法令上、交流の場合（　①　）ボルト以下の低圧、（　①　）ボルトを超え（　②　）ボルト以下の高圧及び（　②　）ボルトを超える特別高圧に区分される。
  blanks:
    - ①: "600"
    - ②: "7,000"
  source: 電気事業法施行規則 第1条（受電設備区分）

# ===== 有線電気通信設備令 =====

- id: fc_011
  category: 数値
  front: |-
    【有線電気通信設備令】架空電線の高さ（道路上）
    架空電線の高さは、架空電線が道路上にあるときは、横断歩道橋の上にあるときを除き、路面から（　①　）メートル以上でなければならない。
    （交通に支障を及ぼすおそれが少ない場合で工事上やむを得ないときは、歩道上においては（　②　）メートル、その他の道路上においては（　③　）メートル）
  blanks:
    - ①: "5"
    - ②: "2.5"
    - ③: "4.5"
  source: 有線電気通信設備令施行規則 第7条

- id: fc_012
  category: 数値
  front: |-
    【有線電気通信設備令】架空電線の高さ（鉄道横断）
    架空電線の高さは、架空電線が鉄道又は軌道を横断するときは、軌条面から（　①　）メートル以上でなければならない。
  blanks:
    - ①: "6"
  source: 有線電気通信設備令施行規則 第7条

- id: fc_013
  category: 数値
  front: |-
    【有線電気通信設備令】架空電線の高さ（横断歩道橋上）
    架空電線の高さは、架空電線が横断歩道橋の上にあるときは、その路面から（　①　）メートル以上でなければならない。
  blanks:
    - ①: "3"
  source: 有線電気通信設備令施行規則 第7条

- id: fc_014
  category: 数値
  front: |-
    【有線電気通信設備令】架空電線と建造物の離隔距離
    架空電線は、他人の建造物との離隔距離が（　①　）センチメートル以下となるように設置してはならない。
    （ただし、その他人の承諾を得たときは、この限りでない。）
  blanks:
    - ①: "30"
  source: 有線電気通信設備令 第9条

- id: fc_015
  category: 数値
  front: |-
    【有線電気通信設備令】架空電線の支持物・足場金具
    架空電線の支持物には、取扱者が昇降に使用する足場金具等を地表上（　①　）メートル未満の高さに取り付けてはならない。
    （ただし、総務省令で定める場合は、この限りでない。）
  blanks:
    - ①: "1.8"
  source: 有線電気通信設備令 第11条

- id: fc_016
  category: 数値
  front: |-
    【有線電気通信設備令】屋内電線の絶縁抵抗
    屋内電線（光ファイバを除く。）と大地との間及び屋内電線相互間の絶縁抵抗は、直流（　①　）ボルト以上の電圧で測定した値で、（　②　）メグオーム以上でなければならない。
  blanks:
    - ①: "200"
    - ②: "1"
  source: 有線電気通信設備令 第15条

- id: fc_017
  category: 数値
  front: |-
    【有線電気通信設備令】地中電線と地中強電流電線の離隔距離
    地中電線は、地中強電流電線との離隔距離が（　①　）センチメートル（その地中強電流電線の電圧が（　②　）ボルトを超えるものであるときは、（　③　）センチメートル）以下となるように設置するときは、総務省令で定めるところによらなければならない。
  blanks:
    - ①: "30"
    - ②: "7,000"
    - ③: "60"
  source: 有線電気通信設備令 第16条

- id: fc_018
  category: 数値
  front: |-
    【有線電気通信設備令】線路の電圧
    通信回線（導体が光ファイバであるものを除く。）の線路の電圧は、（　①　）ボルト以下でなければならない。
    （ただし、電線としてケーブルのみを使用するとき、又は人体に危害を及ぼし、若しくは物件に損傷を与えるおそれがないときは、この限りでない。）
  blanks:
    - ①: "100"
  source: 有線電気通信設備令 第17条

- id: fc_019
  category: 数値
  front: |-
    【有線電気通信設備令】屋内電線と屋内強電流電線の離隔距離
    屋内電線は、屋内強電流電線との離隔距離が（　①　）センチメートル以下となるときは、総務省令で定めるところによらなければ、設置してはならない。
  blanks:
    - ①: "30"
  source: 有線電気通信設備令 第15条

- id: fc_020
  category: 数値
  front: |-
    【有線電気通信設備令】音声周波・高周波の定義
    音声周波とは、周波数が（　①　）ヘルツを超え、（　②　）ヘルツ以下の電磁波をいい、高周波とは、周波数が（　②　）ヘルツを超える電磁波をいう。
  blanks:
    - ①: "200"
    - ②: "3,500"
  source: 有線電気通信設備令 第1条

# ===== 含む・除く系 =====

- id: fc_021
  category: 含む・除く
  front: |-
    【有線電気通信設備令】電線の定義
    電線とは、有線電気通信を行うための導体（絶縁物又は保護物で被覆されている場合は、（　①　））であって、強電流電線に重畳される通信回線に係るもの（　②　）のをいう。
  blanks:
    - ①: "これらの物を含む"
    - ②: "以外"
  source: 有線電気通信設備令 第1条 第1号

- id: fc_022
  category: 含む・除く
  front: |-
    【有線電気通信設備令】線路の定義
    線路とは、送信の場所と受信の場所との間に設置されている電線及びこれに係る中継器その他の機器（これらを支持し、又は保蔵するための工作物を（　①　））をいう。
  blanks:
    - ①: "含む"
  source: 有線電気通信設備令 第1条 第2号

- id: fc_023
  category: 含む・除く
  front: |-
    【有線電気通信設備令】強電流電線の定義
    強電流電線とは、強電流電気の伝送を行うための導体（絶縁物又は保護物で被覆されている場合は、（　①　））をいう。
  blanks:
    - ①: "これらの物を含む"
  source: 有線電気通信設備令 第1条 第4号

- id: fc_024
  category: 含む・除く
  front: |-
    【電波法】無線局の定義
    無線局とは、無線設備及び無線設備の操作を行う者の総体をいう。ただし、（　①　）を目的とするものを（　②　）。
  blanks:
    - ①: "受信のみ"
    - ②: "含まない"
  source: 電波法 第2条 第5号

- id: fc_025
  category: 含む・除く
  front: |-
    【事業用電気通信設備規則】電源設備の予備機器（除外対象）
    事業用電気通信設備の電力の供給に直接係る電源設備の機器（（　①　）及び（　②　）を除く。）は、その機能を代替することができる予備の機器の設置若しくは配備の措置又はこれに準ずる措置が講じられなければならない。
  blanks:
    - ①: "自家用発電機"
    - ②: "蓄電池"
  source: 事業用電気通信設備規則 第15条

- id: fc_026
  category: 含む・除く
  front: |-
    【事業用電気通信設備規則】インターネットプロトコル電話用設備の定義
    インターネットプロトコル電話用設備とは、事業用電気通信設備のうち、端末設備等をインターネットプロトコルを使用してパケット交換網に接続するもの（（　①　）を除く。）であって、音声伝送役務の提供の用に供するものをいう。
  blanks:
    - ①: "携帯電話用設備"
  source: 事業用電気通信設備規則 第3条

- id: fc_027
  category: 含む・除く
  front: |-
    【事業用電気通信設備規則】交換設備の予備機器（除外対象）
    通信路の設定に直接係る交換設備の機器は、予備機器の設置等の措置が講じられ速やかに切り替えられるようにしなければならない。ただし、（　①　）の通信を取り扱う電気通信回線を当該交換設備に接続するための機器、及び他の交換設備によりその疎通が（　②　）できる交換設備の機器については、この限りでない。
  blanks:
    - ①: "専ら一の者"
    - ②: "確保"
  source: 事業用電気通信設備規則 第15条

- id: fc_028
  category: 含む・除く
  front: |-
    【有線電気通信法】非常事態における通信の確保
    総務大臣は、天災、事変その他の非常事態が発生し、又は発生するおそれがあるときは、有線電気通信設備を設置した者に対し、災害の予防若しくは救援、交通、通信若しくは電力の供給の確保若しくは秩序の維持のために必要な通信を行い、又はこれらの通信を行うためその有線電気通信設備を（　①　）させ、若しくはこれを他の有線電気通信設備に接続すべきことを命ずることができる。
  blanks:
    - ①: "他の者に使用"
  source: 有線電気通信法 第8条

- id: fc_029
  category: 含む・除く
  front: |-
    【有線電気通信法】設備の検査
    この検査の権限は、（　①　）のために認められたものと解してはならない。
  blanks:
    - ①: "犯罪捜査"
  source: 有線電気通信法 第9条

- id: fc_030
  category: 含む・除く
  front: |-
    【電気通信事業法】基礎的電気通信役務
    基礎的電気通信役務の「第一号基礎的電気通信役務」は（　①　）に係る電気通信役務であって総務省令で定めるものをいい、「第二号基礎的電気通信役務」は（　②　）電気通信役務であって総務省令で定めるものをいう。
  blanks:
    - ①: "電話"
    - ②: "高速度データ伝送"
  source: 電気通信事業法 第7条

- id: fc_031
  category: 含む・除く
  front: |-
    【電気通信事業法】端末設備の接続の技術基準（確保すべき事項）
    端末設備の接続の技術基準により確保されなければならない事項（主なもの）：
    ・電気通信回線設備を（　①　）し、又はその機能に障害を（　②　）ようにすること
    ・電気通信回線設備を利用する他の利用者に（　③　）ようにすること
  blanks:
    - ①: "損傷"
    - ②: "与えない"
    - ③: "迷惑を及ぼさない"
  source: 電気通信事業法 第52条

- id: fc_032
  category: 含む・除く
  front: |-
    【電気通信事業法施行規則】緊急通信（気象機関）
    気象、水象、地象若しくは（　①　）の報告又は警報に関する事項であって、緊急に通報することを要する事項を内容とする通信で、気象機関相互間において行われるものは緊急に行うことを要する通信に該当する。
  blanks:
    - ①: "地動の観測"
  source: 電気通信事業法施行規則 第55条

- id: fc_033
  category: 含む・除く
  front: |-
    【電気通信事業法施行規則】緊急通信（ライフライン）
    水道、ガス等の国民の日常生活に必要不可欠な（　①　）その他生活基盤を維持するため緊急を要する事項を内容とする通信であって、これらの通信を行う者相互間において行われるものは緊急通信に該当する。
  blanks:
    - ①: "役務の提供"
  source: 電気通信事業法施行規則 第55条

- id: fc_034
  category: 含む・除く
  front: |-
    【電子署名法】電子署名の定義
    電子署名とは、電磁的記録に（　①　）について行われる措置であって、次の要件のいずれにも該当するものをいう。
    ・当該情報が当該措置を行った者の（　②　）に係るものであることを示すためのものであること
    ・当該情報について（　③　）が行われていないかどうかを確認することができるものであること
  blanks:
    - ①: "記録することができる情報"
    - ②: "作成"
    - ③: "改変"
  source: 電子署名及び認証業務に関する法律 第2条

- id: fc_035
  category: 含む・除く
  front: |-
    【電子署名法】認証業務の定義
    認証業務とは、自らが行う電子署名についてその業務を利用する者その他の者の求めに応じ、当該利用者が電子署名を行ったものであることを（　①　）するために用いられる事項が当該利用者に係るものであることを証明する業務をいう。
  blanks:
    - ①: "確認"
  source: 電子署名及び認証業務に関する法律 第2条

- id: fc_036
  category: 含む・除く
  front: |-
    【電子署名法】特定認証業務の定義
    特定認証業務とは、電子署名のうち、その方式に応じて（　①　）だけが行うことができるものとして主務省令で定める基準に適合するものについて行われる認証業務をいう。
  blanks:
    - ①: "本人"
  source: 電子署名及び認証業務に関する法律 第2条

- id: fc_037
  category: 含む・除く
  front: |-
    【電気通信設備統括管理者】選任要件
    電気通信設備統括管理者は、事業運営上の重要な（　①　）する管理的地位にあり、かつ、電気通信設備の管理に関する一定の（　②　）その他の総務省令で定める要件を備える者のうちから選任しなければならない。
  blanks:
    - ①: "決定に参画"
    - ②: "実務の経験"
  source: 電気通信事業法 第44条の2

# ===== 事業用電気通信設備規則 追加 =====

- id: fc_038
  category: 数値
  front: |-
    【事業用電気通信設備規則】アナログ電話用設備の信号極性
    事業用電気通信設備は、発呼信号を受信できる状態において、電源の極性を端末設備等を接続する点において一方を（　①　）（接地の電位）、他方を（　②　）としなければならない。
  blanks:
    - ①: "地気"
    - ②: "負極性"
  source: 事業用電気通信設備規則 第33条

- id: fc_039
  category: 数値
  front: |-
    【事業用電気通信設備規則】総合デジタル通信用設備の基本機能
    総合デジタル通信用設備の基本機能（主なもの）：
    ・発信側の端末設備等からの（　①　）を認識し、着信側の端末設備等に通知すること
    ・電気通信（　②　）を認識すること
    ・着信側の端末設備等の（　③　）を認識し、発信側の端末設備等に通知すること
  blanks:
    - ①: "発信"
    - ②: "番号"
    - ③: "応答"
  source: 事業用電気通信設備規則 第35条

- id: fc_040
  category: 含む・除く
  front: |-
    【国際電気通信連合憲章】私報の伝送停止
    構成国は、国内法令に従って、国の安全を害すると認められる私報又はその法令、公の秩序若しくは善良の風俗に反すると認められる私報の伝送を（　①　）する権利を留保する。この場合には、私報の全部又は一部の停止を直ちに（　②　）に通知する。ただし、その通知が国の安全を害すると認められる場合は、この（　③　）。
  blanks:
    - ①: "停止"
    - ②: "発信局"
    - ③: "限りでない"
  source: 国際電気通信連合憲章 第34条

- id: fc_041
  category: 含む・除く
  front: |-
    【不正アクセス禁止法】法律の目的
    この法律は、不正アクセス行為を禁止するとともに、これについての罰則及びその再発防止のための（　①　）による援助措置等を定めることにより、電気通信回線を通じて行われる電子計算機に係る犯罪の防止及びアクセス制御機能により実現される電気通信に関する秩序の維持を図り、もって（　②　）の健全な発展に寄与することを目的とする。
  blanks:
    - ①: "都道府県公安委員会"
    - ②: "高度情報通信社会"
  source: 不正アクセス行為の禁止等に関する法律 第1条

- id: fc_042
  category: 数値
  front: |-
    【端末設備等規則】移動電話端末の受信レベル通知機能
    移動電話端末は、移動電話用設備から指定された条件に基づき、移動電話端末の周辺の移動電話用設備の指定された（　①　）の受信レベルについて検出を行い、指定された（　②　）ごとに移動電話用設備にその結果を通知する機能を備えなければならない。
  blanks:
    - ①: "制御チャネル"
    - ②: "時間間隔"
  source: 端末設備等規則 第40条

- id: fc_043
  category: 含む・除く
  front: |-
    【電波法】非常通信の定義
    非常通信とは、地震、台風、洪水、津波、雪害、火災、暴動その他非常の事態が発生し、又は発生するおそれがある場合において、（　①　）を利用することができないか又はこれを利用することが著しく困難であるときに人命の救助、災害の救援、（　②　）の確保又は秩序の維持のために行われる無線通信をいう。
  blanks:
    - ①: "有線通信"
    - ②: "交通通信"
  source: 電波法 第52条

- id: fc_044
  category: 含む・除く
  front: |-
    【電気通信主任技術者規則】事故発生時の指揮・命令の含むべき事項
    （ⅰ）速やかな故障検知及び（　①　）のために必要な対応に関する事項
    （ⅱ）定型的な応急復旧措置に係る取組並びに製造業者等及び（　②　）との連携に関する事項
    （ⅲ）障害の（　③　）のための対策に関する事項
  blanks:
    - ①: "故障箇所の特定"
    - ②: "接続事業者"
    - ③: "極小化"
  source: 電気通信主任技術者規則 第4条

- id: fc_045
  category: 数値
  front: |-
    【端末設備等規則】アナログ電話端末の送出電力
    アナログ電話端末の（　①　）キロヘルツまでの送出電力の許容範囲は、通話の用に供する場合を除き、平均レベルで（　②　）デシベルミリワット以下で、かつ、最大レベルで（　③　）デシベルミリワットを超えないこと。
  blanks:
    - ①: "4"
    - ②: "-3"
    - ③: "0"
  source: 端末設備等規則 第12条

- id: fc_046
  category: 数値
  front: |-
    【有線電気通信設備令】海底電線と他の海底電線・強電流電線の水平距離
    海底電線は、他人の設置する海底電線又は海底強電流電線との水平距離が（　①　）キロメートル以下となるように設置してはならない。
    （ただし、その他人の承諾を得たときは、この限りでない。）
  blanks:
    - ①: "1"
  source: 有線電気通信設備令 第19条

- id: fc_047
  category: 数値
  front: |-
    【事業用電気通信設備規則】評価雑音電力（配線設備等）
    配線設備等の評価雑音電力は、絶対レベルで表した値で定常時においてマイナス（　①　）デシベル以下であり、かつ、最大時においてマイナス（　②　）デシベル以下であること。
  blanks:
    - ①: "64"
    - ②: "58"
  source: 端末設備等規則 第9条

- id: fc_048
  category: 含む・除く
  front: |-
    【事業用電気通信設備規則】蓄積情報保護
    事業用電気通信設備（（　①　）を除く。）に利用者の通信の内容その他これに係る情報を蓄積する場合にあっては、当該利用者以外の者が端末設備等を用いて容易にその情報を知得し、又は（　②　）することを防止するため、当該利用者のみに与えた（　③　）の照合確認その他の防止措置が講じられなければならない。
  blanks:
    - ①: "特定端末設備"
    - ②: "流用"
    - ③: "呼出符号"
  source: 事業用電気通信設備規則 第30条
