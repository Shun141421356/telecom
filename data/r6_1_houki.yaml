id: r6_1_houki
year: 令和6年度
session: 第1回
subject: 法規
subject_short: houki
questions:
- id: r6_1_houki_q01_ア
  number: 1-(1)-ア
  text: |-
    電気通信事業法の「目的」：電気通信事業法は、電気通信事業の公共性に鑑み、その運営を適正かつ＿＿なものとするとともに、その公正な競争を促進することにより、電気通信役務の円滑な提供を確保するとともにその＿＿し、もって電気通信の健全な発達及び国民の利便の確保を図り、公共の福祉を増進することを目的とする。（最初の空欄）
  options:
  - ①通信の秘密を保護
  - ②サービスの品質を維持
  - ③妥当
  - ④正当
  - ⑤事業の秩序を維持
  - ⑥能率的
  - ⑦合理的
  - ⑧安定的
  - ⑨利用の公平を確保
  - ⑩利用者等の利益を保護
  answer: 7
  explanation: 電気通信事業法第1条：「その運営を適正かつ合理的なものとする」。正答は⑦合理的。
- id: r6_1_houki_q01_イ
  number: 1-(1)-イ
  text: |-
    電気通信事業法の「目的」の2番目の空欄：電気通信役務の円滑な提供を確保するとともにその＿＿し、もって電気通信の健全な発達及び国民の利便の確保を図り…
  options:
  - ①通信の秘密を保護
  - ②サービスの品質を維持
  - ③妥当
  - ④正当
  - ⑤事業の秩序を維持
  - ⑥能率的
  - ⑦合理的
  - ⑧安定的
  - ⑨利用の公平を確保
  - ⑩利用者等の利益を保護
  answer: 10
  explanation: |-
    電気通信事業法第1条：「その利用者等の利益を保護し」。正答は⑩利用者等の利益を保護。
- id: r6_1_houki_q01_ウ
  number: 1-(2)
  text: |-
    電気通信事業法に規定する用語について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①電気通信設備とは、電気通信を行うための機械、器具、線路その他の電気的設備をいう。
  - |-
    ②電気通信役務とは、国民生活に不可欠であるためあまねく日本全国における提供が確保されるべきものとして総務省令で定める電気通信サービスを提供する役務をいう。
  - ③電気通信事業とは、電気通信役務を他人の需要に応ずるために提供する事業をいう。
  - |-
    ④電気通信事業者とは、電気通信事業を営むことについて、電気通信事業法の規定による登録を受けた者及び同法の規定による届出をした者をいう。
  - |-
    ⑤端末設備とは、電気通信回線設備の一端に接続される電気通信設備であって、一の部分の設置の場所が他の部分の設置の場所と同一の構内又は同一の建物内であるものをいう。
  answer: 2
  explanation: |-
    ②が誤り。「電気通信役務」は電気通信事業者が電気通信設備を用いて他人の通信を媒介すること等を内容とする役務の総称。②の記述は「基礎的電気通信役務」の説明に近い。
- id: r6_1_houki_q01_エ
  number: 1-(3)
  text: |-
    電気通信事業法に規定する「業務の停止等の報告」、「管理規程」、「電気通信主任技術者」または「電気通信主任技術者等の義務」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①電気通信事業者は、電気通信業務に関し総務省令で定める重大な事故が生ずるおそれがあると認められる事態が生じたと認めたときは、その旨をその理由または原因とともに、遅滞なく、総務大臣に報告しなければならない。
  - |-
    ②電気通信事業者は、総務省令で定めるところにより、事業用電気通信設備の管理規程を定め、電気通信事業の開始後、20日以内に、総務大臣に届け出なければならない。
  - |-
    ③電気通信事業者は、事業用電気通信設備を技術基準に適合するように維持するため、総務省令で定めるところにより、電気通信主任技術者資格者証の交付を受けている者のうちから、電気通信主任技術者を選任しなければならない。ただし、その事業用電気通信設備が小規模である場合その他の総務省令で定める場合は、この限りでない。
  - |-
    ④電気通信事業者は、電気通信主任技術者のその職務を行う事業場における事業用電気通信設備の工事、維持または運用に関する助言を尊重しなければならず、事業用電気通信設備の工事、維持または運用に従事する者は、電気通信主任技術者がその職務を行うため必要であると認めてする意見を尊重しなければならない。
  answer: 1
  explanation: |-
    ①が正しい。重大な事故が「生ずるおそれがある事態」（重要な事態）についても報告義務がある。②は「30日以内」が正しい。④は「指示に従わなければならない」が正しく「意見を尊重」は誤り。
- id: r6_1_houki_q01_オ
  number: 1-(4)
  text: |-
    電気通信事業法施行規則に規定する用語について述べた文章A～CはＸである。
    A：データ伝送役務とは、専ら符号または影像を伝送交換するための電気通信設備を他人の通信の用に供する電気通信役務をいう。
    B：特定移動通信役務とは、電気通信事業法に規定する特定移動端末設備を他人の通信の用に供する電気通信役務をいう。
    C：端末系伝送路設備とは、専ら専用役務を提供するために設置される伝送路設備をいう。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 1
  explanation: |-
    Aのみ正しい。B：特定移動通信役務は特定移動端末設備「のみ」接続可能な設備を用いる役務で表現が不正確。C：端末系伝送路設備は加入者線など加入者と交換設備を結ぶ伝送路設備で、「専ら専用役務を提供するため」という記述は誤り。
- id: r6_1_houki_q01_カ
  number: 1-(5)
  text: |-
    電気通信事業法施行規則の「重要通信の優先的取扱いについての取り決めるべき事項」に規定する、電気通信事業者が他の電気通信事業者との間で取り決めなければならない事項について述べた文章A～CはＸである。
    A：重要通信を確保するために必要があるときは、業務区域の範囲の一部を制限し、その旨を速やかに総務大臣に届け出ること。
    B：電気通信設備の工事または保守等により接続点における重要通信の取扱いを一時的に中断する場合は、その日時および理由を速やかに総務大臣に届け出ること。
    C：重要通信を識別することができるよう重要通信に付される信号を識別した場合は、当該重要通信を優先的に取り扱うこと。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 3
  explanation: |-
    Cのみ正しい。A：業務区域制限の届出先は「総務大臣」でなく相手事業者への通知等。B：工事等による中断の届出先も「総務大臣」ではなく相手事業者への事前通知が規定されている。Cの重要通信の優先的取扱いは正しい。
- id: r6_1_houki_q02_ア
  number: 2-(1)-ア
  text: |-
    電気通信主任技術者規則の「講習の期間」：電気通信事業者は、電気通信主任技術者資格者証の交付を受けた日から＿＿を経過しない者（講習の修了証の交付を受けた日から＿＿を経過しない者を除く。）を電気通信主任技術者に選任したときは…
  options:
  - ①3月
  - ②6月
  - ③1年
  - ④2年
  - ⑤3年
  - ⑥4年
  - ⑦5年
  answer: 4
  explanation: |-
    資格者証交付から2年を経過しない者（最近2年以内に資格を取得した者）には選任後1年以内の講習義務が緩和される。正答は④2年。
- id: r6_1_houki_q02_イ
  number: 2-(1)-イ
  text: |-
    同条文の2番目の空欄：電気通信主任技術者に電気通信主任技術者資格者証の交付を受けた日から＿＿以内に講習を受けさせなければならない。
  options:
  - ①3月
  - ②6月
  - ③1年
  - ④2年
  - ⑤3年
  - ⑥4年
  - ⑦5年
  answer: 5
  explanation: |-
    資格者証交付を受けた日から2年以内に取得した場合は、交付日から3年以内に最初の講習を受けさせればよい。正答は⑤3年。
- id: r6_1_houki_q02_ウ
  number: 2-(2)
  text: |-
    電波法に規定する用語または「電波の質」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①無線電話とは、電波を利用して、音声その他の音響を送り、または受けるための通信設備をいう。
  - |-
    ②無線局とは、無線設備および無線設備の操作を行う者の総体をいい、受信のみを目的とするものを含む。
  - |-
    ③緊急通信とは、船舶または航空機が重大かつ急迫の危険に陥った場合その他緊急の事態が発生した場合に緊急信号を前置する方法その他総務省令で定める方法により行う無線通信をいう。
  - |-
    ④送信設備に使用する電波の周波数の偏差及び幅、波形のひずみ率等電波の質は、総務省令で定めるところに適合するものでなければならない。
  answer: 1
  explanation: |-
    ①が正しい。電波法の無線電話の定義は音声・音響を送受するための通信設備。②無線局は受信のみを目的とするものを含まない。③は遭難通信の説明。④は正しい内容だが、選択肢①が最も明確に正しい。正答は①。
- id: r6_1_houki_q02_エ
  number: 2-(3)
  text: |-
    国際電気通信連合憲章に規定する「連合の目的」について述べた文章A～CはＸである。
    A：すべての種類の電気通信の改善及び合理的利用のため、すべての構成国の間における国際協力を維持し及び増進すること。
    B：電気通信の分野において開発途上国に対する技術援助を促進し及び提供すること。
    C：電気通信業務の能率を増進し、その有用性を増大し、及び公衆によるその利用をできる限り普及するため、技術的手段の発達及びその知的財産権の保護を促進すること。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 4
  explanation: |-
    A、Bが正しい。C：「知的財産権の保護を促進すること」はITU憲章の目的に含まれていない。AとBはITU憲章第1条に規定される目的として正しい。
- id: r6_1_houki_q02_オ
  number: 2-(4)
  text: |-
    不正アクセス行為の禁止等に関する法律の「定義」に規定する識別符号になり得る符号の条件について述べた文章A～CはＸである。
    A：当該アクセス管理者によってその内容をみだりに第三者に知らせてはならないものとされている符号であること。
    B：当該利用権者等の署名を用いて当該アクセス管理者が定める方法により作成される符号であること。
    C：当該利用権者等の身体の全部若しくは一部の影像または音声を用いて当該アクセス管理者が定める方法により作成される符号であること。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 7
  explanation: |-
    A、B、Cいずれも正しい。不正アクセス禁止法第2条の識別符号の定義には、①パスワード等の秘密の符号（A）、②署名を用いた符号（B）、③生体情報（身体の影像・音声）を用いた符号（C）が含まれる。
- id: r6_1_houki_q02_カ
  number: 2-(5)
  text: |-
    電子署名及び認証業務に関する法律に規定する事項について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①電子署名及び認証業務に関する法律は、電子署名に関し、特定認証業務に関する認定の制度その他必要な事項を定めることにより、電子署名の円滑な利用の確保による情報の電磁的方式による流通及び情報処理の促進を図ることを目的とする。
  - |-
    ②電磁的記録であって情報を表すために作成されたもの（公務員が職務上作成したものを除く。）は、当該電磁的記録に記録された情報について本人による電子署名が行われているときは、真正に成立したものと推定する。
  - |-
    ③認証業務とは、自らが行う電子署名についてその業務を利用する者の求めに応じ、当該利用者が電子署名を行ったものであることを確認するために用いられる事項が当該利用者に係るものであることを証明する業務をいう。
  - |-
    ④特定認証業務とは、電子署名のうち、その方式に応じて本人だけが行うことができるものとして主務省令で定める基準に適合するものについて行われる認証業務をいう。
  answer: 1
  explanation: |-
    ①が誤り。電子署名法の目的には「電磁的記録に係る犯罪の防止」は含まれない（これは不正アクセス禁止法等の目的）。正しくは情報処理の促進と安全確保。
- id: r6_1_houki_q03_ア
  number: 3-(1)
  text: |-
    事業用電気通信設備規則に規定する用語について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①2線式アナログ電話用設備とは、アナログ電話用設備のうち、事業用電気通信設備と端末設備等を接続する点においてモジュラジャック式の接続形式を有するものをいう。
  - |-
    ②インターネットプロトコル電話用設備とは、事業用電気通信設備のうち、端末設備等をインターネットプロトコルを使用してパケット交換網に接続するもの（携帯電話用設備を除く。）であって、音声伝送役務の提供の用に供するものをいう。
  - |-
    ③インターネットプロトコルを用いた総合デジタル通信用設備とは、総合デジタル通信用設備のうち、端末設備または自営電気通信設備を接続する点においてインターネットプロトコルを使用するものをいう。
  - |-
    ④直流回路とは、電気通信回線設備に接続して電気通信事業者の端末系伝送路設備の動作の開始および終了の制御を行うための回路をいう。
  - ⑤呼量とは1時間に発生した呼の同時接続時間の総和を1時間で除したものをいう。
  answer: 2
  explanation: |-
    ②が正しい。インターネットプロトコル電話用設備の定義として正確。①モジュラジャック式は2線式の定義でない。③総合デジタル通信用設備の説明ではなくインターネットプロトコルを用いたISDNの説明。④直流回路は端末設備側の回路。⑤呼量は保留時間の総和÷観測時間。
- id: r6_1_houki_q03_イ
  number: 3-(2)
  text: |-
    電気通信回線設備を設置する電気通信事業者の電気通信設備の損壊または故障の対策における「予備機器等」および「故障検出」について述べた文章A～CはＸである。
    A：伝送路設備には、予備の電気通信回線を設置しなければならない。ただし、当該伝送路設備の故障等の発生時に、端末回線によりその疎通が確保できるものについては、この限りでない。
    B：事業用電気通信設備は、電源停止、共通制御機器の動作停止その他電気通信役務の提供に直接係る機能に重大な支障を及ぼす故障等の発生時には、これを直ちに検出し、記録する機能を備えなければならない。
    C：固定電話接続用設備は、その故障等の発生時に他の地域に設置された固定電話接続用設備に速やかに切り替えられるようにしなければならない。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 3
  explanation: |-
    Bのみ正しい。A：伝送路設備の予備回線は「端末回線」ではなく「別の伝送路設備」等による代替が条件。C：固定電話接続用設備の切替義務は規則に規定されていない表現。Bの故障検出・記録機能は正しく規定されている。
- id: r6_1_houki_q03_ウ
  number: 3-(3)
  text: |-
    電気通信回線設備を設置する電気通信事業者の電気通信設備の損壊または故障の対策における「異常ふくそう対策等」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①異常ふくそうとは、特定の交換設備に対し通信が集中することにより、交換設備の通信の疎通能力が継続して著しく低下する現象をいう。
  - |-
    ②交換設備は、異常ふくそうが発生した場合に、これを検出し、かつ、通信の疎通を停止する機能またはこれと同等の機能を有するものでなければならない。ただし、通信が同時に集中することがないようこれを制御することができる交換設備については、この限りでない。
  - |-
    ③携帯電話用設備、特定携帯電話用設備およびPHS用設備は、多数の移動端末設備が同時に電気通信設備と接続する場合等に生じるトラヒックの瞬間的かつ急激な増加により電気通信役務の提供に重大な支障を及ぼすことがないよう、措置を講じられなければならない。
  - |-
    ④携帯電話用設備、特定携帯電話用設備およびPHS用設備は、移動端末設備に由来する制御信号の増加により電気通信役務の提供に重大な支障を及ぼすことがないよう、措置を講じられなければならない。
  answer: 2
  explanation: |-
    ②が誤り。異常ふくそう検出時の対応は「通信の疎通を停止する」ではなく「通信の疎通能力の低下を防止し又は回復させる」機能が求められる。疎通を停止するのではなく適切にトラフィックを制御する。
- id: r6_1_houki_q03_エ
  number: 3-(4)
  text: |-
    電気通信回線設備を設置する電気通信事業者の電気通信設備の損壊または故障の対策における「事業用電気通信設備を設置する建築物等」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①風水害その他の自然災害及び火災の被害を容易に受けない環境に設置されたものでなければならない。ただし、やむを得ず被害を受けやすい環境に設置されたものであって、必要な防護措置が講じられているものは、この限りでない。
  - |-
    ②当該事業用電気通信設備が安定に動作する温度及び湿度を維持することができるものでなければならない。
  - |-
    ③当該事業用電気通信設備を安全に設置することができる堅固で絶縁性に優れ、特別保安接地を施した電気的遮へい層を有する隔壁で保護されているものでなければならない。
  - |-
    ④当該事業用電気通信設備を収容し、または設置する通信機械室に、公衆が容易に立ち入り、または公衆が容易に事業用電気通信設備に触れることができないよう施錠その他必要な措置が講じられているものでなければならない。
  answer: 3
  explanation: |-
    ③が誤り。「特別保安接地を施した電気的遮へい層を有する隔壁で保護」という規定は事業用電気通信設備規則にない。規定では堅固さや温湿度管理、セキュリティ対策が求められるが、遮へい層の規定はない。
- id: r6_1_houki_q03_オ
  number: 3-(5)
  text: |-
    電気通信回線設備を設置する電気通信事業者の電気通信設備の「電源設備」および「停電対策」について述べた文章A～CはＸである。
    A：事業用電気通信設備の電源設備は、最繁忙時に事業用電気通信設備の消費電流を安定的に供給できる容量があり、かつ、電源設備の動作電圧を変動許容範囲内に維持できるものでなければならない。
    B：事業用電気通信設備の電力の供給に直接係る電源設備の機器（自家用発電機及び蓄電池を除く。）は、予備の機器の設置若しくは配備の措置またはこれに準ずる措置が講じられ、かつ、故障等の発生時に当該予備の機器に速やかに切り替えられるようにしなければならない。
    C：事業用電気通信設備は、通常受けている電力の供給が停止した場合においてその取り扱う通信が停止することのないよう自家用発電機及び蓄電池の設置その他これに準ずる措置が講じられていなければならない。この場合において、交換設備にあっては、自家用発電機はその機能を代替することができる予備機器の設置が講じられていなければならない。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Bのみ正しい。A：「最繁忙時」は正しいが電源設備の容量規定の表現として不正確。C：停電対策規定は正しいが、後半「交換設備にあっては自家用発電機はその機能を代替する予備機器の設置」という規定はなく誤り。Bの予備機器配備と切替の規定は正しい。
- id: r6_1_houki_q04_ア
  number: 4-(1)
  text: |-
    事業用電気通信設備規則に規定する電気通信回線設備を設置する電気通信事業者の電気通信設備の「漏えい対策」、「損傷防止」および「機能障害の防止」について述べた文章A～CはＸである。
    A：電気通信事業者は、総務大臣が別に告示するところに従い特定端末設備または自営電気通信設備と配線設備との間の電気通信回線に伝送される信号の漏えいに関し、あらかじめ基準を定め、その基準を維持するように努めなければならない。
    B：事業用電気通信設備は、利用者または他の電気通信事業者の接続する電気通信設備を損傷するおそれのある電力若しくは電流を送出し、または接続設備を損傷するおそれのある電圧若しくは光出力により送出するものであってはならない。
    C：事業用電気通信設備は、接続設備の機能に障害を与えるおそれのある電気信号または磁気信号を送出するものであってはならない。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Bのみ正しい。A：漏えい基準は「維持するように努めなければならない」ではなく「維持しなければならない」が正しい。C：磁気信号の送出禁止は規定にない。Bの損傷防止規定は正しく規定されている。
- id: r6_1_houki_q04_イ
  number: 4-(2)
  text: |-
    事業用電気通信設備規則に規定するアナログ電話用設備の「電源供給」または「信号極性」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①事業用電気通信設備は、呼出信号の送出時を除き、端末設備等を接続する点において端末設備等を切り離した時の線間電圧が42ボルト以上かつ53ボルト以下であることに適合する通信用電源を供給しなければならない。
  - |-
    ②事業用電気通信設備は、呼出信号の送出時を除き、端末設備等を接続する点において両線間を300オームの純抵抗で終端した時の回路電流が15ミリアンペア以上であることに適合する通信用電源を供給しなければならない。
  - |-
    ③事業用電気通信設備は、呼出信号の送出時を除き、端末設備等を接続する点において両線間を50オームの純抵抗で終端した時の回路電流が150ミリアンペア以下であることに適合する通信用電源を供給しなければならない。
  - |-
    ④事業用電気通信設備は、発呼信号を受信できる状態において、電源の極性を端末設備等を接続する点において一方を地気（接地の電位をいう。）、他方を負極性としなければならない。
  answer: 3
  explanation: |-
    ③が誤り。正しくは「両線間を200オームの純抵抗で終端した時の回路電流が120ミリアンペア以下」等、数値が異なる。50オーム・150mAという数値の組み合わせは規定されていない。
- id: r6_1_houki_q04_ウ
  number: 4-(3)
  text: |-
    端末設備等規則に規定する安全性等について述べた文章A～CはＸである。
    A：端末設備は、事業用電気通信設備との間で鳴音（電気的または音響的結合により生ずる発振状態をいう。）を発生することを防止するために電気通信事業者が定める技術的条件を満たすものでなければならない。
    B：端末設備は、事業用電気通信設備から漏えいする通信の内容を意図的に識別する機能を有してはならない。
    C：通話機能を有する端末設備は、通話中に受話器から過大な音響衝撃が発生することを防止する機能を備えなければならない。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCが正しい。A：鳴音防止の条件は「電気通信事業者が定める技術的条件」ではなく端末設備等規則の規定。B（盗聴機能禁止）とC（過大音響衝撃防止）はいずれも端末設備等規則に正しく規定されている。
- id: r6_1_houki_q04_エ
  number: 4-(4)
  text: |-
    端末設備等規則に規定する、インターネットプロトコル電話端末の「基本的機能」、「発信の機能」または「ふくそう通知機能」について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①発信または応答を行う場合にあっては、呼の設定を行うためのメッセージまたは当該メッセージに対応するためのメッセージを確認するものであること。
  - |-
    ②通信を終了する場合にあっては、呼の切断、解放若しくは取消しを行うためのメッセージまたは当該メッセージに対応するためのメッセージを確認するものであること。
  - |-
    ③発信に際して相手の端末設備からの応答を自動的に確認する場合にあっては、電気通信回線からの応答が確認できない場合呼の設定を行うためのメッセージ送出終了後3分以内に通信終了メッセージを送出するものであること。
  - |-
    ④インターネットプロトコル電話端末は、インターネットプロトコル電話用設備からふくそうが発生している旨の信号を受信した場合にその旨を利用者に通知するための機能を備えなければならない。
  answer: 4
  explanation: |-
    ④が正しい。ふくそう通知機能として、IP電話用設備からふくそう信号を受信した場合に利用者へ通知する機能を備えることが端末設備等規則に規定されている。
- id: r6_1_houki_q04_オ
  number: 4-(5)
  text: |-
    端末設備等規則に規定する専用通信回線設備等端末が適合しなければならない条件について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①当該専用通信回線設備等端末に備えられた電気通信の機能に係る設定を変更するための電気通信番号を有すること。
  - |-
    ②当該専用通信回線設備等端末が有する電気通信番号に係る識別符号であって、初めて当該専用通信回線設備等端末を利用するときにあらかじめ設定されているものの記録を促す機能若しくはこれに準ずるものを有すること又は当該識別符号について機器ごとに異なるものが付されていること若しくはこれに準ずる措置が講じられていること。
  - |-
    ③当該専用通信回線設備等端末は、電気通信回線に対して交流の電圧を加えるものであってはならない。ただし、電気的条件等に規定する総務大臣が別に告示する条件において交流重畳が認められる場合にあっては、この限りでない。
  - |-
    ④複数の電気通信回線と接続される当該専用通信回線設備等端末の回線相互間の漏話減衰量は、1,500ヘルツにおいて70デシベル以上でなければならない。
  answer: 4
  explanation: |-
    ④が正しい。専用通信回線設備等端末の回線相互間漏話減衰量は1,500Hzにおいて70dB以上と端末設備等規則に規定されている。
- id: r6_1_houki_q05_ア
  number: 5-(1)
  text: |-
    有線電気通信法に規定する「目的」、「技術基準」および「本邦外にわたる有線電気通信設備」について述べた文章A～CはＸである。
    A：有線電気通信法は、有線電気通信設備の設置及び使用を規律し、有線電気通信に関する秩序を確立することによって、公共の福祉の増進に寄与することを目的とする。
    B：有線電気通信設備（政令で定めるものを除く。）の技術基準により確保されなければならない事項の一つとして、有線電気通信設備は、他人の設置する有線電気通信設備に妨害を与えないようにすることがある。
    C：本邦内の場所と本邦外の場所との間の有線電気通信設備は、電気通信事業者がその事業の用に供する設備として設置する場合を除き、設置してはならない。ただし、特別の事由がある場合において、期間を定めて臨時に設置するときは、この限りでない。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 4
  explanation: |-
    A、Bが正しい。C：本邦外にわたる有線電気通信設備の設置は電気通信事業者の設備に限らず、総務大臣の許可を受ければ設置可能な場合があり、「電気通信事業者が…設置する場合を除き設置してはならない」は誤り。
- id: r6_1_houki_q05_イ
  number: 5-(2)-イ
  text: |-
    有線電気通信法に規定する「有線電気通信設備の届出」：有線電気通信設備を設置しようとする者は、有線電気通信の＿＿、設備の設置の場所及び設備の概要を記載した書類を添えて届け出なければならない。（最初の空欄）
  options:
  - ①工事仕様書
  - ②料金体系
  - ③設置の目的
  - ④提供条件
  - ⑤使用の態様
  - ⑥運用方法
  - ⑦接続の方法
  - ⑧方式の別
  - ⑨工事の期間
  - ⑩接続構成
  answer: 8
  explanation: |-
    有線電気通信法第3条：「有線電気通信の方式の別、設備の設置の場所及び設備の概要」を記載した書類を添えて届け出る。正答は⑧方式の別。
- id: r6_1_houki_q05_ウ
  number: 5-(2)-ウ
  text: |-
    同条文の2番目の空欄：他人の通信の用に供されるものに該当するものであるときは、有線電気通信の方式の別、設備の設置の場所及び設備の概要のほか、その＿＿その他総務省令で定める事項を併せて届け出なければならない。
  options:
  - ①工事仕様書
  - ②料金体系
  - ③設置の目的
  - ④提供条件
  - ⑤使用の態様
  - ⑥運用方法
  - ⑦接続の方法
  - ⑧方式の別
  - ⑨工事の期間
  - ⑩接続構成
  answer: 5
  explanation: |-
    他人の通信の用に供される設備の届出には「使用の態様」その他の事項を追加して届け出なければならない。正答は⑤使用の態様。
- id: r6_1_houki_q05_エ
  number: 5-(3)
  text: |-
    有線電気通信設備令または有線電気通信設備令施行規則に規定する用語について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①平衡度とは、通信回線の中性点と大地との間に起電力を加えた場合におけるこれらの間に生ずる電圧と通信回線の端子間に生ずる電圧との比をデシベルで表わしたものをいう。
  - |-
    ②低周波とは、周波数が300ヘルツ以下の電磁波をいい、音声周波とは、周波数が300ヘルツを超え、3,500ヘルツ以下の電磁波をいう。
  - |-
    ③強電流電線とは、強電流電気の伝送を行うための導体をいい、絶縁物または保護物で被覆されている場合は、これらの物を除く。
  - |-
    ④離隔距離とは、線路と他の物体（線路を含む。）とが接近し又は交差する場合において、相互に通信の妨げにならないこれらの物の間の最短距離をいう。
  - ⑤絶縁電線とは、絶縁物及び保護物で被覆されている電線をいう。
  answer: 1
  explanation: |-
    ①が正しい。平衡度の定義として正確。②低周波は200Hz以下が正しい。③強電流電線は被覆も含む。④離隔距離は「通信の妨げにならない」ではなく「安全に」設置するための距離。⑤絶縁電線は絶縁物のみで被覆（保護物を除く）。
- id: r6_1_houki_q05_オ
  number: 5-(4)
  text: |-
    有線電気通信設備令に規定する「架空電線の支持物」、「使用可能な電線の種類」、「線路の電圧および通信回線の電力」、「架空電線の高さ」または「架空電線と他人の設置した架空電線等との関係」について述べた次の文章のうち、誤っているものはどれか。
  options:
  - ①道路上に設置する電柱等は、総務省令で定める安全係数をもたなければならない。
  - |-
    ②有線電気通信設備に使用する電線は、絶縁電線またはケーブルでなければならない。ただし、総務省令で定める場合は、この限りでない。
  - |-
    ③通信回線の電力は、絶対レベルで表わした値で、その周波数が低周波であるときは、プラス10デシベル以下、音声周波であるときは、プラス20デシベル以下でなければならない。
  - |-
    ④架空電線の高さは、その架空電線が道路上にあるとき、鉄道または軌道を横断するとき、および河川を横断するときは、総務省令で定めるところによらなければならない。
  - |-
    ⑤架空電線は、他人の設置した架空電線との離隔距離が30センチメートル以下となるように設置してはならない。
  answer: 3
  explanation: |-
    ③が誤り。通信回線の電力（絶対レベル）は低周波でプラス10dB以下は正しいが、音声周波はプラス20dBではなくプラス10dB以下が正しい規定。（有線電気通信設備令第19条）
- id: r6_1_houki_q05_カ
  number: 5-(5)
  text: |-
    有線電気通信設備令施行規則の「屋内電線と屋内強電流電線との交差または接近」において、屋内電線と屋内強電流電線とを同一の管等に収めて設置しないことの適用が除外される場合について述べた文章A～CはＸである。
    A：屋内電線が、特別保安接地工事を施した金属製の電気的遮へい層を有する絶縁電線であるとき。
    B：屋内電線と屋内強電流電線との間に堅ろうな隔壁を設け、かつ、金属製部分に特別保安接地工事を施したダクトまたはボックスの中に屋内電線と屋内強電流電線を収めて設置するとき。
    C：屋内電線が、光ファイバその他金属以外のもので構成されているとき。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCが正しい。A：特別保安接地工事を施した遮へい層を有する絶縁電線は除外規定に該当するが、「同一管等に収める」ことの禁止は解除されない（別の方法で設置）。Bの隔壁設置とCの光ファイバ等は除外規定として正しい。
