- id: r6_1_setubi_q06_エ
  number: 6-(2)
  text: |-
    10ギガビットイーサネットのインタフェースなどについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①10GBASE-LX4は、送信データを4つの信号に分割した後、それぞれの信号を光信号に変換し、4本の光ファイバに送出するインタフェースを有しており、伝送媒体としてMM光ファイバを用いると最大伝送距離は300m程度となる。
  - |-
    ②10GBASE-Tでは、信号伝送に必要な周波数帯域幅を抑えるために、多値の振幅変調としてPAM16を採用している。
  - |-
    ③10GBASE-LRでは、64B/66B符号化方式が採用されており、光源として850nm帯のLDを用い、伝送媒体として、一般に、SM光ファイバが用いられる。
  - |-
    ④10GBASE-EWは、SDH/SONETとの接続互換性を考慮したSM光ファイバのインタフェースを有しており、最大伝送距離は10km程度である。
  answer: 2
  explanation: |-
    ②が正しい。10GBASE-Tはカテゴリーケーブルでのメタリック伝送規格であり、PAM-16（16値パルス振幅変調）を採用して伝送帯域幅を抑制している。①10GBASE-LX4はWDMを用い1本の光ファイバで複数波長を送受信。③10GBASE-LRの光源は1310nm帯。④10GBASE-EWは最大40kmが正しい。
- id: r6_1_setubi_q06_オ
  number: 6-(3)
  text: |-
    ルーティングにおける制御アルゴリズムについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①距離と方向によって目的のネットワークやホストまでの経路を決定するアルゴリズムを用いる方式は、一般に、ディスタンスベクタ型といわれる。
  - |-
    ②ディスタンスベクタ型では、ネットワークの構造が複雑になると、経路が収束するまでに時間を要する、経路にループが発生しやすいなどの問題が生ずるおそれがある。
  - |-
    ③ネットワークに接続されている全てのルータがネットワーク全体の接続状態を把握し、各ルータ間で同期させることで目的のネットワークやホストまでの最適な経路を選択するアルゴリズムを用いる方式は、一般に、リンクステート型といわれる。
  - |-
    ④ディスタンスベクタ型では、ネットワークに接続されている全てのルータの持つ経路制御情報は同じである。
  answer: 4
  explanation: |-
    ④が誤り。ディスタンスベクタ型（RIP等）では、各ルータは隣接ルータとの距離・方向情報のみを交換するため、全ルータが全く同じ経路情報を持つわけではない。リンクステート型（OSPF等）ではLSDBを全ルータで同期させる。
- id: r6_1_setubi_q06_カ
  number: 6-(4)
  text: |-
    IPv6におけるアドレスの自動生成または自動設定について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①ホスト自身のMACアドレスなどから得られるインタフェースIDとルータからのプレフィックス情報を組み合わせて、ホストがIPv6アドレスを生成する方法は、ステートレスアドレス自動生成といわれる。
  - |-
    ②IPv6アドレスなどの割当てを要求してきたホストに対して、DHCPv6サーバがIPv6アドレスを動的に割り当てる方法は、ステートフルアドレス自動設定といわれる。
  - |-
    ③ステートレスアドレス自動生成によりIPv6アドレスを生成したホストは、ステートフルアドレス自動設定を利用してDHCPv6サーバから情報を取得することはできない。
  - |-
    ④自動設定に用いられるDHCPv6サーバには、IPv6ホストに対して更新すべき設定パラメータや新規パラメータがあることを通知する機能がある。
  answer: 3
  explanation: |-
    ③が誤り。ステートレスアドレス自動生成を使用したホストでも、追加情報（DNSサーバアドレス等）を取得するためにDHCPv6（ステートレスDHCPv6）を利用することができる。両者は排他的ではない。
