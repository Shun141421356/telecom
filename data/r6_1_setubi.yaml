- id: r6_1_setubi_q07_オ
  number: 7-(2)
  text: 品質管理に用いられる技法について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①測定値の存在する範囲を幾つかの区間に分け、分けたそれぞれの区間を底辺とし、各区間に属する測定値の度数に比例する面積を持つ長方形を並べた図は、パレート図といわれ、その分布の形によって工程における異常を認知することなどに用いられる。
  - |-
    ②主軸である右方向矢印横線の先端に解決すべき問題（特性）を記入し、その横線の両側に斜め方向の線を描き、その問題に関連する要因を表した図は、特性要因図といわれ、問題の因果関係を整理し根本原因を追究することなどに用いられる。
  - |-
    ③データを分類項目別に集計・整理し、分布状況が判断しやすく記入できるようにした記録用紙は、チェックシートといわれ、特性要因図やパレート図のような技法に用いるデータを提供することなどに用いられる。
  - |-
    ④データを収集した順に打点した折れ線グラフに、バラツキが生じたかどうかを判定する線を記入した図は、管理図といわれ、工程における異常を発見し、安定状態を維持することなどに用いられる。
  answer: 1
  explanation: |-
    ①が誤り。「分布の形によって工程における異常を認知する」のはヒストグラムの説明。パレート図は項目を値の大きい順に並べた棒グラフと累積折れ線グラフを組み合わせた図で、重要な問題（少数の原因に多数の問題）を特定するために使用する。
- id: r6_1_setubi_q07_カ
  number: 7-(3)
  text: 設備保全の種類について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①故障を検出後、設備を要求どおりの実行状態に修復させるために行う保全は集中保全といわれ、一般に、故障の影響の小さい設備に適用される。
  - |-
    ②故障が起こりにくい設備への改善、または性能向上を目的とした保全は予知保全といわれ、具体的には、故障の再発防止のための改善、保全を容易にするための改善などがある。
  - |-
    ③設備の劣化傾向を設備診断技術などによって管理し、故障に至る前の最適な時期に最善の対策を行う保全は遠隔保全といわれ、常に設備の劣化状況をモニタリングしてあらかじめ定めた基準値に至った場合に部品の交換、修理などを行う。
  - |-
    ④設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は予防保全といわれ、予防保全の一つに、規定した時間計画に従って実行される時間計画保全がある。
  answer: 4
  explanation: |-
    ④が正しい。予防保全は故障発生を事前に防ぐための計画的な保全活動で、時間計画保全（定期保全）はその代表例。①は事後保全。②は改良保全の説明。③は予知保全（CBM：Condition Based Maintenance）の説明。
- id: r6_1_setubi_q07_キ
  number: 7-(4)
  text: |-
    防災に関する法令に基づく災害対策への取組などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①災害対策基本法に基づき、中央防災会議が作成した防災基本計画における企業防災の促進において、企業はBCPを策定し、BCMの取組を通じて防災活動の推進に努めることとされている。
  - |-
    ②指定公共機関は、防災基本計画に基づき、その業務に関し、防災業務計画を作成し、または修正したときは、速やかに当該指定公共機関を所管する都道府県知事に報告し、内閣総理大臣の承認を受けなければならない。
  - |-
    ③指定公共機関として指定された電気通信事業者は、防災基本計画に基づき、耐水構造化や耐震構造化による電気通信設備などの高信頼化、主要な伝送路の多ルート化や主要な中継交換機の分散設置による電気通信システムの高信頼化などを防災業務計画に定め、災害対策に取り組んでいる。
  - |-
    ④災害予防責任者は、防災計画の定めるところにより、その所掌業務について、災害に関する情報を迅速に伝達するため必要な組織を整備し、絶えずその改善に努めなければならない。
  answer: 2
  explanation: |-
    ②が誤り。指定公共機関は防災業務計画を作成・修正したときは「内閣総理大臣に報告し」内閣総理大臣の承認を受ける。「都道府県知事に報告」は誤り。
- id: r6_1_setubi_q07_ク
  number: 7-(5)
  text: |-
    JIS Z 8115：2019ディペンダビリティ用語に規定されている信頼性試験の用語について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①スクリーニング試験とは、不適合アイテムまたは初期故障を起こしそうなアイテムの検出及び除去を意図する試験をいう。
  - |-
    ②品質認定試験とは、利用者の運用状態で実施する試験であって、試験時には、運転、環境、保全および測定の条件を監視または記録して行う試験をいう。
  - |-
    ③ステップストレス試験とは、ストレスに対する反応が生じるのに必要な期間を短縮させるために、所定の動作条件下で生じるストレス水準、またはストレス印加率を超えて実施する試験をいう。
  - |-
    ④耐久試験とは、修正されたアイテムに対して、修正のための変更が正しく、かつ、変更されない部分に悪影響を及ぼさないことの確かさを把握するための試験をいう。
  answer: 1
  explanation: |-
    ①が正しい。スクリーニング試験（バーンイン等）は初期不良品を事前に選別・除去するための試験。②は運用試験の説明。③は加速試験の説明。④は回帰試験（リグレッションテスト）の説明。
- id: r6_1_setubi_q07_ケ
  number: 7-(6)-(ⅰ)
  text: |-
    装置Aの故障率が2%/時間であるとき、固有アベイラビリティが96%であるためには、MTTRは＿＿時間でなければならない。（四捨五入で整数値）
  options:
  - ①1
  - ②2
  - ③3
  - ④48
  - ⑤52
  answer: 2
  explanation: |-
    固有アベイラビリティA=MTBF/(MTBF+MTTR)。故障率λ=0.02/h→MTBF=1/λ=50h。0.96=50/(50+MTTR)→50+MTTR=50/0.96≒52.08→MTTR≒2.08≒2時間。
- id: r6_1_setubi_q07_コ
  number: 7-(6)-(ⅱ)
  text: |-
    装置Aの故障率が1%/時間、装置BのMTBFが500時間、装置CのMTBFが200時間であるとき、装置A、BおよびCがそれぞれ1台ずつ直列に接続されたシステムのMTBFは＿＿時間である。（四捨五入で整数値）
  options:
  - ①1
  - ②13
  - ③59
  - ④64
  - ⑤125
  answer: 3
  explanation: |-
    直列システムの故障率λs=λA+λB+λC。λA=0.01、λB=1/500=0.002、λC=1/200=0.005。λs=0.01+0.002+0.005=0.017。MTBFs=1/0.017≒58.8≒59時間。
- id: r6_1_setubi_q08_ア
  number: 8-(1)-ア
  text: |-
    情報通信システムの運用におけるユーザデータなどのバックアップ管理：ユーザデータ、プログラムなどを退避させて保存していた記録媒体から回復させることは、一般に、＿＿といわれる。
  options:
  - ①増分
  - ②コールド
  - ③オブジェクト
  - ④キャッシュ
  - ⑤完全
  - ⑥リライト
  - ⑦バッチ
  - ⑧ジャーナル
  - ⑨定期
  - ⑩リストア
  - ⑪リフレッシュ
  - ⑫オンサイト
  - ⑬差分
  - ⑭リブート
  - ⑮オンライン
  - ⑯オフサイト
  answer: 10
  explanation: |-
    リストア（Restore）：バックアップデータからシステムやデータを元の状態に回復させる操作。バックアップの逆の操作。
- id: r6_1_setubi_q08_イ
  number: 8-(1)-イ
  text: |-
    最新のフルバックアップ以降に追加・更新された全てのデータを毎回バックアップする方法は＿＿バックアップといわれる。
  options:
  - ①増分
  - ②コールド
  - ③オブジェクト
  - ④キャッシュ
  - ⑤完全
  - ⑥リライト
  - ⑦バッチ
  - ⑧ジャーナル
  - ⑨定期
  - ⑩リストア
  - ⑪リフレッシュ
  - ⑫オンサイト
  - ⑬差分
  - ⑭リブート
  - ⑮オンライン
  - ⑯オフサイト
  answer: 13
  explanation: |-
    差分バックアップ：最後のフルバックアップ以降に変更されたすべてのデータをバックアップする方法。毎回同じ基準点（フルバックアップ）からの差分をとる。復元時はフルバックアップ+最新の差分バックアップで済む。
- id: r6_1_setubi_q08_ウ
  number: 8-(1)-ウ
  text: |-
    直前のバックアップ以降に追加・更新されたデータのみをバックアップする方法は＿＿バックアップといわれる。
  options:
  - ①増分
  - ②コールド
  - ③オブジェクト
  - ④キャッシュ
  - ⑤完全
  - ⑥リライト
  - ⑦バッチ
  - ⑧ジャーナル
  - ⑨定期
  - ⑩リストア
  - ⑪リフレッシュ
  - ⑫オンサイト
  - ⑬差分
  - ⑭リブート
  - ⑮オンライン
  - ⑯オフサイト
  answer: 1
  explanation: |-
    増分バックアップ：前回のバックアップ（フルまたは増分）以降に変更されたデータのみをバックアップする方法。バックアップ量が少ないが、復元時はフルバックアップ＋全増分バックアップが必要。
- id: r6_1_setubi_q08_エ
  number: 8-(1)-エ
  text: |-
    データの書換え要求の内容を記録した＿＿ファイルを常に保持することにより、バックアップデータと＿＿ファイルを基にシステムダウン直前の状態までデータを回復させることができる。
  options:
  - ①増分
  - ②コールド
  - ③オブジェクト
  - ④キャッシュ
  - ⑤完全
  - ⑥リライト
  - ⑦バッチ
  - ⑧ジャーナル
  - ⑨定期
  - ⑩リストア
  - ⑪リフレッシュ
  - ⑫オンサイト
  - ⑬差分
  - ⑭リブート
  - ⑮オンライン
  - ⑯オフサイト
  answer: 8
  explanation: |-
    ジャーナルファイル：データベースやファイルシステムへの更新操作を時系列に記録したログファイル。バックアップデータ＋ジャーナルファイルで障害直前の状態まで復元できる（ロールフォワード）。
- id: r6_1_setubi_q08_オ
  number: 8-(2)
  text: ソフトウェアのライセンスについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①企業、教育機関などの組織が同じソフトウェアを一括で購入して、当該組織内の複数のユーザや複数のコンピュータで利用できるようにするライセンス形態は、一般に、サイトライセンスといわれる。
  - |-
    ②ソースコードがインターネットなどを通じて公開されていて、利用、改良及び再頒布が許可されたソフトウェアは、一般に、シェアウェアといわれる。
  - |-
    ③コンピュータプログラムは、著作物として著作権法で保護されており、コンピュータプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となるアイデアやアルゴリズムを考案した者に帰属する。
  - |-
    ④著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約といわれ、クリックオン契約では、一般に、購入者がコンピュータにソフトウェアをインストールした行為をもって使用許諾契約に同意したとみなされる。
  answer: 1
  explanation: |-
    ①が正しい。サイトライセンス（ボリュームライセンス）は組織単位で複数ユーザ・端末への使用権を一括購入するライセンス形態。②はオープンソースソフトウェアの説明（シェアウェアは試用後有料）。③著作権はコーディングを行った者（著作者）に帰属。④クリックオン契約はインストール時の「同意」クリックで成立。
- id: r6_1_setubi_q08_カ
  number: 8-(3)
  text: |-
    JIS Q 20000-1:2020に規定されている需要管理または容量・能力管理について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①あらかじめ定めた間隔で、組織は、サービスに対する現在の需要を決定し、将来の需要を予測しなければならない。
  - |-
    ②あらかじめ定めた間隔で、組織は、サービスの需要及び消費を監視及び報告しなければならない。
  - |-
    ③人、技術、情報及び財務に関する資源の容量・能力の要求事項を、サービス及びパフォーマンスの要求事項を考慮して決定し、文書化し、維持しなければならない。
  - |-
    ④組織は、合意した容量・能力及びパフォーマンスの要求事項を満たすためにサービスの供給を調整しなければならない。
  - |-
    ⑤組織は、容量・能力の利用を監視し、容量・能力及びパフォーマンスデータを分析し、パフォーマンスを改善するための機会を特定しなければならない。
  answer: 4
  explanation: |-
    ④が誤り。需要管理では「需要を調整する」（需要側に働きかける）ことも規定されており、単にサービスの供給を調整するだけではない。正しくは需要と供給の両面からバランスを取ることが求められる。
- id: r6_1_setubi_q09_ア
  number: 9-(1)-ア
  text: |-
    無線LANのセキュリティ：WPA2のエンタープライズモードでは、IEEE802.＿＿といわれる認証規格に基づき相手認証が行われる。
  options:
  - ①ESP
  - ②CCMP
  - ③ハイブリッド
  - ④3
  - ⑤WEP
  - ⑥ブロック
  - ⑦RSA
  - ⑧11
  - ⑨DH
  - ⑩公開鍵
  - ⑪SAE
  - ⑫16
  - ⑬DSA
  - ⑭CHAP
  - ⑮ストリーム
  - ⑯1X
  answer: 16
  explanation: |-
    IEEE802.1X：LANにおけるポートベースのアクセス制御・認証プロトコル。EAP（拡張認証プロトコル）を使用し、RADIUS等の認証サーバと連携してクライアントを認証する。WPA2エンタープライズの基盤技術。
- id: r6_1_setubi_q09_イ
  number: 9-(1)-イ
  text: |-
    WPA2における暗号化方式として、暗号アルゴリズムに＿＿暗号の一つであるAESを採用したCCMPといわれるプロトコルの実装が必須とされている。
  options:
  - ①ESP
  - ②CCMP
  - ③ハイブリッド
  - ④3
  - ⑤WEP
  - ⑥ブロック
  - ⑦RSA
  - ⑧11
  - ⑨DH
  - ⑩公開鍵
  - ⑪SAE
  - ⑫16
  - ⑬DSA
  - ⑭CHAP
  - ⑮ストリーム
  - ⑯1X
  answer: 6
  explanation: |-
    AES（Advanced Encryption Standard）はブロック暗号の一種。128ビット固定ブロック長で動作する対称暗号。WPA2のCCMPはAES-CCM（Counter Mode with CBC-MAC）モードを使用する。
- id: r6_1_setubi_q09_ウ
  number: 9-(1)-ウ
  text: |-
    WPA2における暗号化方式として、暗号アルゴリズムにブロック暗号の一つであるAESを採用した＿＿といわれるプロトコルの実装が必須とされている。
  options:
  - ①ESP
  - ②CCMP
  - ③ハイブリッド
  - ④3
  - ⑤WEP
  - ⑥ブロック
  - ⑦RSA
  - ⑧11
  - ⑨DH
  - ⑩公開鍵
  - ⑪SAE
  - ⑫16
  - ⑬DSA
  - ⑭CHAP
  - ⑮ストリーム
  - ⑯1X
  answer: 2
  explanation: |-
    CCMP（Counter Mode with CBC-MAC Protocol）：WPA2で必須の暗号化プロトコル。AES-128ビットを使用し、TKIPより高いセキュリティを提供する。
- id: r6_1_setubi_q09_エ
  number: 9-(1)-エ
  text: |-
    WPA3のパーソナルモードでは、相手認証及び鍵交換に＿＿といわれる安全性の高い方式が採用されている。
  options:
  - ①ESP
  - ②CCMP
  - ③ハイブリッド
  - ④3
  - ⑤WEP
  - ⑥ブロック
  - ⑦RSA
  - ⑧11
  - ⑨DH
  - ⑩公開鍵
  - ⑪SAE
  - ⑫16
  - ⑬DSA
  - ⑭CHAP
  - ⑮ストリーム
  - ⑯1X
  answer: 11
  explanation: |-
    SAE（Simultaneous Authentication of Equals）：WPA3パーソナルで採用された相互認証・鍵交換プロトコル。Dragonfly鍵交換に基づき、オフライン辞書攻撃への耐性が高い。WPA2-PSKの脆弱性を解決。
- id: r6_1_setubi_q09_オ
  number: 9-(2)
  text: |-
    情報システムへの攻撃の前段階として行われる情報収集の手法について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①組織内のホストのIPアドレスを探り出す手法は、一般に、IPスプーフィングといわれる。
  - |-
    ②サーバ上で稼働しているアプリケーションに対して、具体的なソフトウェアやそのバージョンを探り出す手法は、一般に、NAPTといわれる。
  - |-
    ③サーバに連続してアクセスし、使用しているポートを探り出す手法は、一般に、スニッフィングといわれる。
  - |-
    ④人間の心理的な隙や行動のミスなどにつけ込むことにより、認証のために必要となるパスワードなどの重要な情報を盗み出す手法は、一般に、ソーシャルエンジニアリングといわれる。
  answer: 4
  explanation: |-
    ④が正しい。ソーシャルエンジニアリングは技術的手段を使わず人間の心理を悪用して機密情報を入手する手法（なりすまし電話、フィッシング等）。①IPスプーフィングはIPアドレス偽装。②バナーグラビング・フィンガープリンティングが正しい手法名。③ポートスキャンが正しい。
- id: r6_1_setubi_q09_カ
  number: 9-(3)
  text: デジタル署名の概要について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①デジタル署名は、悪意のある第三者による送信データの改ざんの有無を検出するだけでなく、送信者のなりすましを検出するためにも用いられる。
  - |-
    ②デジタル署名では、送信者の秘密鍵が漏洩すると、送信データが改ざんされるおそれがある。
  - ③デジタル署名では、送信者の秘密鍵と受信者の公開鍵が用いられる。
  - |-
    ④S/MIMEでは、電子メールにデジタル署名を付加することができ、公開鍵の安全性を保証する方法としてPKIを利用している。
  answer: 3
  explanation: |-
    ③が誤り。デジタル署名では「送信者の秘密鍵」で署名を作成し、「送信者の公開鍵」で検証する。受信者の公開鍵は暗号化（機密性の確保）に使用するもので、署名とは別の操作。
- id: r6_1_setubi_q09_キ
  number: 9-(4)
  text: |-
    サーバにおけるアクセス制御について述べた文章A～CはＸである。
    A：システム管理者の決めた管理ポリシーに従ったアクセス制御ルールが全ユーザに適用される方式は、一般に、強制アクセス制御といわれる。
    B：ユーザの役割に応じて必要なオブジェクトへのアクセスが可能となるように、役割ごとにアクセス権限を設定する方式は、一般に、任意アクセス制御といわれる。
    C：ユーザやグループごとに、ファイルやシステム資源などに対して、何を許可し、何を拒絶するかなどのアクセス制御情報を記述したリストは、一般に、CRLといわれる。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 1
  explanation: |-
    Aのみ正しい。強制アクセス制御（MAC）は管理者が定めたポリシーを全ユーザに強制する方式。B：役割ベースはRBAC（Role-Based Access Control）で、任意アクセス制御（DAC）はリソース所有者が設定する方式。C：アクセス制御リストはACL（Access Control List）、CRLは証明書失効リスト。
- id: r6_1_setubi_q09_ク
  number: 9-(5)
  text: 侵入検知システム（IDS）について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①IDSは、一般に、ネットワークまたはコンピュータシステム上での事象を監視し、不正なアクセスの兆候を検知して、管理者に警報などにより通知するとともに、調査、分析などに必要な情報を保存し、提供する機能を有している。
  - |-
    ②IDSの検知アルゴリズムの一つに、過去の統計やユーザが行う通常の行動の傾向を記録しておき、そのデータから大きく外れた行動を検知することにより、未知の攻撃を発見できるシグネチャ検知がある。
  - |-
    ③ネットワーク型IDS（NIDS）は、一般に、ネットワークを流れるパケットのモニタリングを行い、不正侵入や攻撃につながるおそれがないかを検査する機能を有している。
  - |-
    ④ホスト型IDS（HIDS）は、一般に、OSやアプリケーションが生成するログデータやコマンドヒストリなど、ホスト上で生成されるイベント情報から不正侵入を検知する機能を有している。
  answer: 2
  explanation: |-
    ②が誤り。「過去の統計から外れた行動を検知して未知の攻撃を発見する」のはアノマリ検知（異常検知）の説明。シグネチャ検知は既知の攻撃パターン（シグネチャ）との照合による検知方式で、未知の攻撃には対応できない。
