id: r6_1_setubi
year: 令和6年度
session: 第1回
subject: 伝送交換設備及び設備管理
subject_short: setubi
questions:
- id: r6_1_setubi_q01_ア
  number: 1-(1)-ア
  text: |-
    光ファイバ通信システムにおける光信号の高速化技術：送信側でLDからの出力光の強度を外部変調器などを用いて変化させて信号光を生成し、受信側でPDにより信号光の強度を直接検波する＿＿方式がある。
  options:
  - ①RoF
  - ②W-CDMA
  - ③ベースバンド
  - ④コヒーレント
  - ⑤IM-DD
  - ⑥要因推定
  - ⑦IM-SSF
  - ⑧アドドロップ
  - ⑨補償
  - ⑩一括増幅
  - ⑪トランスモジュレーション
  - ⑫インコヒーレント
  answer: 5
  explanation: |-
    IM-DD（Intensity Modulation - Direct Detection）方式：強度変調・直接検波方式。信号光の強度（明暗）を変化させて送信し、受信側でフォトダイオードが直接強度を検波する最も基本的な光伝送方式。
- id: r6_1_setubi_q01_イ
  number: 1-(1)-イ
  text: |-
    送信側でLDの出力光の位相を変化させて信号光を生成し、受信側で信号光とローカルレーザ光を干渉させて信号を検出する＿＿方式がある。
  options:
  - ①RoF
  - ②W-CDMA
  - ③ベースバンド
  - ④コヒーレント
  - ⑤IM-DD
  - ⑥要因推定
  - ⑦IM-SSF
  - ⑧アドドロップ
  - ⑨補償
  - ⑩一括増幅
  - ⑪トランスモジュレーション
  - ⑫インコヒーレント
  answer: 4
  explanation: |-
    コヒーレント方式：光の位相情報を利用して信号を生成し、受信側でローカルレーザと干渉させて検波する方式。高次多値変調が可能で長距離・大容量伝送に優れる。
- id: r6_1_setubi_q01_ウ
  number: 1-(1)-ウ
  text: |-
    コヒーレント方式では、受信側でのデジタル信号処理により偏波多重信号の偏波分離、光ファイバ内で生じた波形ひずみの＿＿などが可能となる。
  options:
  - ①RoF
  - ②W-CDMA
  - ③ベースバンド
  - ④コヒーレント
  - ⑤IM-DD
  - ⑥要因推定
  - ⑦IM-SSF
  - ⑧アドドロップ
  - ⑨補償
  - ⑩一括増幅
  - ⑪トランスモジュレーション
  - ⑫インコヒーレント
  answer: 9
  explanation: |-
    コヒーレント方式のデジタル信号処理により、分散や偏波依存損失等の波形ひずみの補償（Compensation）が可能。これにより長距離伝送での品質向上が実現できる。
- id: r6_1_setubi_q01_エ
  number: 1-(2)
  text: |-
    マルチモード（MM）光ファイバまたはシングルモード（SM）光ファイバの特徴などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①MM光ファイバには、コアとクラッドとの間で屈折率が階段状に変化するステップインデックス（SI）型とコアの屈折率分布が緩やかに変化するグレーデッドインデックス（GI）型がある。
  - |-
    ②MM光ファイバにおいて、モードごとに光信号の伝搬時間が異なり波形劣化が生ずる現象は、モード分散といわれる。
  - |-
    ③光ファイバの構造を決定するパラメータとして、MM光ファイバでは、モードフィールド径、開口数などがあり、SM光ファイバでは、コア径、カットオフ波長などがある。
  - |-
    ④SM光ファイバを用いた光の伝搬では、構造分散と材料分散を合わせた波長分散が生ずることがある。このうち材料分散は、石英ガラスの屈折率が波長により異なることから生ずる。
  answer: 3
  explanation: |-
    ③が誤り。モードフィールド径はSM光ファイバのパラメータ、開口数（NA）はMM光ファイバのパラメータ。MM光ファイバではコア径・NAが主要パラメータ、SM光ファイバではモードフィールド径・カットオフ波長が主要パラメータ。
- id: r6_1_setubi_q01_オ
  number: 1-(3)
  text: |-
    デジタル伝送方式における品質劣化要因などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①PCM方式において、PAM信号をアナログ信号へ復元する際に用いる低域通過フィルタが高調波成分を完全に除去しきれないことで生ずる雑音は、一般に、準漏話雑音といわれる。
  - |-
    ②量子化雑音を低減する方法としては、発生確率の高い小振幅領域に対しては量子化ステップ幅を大きく、発生確率の低い大振幅領域に対しては量子化ステップ幅を小さく割り当てる非直線量子化が用いられる。
  - |-
    ③BERは、測定時間中に伝送されたビットの総数に対する、その間に誤って受信されたビットの個数の割合で表され、伝送品質の評価尺度の一つとして用いられており、SN比の劣化とともに増加する。
  - |-
    ④アイパターンは、デジタル伝送路などにおける信号の劣化度合いの評価に用いられる。アイの劣化は振幅方向と時間軸方向に分けられ、振幅方向の劣化の主な要因にはジッタ、ワンダなどがあり、時間軸方向の劣化の主な要因には符号間干渉、エコーなどがある。
  answer: 3
  explanation: |-
    ③が正しい。BER（Bit Error Rate）はビット誤り率で、SN比が低下するほど誤りが増加する。①は折り返し雑音（Aliasing）の説明。②は逆で小振幅を細かく（小さいステップ）・大振幅を粗く（大きいステップ）が正しい。④ジッタ・ワンダは時間軸方向の劣化要因。
- id: r6_1_setubi_q01_カ
  number: 1-(4)
  text: |-
    基幹系光ネットワークにおけるOTN（Optical Transport Network）などの特徴について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①光の波長単位で通信路を設定するために用いられる装置には、通信路を終端するOXC、光のままクロスコネクトを行いメッシュ状ネットワークに適用するOADMなどがある。
  - |-
    ②OXCやOADMでの通信路設定は、波長選択スイッチ（WSS）などの光スイッチを用いて行われる。
  - |-
    ③OTNでは、OChといわれる論理的な通信路が設定される。OChは、光多重セクションとして定義されており、波長多重信号が合分波されるごとに終端される。
  - |-
    ④OCHのフレームは、OCHのオーバヘッド、各種のクライアント信号を収容する可変長のペイロードおよび誤り訂正符号としてSOHを挿入するフィールドから構成されている。
  answer: 2
  explanation: |-
    ②が正しい。OXCやROADM（Reconfigurable OADM）での波長切り替えにはWSS（Wavelength Selective Switch）が使用される。①OXCは光クロスコネクト、OADMは光アドドロップマルチプレクサで説明が逆。③OChは光チャネルセクションでなく光チャネル。④OTNのフレームはOHとペイロードとFEC（Forward Error Correction）で構成。
- id: r6_1_setubi_q02_ア
  number: 2-(1)-ア
  text: |-
    メタルIP電話用設備における音声品質に関する技術基準には、通話品質、接続品質、総合品質、＿＿品質などがある。
  options:
  - ①疎通
  - ②安定
  - ③鳴音
  - ④ラウドネス定格
  - ⑤保留
  - ⑥残置
  - ⑦R値
  - ⑧平均オピニオン評点
  - ⑨損失
  - ⑩輻輳
  - ⑪システム
  - ⑫ネットワーク
  answer: 12
  explanation: |-
    メタルIP電話用設備の音声品質基準の一つはネットワーク品質（UNI-UNI間及びUNI-NNI間の平均遅延時間、平均遅延時間の揺らぎ等）。
- id: r6_1_setubi_q02_イ
  number: 2-(1)-イ
  text: |-
    通話品質には、端末設備－交換機間での音の大きさ（音量）によって評価する送話及び受話の＿＿が用いられている。
  options:
  - ①疎通
  - ②安定
  - ③鳴音
  - ④ラウドネス定格
  - ⑤保留
  - ⑥残置
  - ⑦R値
  - ⑧平均オピニオン評点
  - ⑨損失
  - ⑩輻輳
  - ⑪システム
  - ⑫ネットワーク
  answer: 4
  explanation: |-
    ラウドネス定格（Loudness Rating）：電話回線の音量特性を評価する指標。送話ラウドネス定格（SLR）と受話ラウドネス定格（RLR）がある。
- id: r6_1_setubi_q02_ウ
  number: 2-(1)-ウ
  text: |-
    接続品質には、生起した呼が着信側の端末設備等に着信するまでの間に＿＿となる確率などが用いられている。
  options:
  - ①疎通
  - ②安定
  - ③鳴音
  - ④ラウドネス定格
  - ⑤保留
  - ⑥残置
  - ⑦R値
  - ⑧平均オピニオン評点
  - ⑨損失
  - ⑩輻輳
  - ⑪システム
  - ⑫ネットワーク
  answer: 9
  explanation: |-
    接続品質における「損失」呼（Loss Call）の確率。発呼が相手端末に到達できない（呼損）となる確率が接続品質の評価指標として用いられる。
- id: r6_1_setubi_q02_エ
  number: 2-(2)
  text: |-
    IMSを構成するサーバの機能などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①HSSは、ユーザのID、サービス加入情報などを保持しており、ネットワークの規模にかかわらずネットワーク上に一つだけ存在する。
  - |-
    ②MGWは、回線交換網とIP網の相互接続に用いられ、回線交換網で用いられている音声伝送方式とIP網で用いられている音声伝送方式との間の相互変換の機能を有している。
  - |-
    ③S-CSCFは、ユーザのサービス制御を行う中心的なSIPサーバとしての機能要素であり、受信したSIPメッセージを分析し、適切なMGWへSIPメッセージを転送する機能を有している。
  - |-
    ④P-CSCFは、ユーザ端末が最初に接続するSIPサーバとしての機能要素であり、ユーザ端末がIMSに登録されている間、そのユーザ端末に割り当てられる。ユーザ端末は、ローミング時には移動先であっても常にホーム網のP-CSCFに接続される。
  answer: 2
  explanation: |-
    ②が正しい。MGW（Media Gateway）は回線交換網とIP網の音声伝送方式間の変換を行う。①HSSは複数設置可能（SLFで選択）。③S-CSCFはMGWでなくアプリケーションサーバへ転送。④P-CSCFはローミング時には移動先網のP-CSCFに接続される。
- id: r6_1_setubi_q02_オ
  number: 2-(3)
  text: |-
    二つのエンドポイント間におけるSIPのセッションの確立などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①セッションを確立する際、INVITEリクエストにより確立されるダイアログは、発呼側が設定するダイアログIDといわれる識別子で特定され、ダイアログの構成要素の情報などはUAに必ず保持される。
  - |-
    ②セッションを確立する際、SDPを使用してメディアの種類、符号化方式などについて端末間でネゴシエーションを行う。
  - |-
    ③INVITEから始まるセッションの確立では、3段階の手順から成るハンドシェイクが行われるが、セッションの確立に失敗した場合は、INVITEリクエストに対してNAKを返送する2段階の手順でメッセージを交換する。
  - |-
    ④セッションが確立すると、セッションはそのまま持続され、どちらか一方のエンドポイントがセッションを変更したり終了したりする時点で、改めてシグナリングメッセージを交換する。
  answer: 3
  explanation: |-
    ③が誤り。SIPでセッション確立に失敗した場合はACKでなく「CANCEL」や「4xx/5xx/6xxのエラー応答」が使われる。「NAK」というメッセージはSIPに存在しない。SIPの3-way handshakeはINVITE→200OK→ACK。
- id: r6_1_setubi_q02_カ
  number: 2-(4)
  text: |-
    電話トラヒックにおける呼量などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①ある回線群で運ばれた呼量は、例えば3分間隔など測定可能な時間間隔で同時接続呼数を複数回測定し、同時接続呼数の総和を測定回数で除することにより求めることができる。
  - |-
    ②中継線の全塞がりなどにより着信者が応答するまでに至らなかった呼は、不完了呼に分類され、誤ダイヤルにより目的と異なる相手に接続された場合に着信者が応答した呼は、完了呼に分類される。
  - |-
    ③1回線による最大疎通呼量は1アーランであり、出線能率ηは0≦η≦1である。出回線数Nを一定にして加わる呼量を増やしていくと、疎通呼量は次第にNに近づいていき、ηは1に近づく。
  - |-
    ④生起呼量aと運ばれた呼量aCの関係は、一般に、即時式の系の場合はaC=a、待時式の系の場合はaC≦aとなる。
  answer: 4
  explanation: |-
    ④が誤り。即時式（即時完了方式）では呼損が発生するのでaC=aではなくaC≦aとなる。待時式（待ち合わせ方式）では全呼を処理するのでaC=a。説明が逆になっている。
- id: r6_1_setubi_q03_ア
  number: 3-(1)-ア
  text: |-
    移動通信に用いられるダイバーシチ技術：移動通信では＿＿によって受信強度の低下が生じ、その低下量は移動端末の位置、周波数及び時間によって変化する。
  options:
  - ①相関が高い
  - ②レベルが等しい
  - ③位相が等しい
  - ④熱雑音
  - ⑤相関が低い
  - ⑥等利得合成法
  - ⑦最大比合成法
  - ⑧波面合成法
  - ⑨マルチパスフェージング
  - ⑩人工雑音
  - ⑪最急降下法
  - ⑫隣接チャネル干渉
  answer: 9
  explanation: |-
    マルチパスフェージング：移動通信において、電波が複数の経路（直接波・反射波・回折波等）を経由して受信されることで生じる受信強度の変動現象。フェージングへの対策がダイバーシチ技術。
- id: r6_1_setubi_q03_イ
  number: 3-(1)-イ
  text: ダイバーシチの効果を得るにはブランチ間において信号の変動の＿＿ことが望ましい。
  options:
  - ①相関が高い
  - ②レベルが等しい
  - ③位相が等しい
  - ④熱雑音
  - ⑤相関が低い
  - ⑥等利得合成法
  - ⑦最大比合成法
  - ⑧波面合成法
  - ⑨マルチパスフェージング
  - ⑩人工雑音
  - ⑪最急降下法
  - ⑫隣接チャネル干渉
  answer: 5
  explanation: |-
    ダイバーシチ効果を最大化するには、各ブランチの信号変動の相関が低い（独立したフェージングを受ける）ことが重要。相関が低いほど、一方が深いフェードに入っても他方が良好である確率が高くなる。
- id: r6_1_setubi_q03_ウ
  number: 3-(1)-ウ
  text: |-
    ブランチの信号を合成する方法には、選択合成法、＿＿などがある。S/Nが最大となる出力を得る方法。
  options:
  - ①相関が高い
  - ②レベルが等しい
  - ③位相が等しい
  - ④熱雑音
  - ⑤相関が低い
  - ⑥等利得合成法
  - ⑦最大比合成法
  - ⑧波面合成法
  - ⑨マルチパスフェージング
  - ⑩人工雑音
  - ⑪最急降下法
  - ⑫隣接チャネル干渉
  answer: 7
  explanation: |-
    最大比合成法（MRC: Maximum Ratio Combining）：各ブランチの信号をSN比に比例した重みで加重合成する方法。信号の振幅と位相の両方を調整してSNRが最大となる出力を得る。理論上最も優れた合成法。
- id: r6_1_setubi_q03_エ
  number: 3-(2)
  text: |-
    移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生するたびに移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、一般に、デマンドアサイン方式といわれる。
  - |-
    ②アクセス制御方式には、CSMA、ICMAなどがあり、CSMAでは、基地局がアクセス用チャネルの使用状況を観測して、アクセスの可否を判断する。
  - |-
    ③セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する場合にセルを切替制御する技術は、一般に、ローミングといわれる。
  - |-
    ④セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。
  answer: 1
  explanation: |-
    ①が正しい。デマンドアサイン（要求割当）方式は呼発生時に必要なチャネルを動的に割り当てる方式。②CSMAでは端末が自らチャネルの空き状況を監視。③セル間切り替えはハンドオーバ。④一つの位置登録エリアが複数セルで構成される（逆）。
- id: r6_1_setubi_q03_オ
  number: 3-(3)
  text: |-
    静止衛星通信システムにおける地球局を構成する機器またはその特性について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①送信系装置である大電力増幅器において、増幅特性の非線形性とは逆の特性を持つリニアライザを接続して用いることにより相互変調雑音を抑えることができる。
  - |-
    ②出力が数十W以下の送信機においては、一般に、進行波管またはクライストロンを使用した増幅器が用いられる。
  - |-
    ③受信系全体の雑音特性を良くするためには、受信系装置の初段にある低雑音増幅器として、できるかぎり低雑音で、それ以降に接続されている装置の雑音温度の影響を低減するのに十分な利得を持つものを用いることが有効である。
  - |-
    ④受信系装置の性能を定量的に示す指標として、アンテナの受信利得と受信システム雑音温度の比であるG/Tが用いられる。
  answer: 2
  explanation: |-
    ②が誤り。数十W以下の小出力送信機には固体素子（トランジスタ等）を使用した増幅器が用いられる。進行波管（TWT）やクライストロンは数百W以上の大電力増幅器に使用される真空管デバイス。
- id: r6_1_setubi_q03_カ
  number: 3-(4)
  text: 開口面アンテナの特性について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①固定された2地点間の通信に用いられる開口面アンテナに求められる特性には、一般に、ルート間干渉を少なくするための鋭い指向性、高い利得、高い交差偏波識別度、広い無線周波数帯域にわたる良好なインピーダンス特性などがある。
  - |-
    ②アンテナの開口効率は、一般に、アンテナの幾何学的面積に対する実効面積の比率であり、利得係数に等しい。
  - ③アンテナの利得は、アンテナの開口面積、開口効率の2乗及び無線周波数に比例する。
  - |-
    ④交差偏波識別度は、アンテナの特性として、直線偏波における垂直偏波と水平偏波、または円偏波における右旋円偏波と左旋円偏波を識別できる能力を表す。
  answer: 3
  explanation: |-
    ③が誤り。アンテナ利得G=4πAe/λ²=4πAη/λ²（Ae=ηA：実効面積、A：開口面積、η：開口効率、λ：波長）。利得は開口面積と開口効率（の1乗）に比例し、波長の2乗に反比例する（周波数の2乗に比例）。開口効率の「2乗」ではない。
- id: r6_1_setubi_q04_ア
  number: 4-(1)-ア
  text: |-
    UPSの高効率化：UPS内部のインバータ回路においては、IGBTを用いた＿＿制御方式が主流となっている。
  options:
  - ①導通損失
  - ②RCフィルタ
  - ③PWM
  - ④ヒステリシス損
  - ⑤変圧器
  - ⑥LCフィルタ
  - ⑦シース損
  - ⑧ゲートブロック
  - ⑨変流器
  - ⑩PID
  - ⑪誘電体損
  - ⑫フィードバック
  answer: 3
  explanation: |-
    PWM（Pulse Width Modulation：パルス幅変調）制御方式：IGBTのスイッチング素子をパルス幅変調で制御するインバータ回路方式。現代のUPSで主流の制御方式。
- id: r6_1_setubi_q04_イ
  number: 4-(1)-イ
  text: |-
    マルチレベルインバータを採用することにより、出力電圧を2段階で制御する2レベルインバータと比較して、スイッチング損失を低減でき、高効率化が可能となる。さらに、出力波形が正弦波に近いことから＿＿を小さくすることができ、小型化も可能となる。
  options:
  - ①導通損失
  - ②RCフィルタ
  - ③PWM
  - ④ヒステリシス損
  - ⑤変圧器
  - ⑥LCフィルタ
  - ⑦シース損
  - ⑧ゲートブロック
  - ⑨変流器
  - ⑩PID
  - ⑪誘電体損
  - ⑫フィードバック
  answer: 6
  explanation: |-
    LCフィルタ：インバータ出力の高調波を除去するためのフィルタ。マルチレベルインバータでは出力波形が正弦波に近いため、LCフィルタを小型化でき、装置全体の小型化に貢献する。
- id: r6_1_setubi_q04_ウ
  number: 4-(1)-ウ
  text: |-
    SiC（シリコンカーバイド）を用いたパワーモジュールを用いることにより、従来からのSiを用いたパワーモジュールと比較して、半導体デバイスの＿＿が小さく、スイッチング損失が低減できることからより高効率化が可能となる。
  options:
  - ①導通損失
  - ②RCフィルタ
  - ③PWM
  - ④ヒステリシス損
  - ⑤変圧器
  - ⑥LCフィルタ
  - ⑦シース損
  - ⑧ゲートブロック
  - ⑨変流器
  - ⑩PID
  - ⑪誘電体損
  - ⑫フィードバック
  answer: 1
  explanation: |-
    SiCパワーモジュールはSiと比較して導通損失（オン抵抗による損失）が小さく、かつスイッチング損失も低い。これによりより高い効率での電力変換が可能。
- id: r6_1_setubi_q04_エ
  number: 4-(2)
  text: |-
    受電システムに用いられる変圧器の種類と特徴について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①外鉄形変圧器は巻線の内部に単一の磁気回路を有し、内鉄形変圧器は巻線の周囲に複数の磁気回路を有している。外鉄形変圧器は内鉄形変圧器と比較して、一般に、銅損が小さいことから低圧用の変圧器に適している。
  - |-
    ②油入変圧器は、巻線の絶縁と冷却に絶縁油を使用していることから、乾式変圧器と異なり、一般に、変圧器を長期間使用した場合でも、絶縁性能がほとんど低下しない。
  - |-
    ③乾式変圧器の一種であるモールド変圧器は、巻線の絶縁材料としてエポキシ樹脂などが用いられているため、難燃性に優れている。
  - |-
    ④三相変圧器は、1台の変圧器で三相変圧を行う変圧器である。三相変圧器は、単相変圧器3台を1組として使用した場合と比較して、単位容量当たりの床面積は大きいが、一般に、高圧側の接続工事が容易である。
  answer: 3
  explanation: |-
    ③が正しい。モールド変圧器はエポキシ樹脂で巻線をモールドするため難燃性・耐湿性に優れ、屋内設置に適する。①外鉄形と内鉄形の説明が逆。②油入変圧器も長期使用で絶縁油の劣化による絶縁性能低下がある。④三相変圧器は単位容量当たりの床面積が小さい。
- id: r6_1_setubi_q04_オ
  number: 4-(3)
  text: |-
    高圧受電設備に設置される継電器及び計器用変流器の特徴などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①過電流継電器は、一般に、電源から負荷に至るまでの間に複数台設置されており、過電流継電器の動作時間を負荷側に近いものほど長く設定することにより、事故回路だけを選択して遮断できる。
  - |-
    ②地絡方向継電器は、零相電流と零相電圧の大きさおよびその間の位相を判別して動作している。
  - |-
    ③高圧受電盤に使用する電流を検出するための計器用変流器においては、一次側の電流が流れているときに二次側の回路を開くと過大な電圧が生じ、二次側回路の絶縁破壊が起きるおそれがある。このため、計器用変流器の二次側回路は開放しない。
  - |-
    ④過電流継電器を整定する際には、変圧器、コンデンサなどからの突入電流により誤動作しないように考慮する必要がある。
  answer: 1
  explanation: |-
    ①が誤り。過電流継電器の動作時間は負荷側に近いものほど「短く」（短限時・瞬時）設定し、電源側ほど長く設定する。これにより事故が発生した最も近い遮断器が先に動作し、健全な回路への影響を最小化する（保護協調）。
- id: r6_1_setubi_q04_カ
  number: 4-(4)
  text: |-
    太陽光発電システムの特性、機能などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①蓄電池とセットで設置される太陽光発電システムは、日照が強いときに蓄電池を過充電するのを防止するための過充電防止機能や、日照が弱いときに蓄電池から太陽電池素子に電流が逆流するのを防止するための電流逆流防止機能を有している。
  - |-
    ②通信用電源などに用いられる直流供給システムと連系する太陽光発電システムでは、一般に、昼間に商用電源が停電した場合、太陽光エネルギーを利用してデマンド制御装置を運転することによって通信用電源をバックアップし、通信システム用蓄電池の放電量を抑制することができる。
  - |-
    ③太陽電池アレイは、複数の太陽電池モジュールを直並列に組み合わせて太陽光発電システムとして必要な電圧及び電力を得られるように構成される。
  - |-
    ④太陽電池素子は、周囲環境温度が－20℃～40℃の範囲内では、一般に、温度が上昇すると出力が低下する特性を有している。
  answer: 2
  explanation: |-
    ②が誤り。「デマンド制御装置を運転」ではなく、太陽光発電で直接通信用電源システムに電力を供給してバックアップするのが正しい動作。デマンド制御装置は電力需要を管理するための装置で、停電時のバックアップとは別の機能。
- id: r6_1_setubi_q05_ア
  number: 5-(1)-ア
  text: |-
    サーバのストレージ：ストレージには、記憶媒体として磁気ディスクを用いたHDD、＿＿を用いたSSDなどがある。
  options:
  - ①ファイル単位
  - ②PAN
  - ③SRAM
  - ④ボリューム単位
  - ⑤DRAM
  - ⑥NAS
  - ⑦SAS
  - ⑧フィールド単位
  - ⑨ブロック単位
  - ⑩DAS
  - ⑪EPROM
  - ⑫フラッシュメモリ
  answer: 12
  explanation: |-
    SSD（Solid State Drive）は不揮発性のフラッシュメモリ（NANDフラッシュ）を記憶媒体として使用する。HDDの磁気ディスクと異なり、可動部品がなく高速・低消費電力。
- id: r6_1_setubi_q05_イ
  number: 5-(1)-イ
  text: |-
    LANにファイルサーバ専用機を直接接続して他のサーバからLAN経由でアクセスさせる＿＿がある。
  options:
  - ①ファイル単位
  - ②PAN
  - ③SRAM
  - ④ボリューム単位
  - ⑤DRAM
  - ⑥NAS
  - ⑦SAS
  - ⑧フィールド単位
  - ⑨ブロック単位
  - ⑩DAS
  - ⑪EPROM
  - ⑫フラッシュメモリ
  answer: 6
  explanation: |-
    NAS（Network Attached Storage）：LANに直接接続するファイルサーバ専用機。NFS、CIFSなどのファイル共有プロトコルを使用し、OSの種類を問わずファイル共有が可能。
- id: r6_1_setubi_q05_ウ
  number: 5-(1)-ウ
  text: |-
    SANでは、ネットワークを構成する機器間をファイバチャネルやイーサネットで接続し、SCSIプロトコルを用いて＿＿でデータの読み込みや書き込みを行う。
  options:
  - ①ファイル単位
  - ②PAN
  - ③SRAM
  - ④ボリューム単位
  - ⑤DRAM
  - ⑥NAS
  - ⑦SAS
  - ⑧フィールド単位
  - ⑨ブロック単位
  - ⑩DAS
  - ⑪EPROM
  - ⑫フラッシュメモリ
  answer: 9
  explanation: |-
    SAN（Storage Area Network）ではSCSIプロトコルを用いてブロック単位でデータにアクセスする。これに対してNASはファイル単位でアクセスする。
- id: r6_1_setubi_q05_エ
  number: 5-(2)
  text: UNIXの概要について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①UNIXは複数のプログラムを並行して動作させるマルチタスク及び複数の利用者が一つのシステムを同時に利用するマルチユーザに対応しており、コマンドによる対話方式のユーザインタフェースを有する。
  - |-
    ②UNIXは階層化ディレクトリ構造を採用しており、ディレクトリの中にディレクトリを格納できる。また、ルートディレクトリは一つである。
  - |-
    ③あるプログラムの標準出力を別のプログラムの標準入力として受け渡す仕組みは、スワップといわれる。
  - |-
    ④ファイルアクセスに関する許可条件は、ファイルに付属しているアクセス権によって設定される。ファイル所有者、ファイル所有者の属するグループ及びその他の利用者の3種類のユーザクラスに対し、読み出し、書き込み及び実行の許可をそれぞれ個別に設定することができる。
  answer: 3
  explanation: |-
    ③が誤り。あるプログラムの標準出力を別のプログラムの標準入力へ渡す仕組みは「パイプ（Pipe）」という。スワップはメモリとディスク間でプロセスを入れ替える仕組み。
- id: r6_1_setubi_q05_オ
  number: 5-(3)
  text: |-
    CPUに搭載されるキャッシュメモリの仕組みなどについて述べた文章A～CはＸである。
    A：CPUのキャッシュメモリへのアクセスは、メインメモリへのアクセスと比較して高速であるため、CPUは頻繁に使用する命令やデータをキャッシュメモリに格納することにより処理を高速に実行することが可能となる。
    B：キャッシュメモリは、一般に、複数の階層を持っており、1次キャッシュは、2次キャッシュと比較して、低速で大容量である。
    C：CPUがキャッシュメモリにデータを書き込む際には、同じ内容をメインメモリにも書き込んで整合を保つ必要があり、書込み方式にはライトスルー方式とライトバック方式がある。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。B：1次キャッシュは2次キャッシュと比較して「高速で小容量」が正しい。CPUコアに近いほど高速・小容量（L1<L2<L3の順に大容量・低速）。
- id: r6_1_setubi_q05_カ
  number: 5-(4)
  text: サーバの仮想化方式について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①仮想化ソフトウェアを物理サーバのOS上で動作させて、その仮想化ソフトウェア上でゲストOSを複数動作させ、アプリケーションソフトウェアを各ゲストOS上で動作させるものは、一般に、ハイパーバイザ型仮想化といわれる。
  - |-
    ②仮想化ソフトウェアを物理サーバ上で直接動作させて、その仮想化ソフトウェア上でゲストOSを複数動作させ、アプリケーションソフトウェアを各ゲストOS上で動作させるものは、一般に、ホストOS型仮想化といわれる。
  - |-
    ③仮想化ソフトウェアを物理サーバのOS上で動作させて、その仮想化ソフトウェア上でアプリケーションソフトウェアとその実行環境を一つにまとめて隔離する領域を複数作成して、動作させるものは、一般に、コンテナ型仮想化といわれる。
  - |-
    ④ハイパーバイザ型仮想化において、仮想化ソフトウェア自身が物理デバイスにアクセスするためのデバイスドライバを持つものは、一般に、マイクロカーネル型といわれ、ゲストOSが新しいハードウェアを利用できるようにするには、このデバイスドライバを更新する必要がある。
  answer: 3
  explanation: |-
    ③が正しい。コンテナ型仮想化はホストOSのカーネルを共有しつつ、アプリとその実行環境を隔離したコンテナで動作させる方式（Docker等）。①はホストOS型の説明。②はベアメタル（ハイパーバイザ型）の説明。
