- id: r6_2_setubi_q05_エ
  number: 5-(2)
  text: ページング方式による仮想記憶について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①ページング方式では、プログラムがアクセス可能な物理アドレス空間を可変長のページに分割し、必要なページを主記憶に読み込んで実行する。
  - |-
    ②アクセスしようとしたページが主記憶上に存在しなかった場合に発生する割り込み処理は、一般に、メモリリークといわれ、この処理が発生すると主記憶と補助記憶の間でページの置き換えが行われる。
  - |-
    ③ページ置き換えのアルゴリズムの一つであるLRU方式では、最後に参照してから経過している時間が最も短いページを主記憶から補助記憶にページアウトする。
  - |-
    ④主記憶と補助記憶の間でページの置き換えが頻繁に発生して、これにCPUの処理能力のほとんどが割かれてしまい、他の処理を実行できなくなる現象は、一般に、スラッシングといわれる。
  answer: 4
  explanation: |-
    ④が正しい。スラッシングはページング処理にCPUが占有されてしまう現象。①ページは固定長。②ページフォルトの説明でメモリリークは別の概念。③LRUは最も長く参照されていない（経過時間が長い）ページをページアウトする。
- id: r6_2_setubi_q05_オ
  number: 5-(3)
  text: |-
    多次元データウェアハウスについて述べた文章A～Cは＿＿。
    A：事実テーブルを中心に周辺に次元テーブルを配置したモデルはスタースキーマといわれる。
    B：集計の項目に縦軸と横軸を指定して必要な2次元の面で切り出す操作はダイシングといわれる。
    C：参照する集計データの分析レベルを詳細化する操作はロールアップといわれる。例えば、月単位の集計の分析を週単位にする場合などが挙げられる。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 1
  explanation: |-
    Aのみ正しい。B：縦軸・横軸を指定して2次元で切り出すのはスライシング（スライス）で、ダイシングは複数の次元で切り出す操作。C：詳細化はドリルダウン、ロールアップは逆に集約レベルを上げる操作。
- id: r6_2_setubi_q05_カ
  number: 5-(4)
  text: ネットワークの仮想化技術などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①1台のルータ内に独立した複数のルーティングテーブルを保持することにより、1台のルータを複数の仮想的なルータとして使用できるようにする技術は、VRF（Virtual Routing and Forwarding）といわれる。
  - |-
    ②ネットワーク上の全てのスイッチが仮想ネットワークの経路情報を管理するテーブルを保持しこの管理テーブルの設定に従ってデータを転送することによってSDNを構築する方法は、オーバレイ方式といわれる。
  - |-
    ③ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現されているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネットワーク機能を実現する技術は、OpenFlowといわれる。
  - |-
    ④VXLANは、ホップバイホップ方式のSDNに用いられる技術の一つである。VXLANを用いた仮想ネットワークを構築するためには、ネットワーク上の全てのスイッチがVXLAN対応のものでなければならない。
  answer: 1
  explanation: |-
    ①が正しい。VRFは1台の物理ルータに複数の独立したルーティングテーブルを持たせる技術。②オーバレイ方式ではなくホップバイホップ方式の説明。③NFV（Network Functions Virtualization）の説明でOpenFlowではない。④VXLANはオーバレイ方式に使われる。
- id: r6_2_setubi_q06_ア
  number: 6-(1)-ア
  text: |-
    VRRPは、LANなどのネットワークにおいて、外部ネットワークとの接続点となる＿＿を冗長化するための標準プロトコル。
