id: r6_2_setubi
year: 令和6年度
session: 第2回
subject: 伝送交換設備及び設備管理
subject_short: setubi
questions:
- id: r6_2_setubi_q01_ア
  number: 1-(1)-ア
  text: |-
    CATV網における伝送路の構成として、センタのヘッドエンド装置から光ノードまでの区間に光ファイバケーブルを用い、光ノードから個々のユーザ宅までの区間に同軸ケーブルを用いる＿＿方式がある。
  options:
  - ①ADS
  - ②折返し雑音
  - ③DOCSIS
  - ④PDS
  - ⑤HFC
  - ⑥H.264/AVC
  - ⑦流合雑音
  - ⑧ショット雑音
  - ⑨RFC3261
  - ⑩VDSL
  - ⑪ASE雑音
  - ⑫IEEE802.11
  answer: 5
  explanation: |-
    HFC（Hybrid Fiber Coaxial）方式は光ファイバと同軸ケーブルを組み合わせたCATVの伝送方式。
- id: r6_2_setubi_q01_イ
  number: 1-(1)-イ
  text: |-
    HFC方式では、各ユーザ宅からセンタへの上り方向の雑音などが累積した＿＿が減少することで通信品質の向上が期待できる。
  options:
  - ①ADS
  - ②折返し雑音
  - ③DOCSIS
  - ④PDS
  - ⑤HFC
  - ⑥H.264/AVC
  - ⑦流合雑音
  - ⑧ショット雑音
  - ⑨RFC3261
  - ⑩VDSL
  - ⑪ASE雑音
  - ⑫IEEE802.11
  answer: 7
  explanation: |-
    流合雑音（funnel noise）は上り方向で各ユーザからの雑音が集まる現象。HFCでセルを分割することで流合雑音が減少する。
- id: r6_2_setubi_q01_ウ
  number: 1-(1)-ウ
  text: |-
    CATVを利用したデータ通信のための技術仕様として＿＿が標準化されており、ケーブルモデム（CM）とケーブルモデム終端装置（CMTS）を用いて双方向データ通信サービスが提供されている。
  options:
  - ①ADS
  - ②折返し雑音
  - ③DOCSIS
  - ④PDS
  - ⑤HFC
  - ⑥H.264/AVC
  - ⑦流合雑音
  - ⑧ショット雑音
  - ⑨RFC3261
  - ⑩VDSL
  - ⑪ASE雑音
  - ⑫IEEE802.11
  answer: 3
  explanation: |-
    DOCSIS（Data Over Cable Service Interface Specifications）はCATVによるデータ通信の標準規格。
- id: r6_2_setubi_q01_エ
  number: 1-(2)
  text: |-
    デジタル伝送における同期技術などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①スタッフ同期多重は、どの入力信号よりも僅かに速い共通クロックで読み出し、差に応じた余剰ビットを付加して同期化させて多重する方法。
  - |-
    ②周波数同期多重は、網同期により複数の入力信号の周波数が同期化している状態で多重する方法。
  - |-
    ③網同期方式の一つに、中心となるノード局からクロックを分配し他のノード局のクロックを同期させる独立同期方式がある。
  - |-
    ④周波数同期させた入力信号の1フレーム分を記憶し、フレーム位相を合わせて多重する方法は位相同期多重といわれる。
  answer: 3
  explanation: |-
    ③が誤り。中心ノードからクロックを分配する方式は「主従同期方式（マスタスレーブ方式）」であり「独立同期方式」は各ノードが独自のクロックを持つ方式。
- id: r6_2_setubi_q01_オ
  number: 1-(3)
  text: 誤り制御技術などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①ARQとFECを比較すると、一般に、通信回線の伝送エラーが多いほどARQの方が伝送効率が良い。
  - |-
    ②誤り訂正符号の生成において、送信すべき情報を一定のビット数に区切り、チェックビットを付加する方法で符号化するものはブロック符号といわれる。
  - |-
    ③畳込み符号は、過去の情報が現在の符号ビット列に影響し、影響が連続するという特徴を有している。
  - ④受信した符号ビット列の復号には、硬判定復号および軟判定復号がある。
  answer: 1
  explanation: |-
    ①が誤り。伝送エラーが多いほど再送が増えるARQは効率が悪くなる。エラーが多い環境ではFECの方が伝送効率は良い。
- id: r6_2_setubi_q01_カ
  number: 1-(4)
  text: |-
    光増幅器に用いられる半導体光増幅器および光ファイバ増幅器について述べた文章A～Cは＿＿。
    A：半導体光増幅器は光ファイバ増幅器と比較して結合損失が小さい、偏波依存性が低い、デバイスサイズが小さいなどの特徴があることから、専ら長距離通信用の光増幅器として用いられている。
    B：光ファイバ増幅器には希土類添加ファイバ増幅器、ファイバラマン増幅器などがある。
    C：EDFAは一般に、エルビウム添加光ファイバ、励起光源、MEMS光スイッチ、光アイソレータなどから構成される。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 2
  explanation: |-
    Bのみ正しい。A：半導体光増幅器は伝送用ファイバとの結合損失が大きく偏波依存性が高いため長距離通信には向かない。C：EDFAはMEMS光スイッチではなく光カプラや光分岐器等を用いて構成される。
- id: r6_2_setubi_q02_ア
  number: 2-(1)-ア
  text: |-
    VoIPシステムを実現するために用いられるSIPは、＿＿プロトコルの一つであり、端末相互のメッセージの交換や通話の接続・切断などの手順を定めている。
  options:
  - ①ロケーション
  - ②DHCP
  - ③シグナリング
  - ④ACK
  - ⑤ルーティング
  - ⑥200OK
  - ⑦インターネット
  - ⑧回線制御
  - ⑨INVITE
  - ⑩ネーム
  - ⑪リダイレクト
  - ⑫アタッチ
  answer: 3
  explanation: |-
    SIP（Session Initiation Protocol）はシグナリングプロトコルの一つ。通話接続・切断等のセッション制御を行う。
- id: r6_2_setubi_q02_イ
  number: 2-(1)-イ
  text: |-
    SIPサーバの構成要素として、＿＿サーバ、プロキシサーバなどがある。このサーバはUACからリクエストされたアドレスを別のアドレスに書き換えて通知する機能を持つ。
  options:
  - ①ロケーション
  - ②DHCP
  - ③シグナリング
  - ④ACK
  - ⑤ルーティング
  - ⑥200OK
  - ⑦インターネット
  - ⑧回線制御
  - ⑨INVITE
  - ⑩ネーム
  - ⑪リダイレクト
  - ⑫アタッチ
  answer: 11
  explanation: |-
    リダイレクトサーバは接続先アドレスを別のアドレスに書き換えてUACに通知し、転送サービスを可能にする。
- id: r6_2_setubi_q02_ウ
  number: 2-(1)-ウ
  text: |-
    SIPでは、セッションの確立はクライアントのサーバに対する＿＿による要求から開始される。
  options:
  - ①ロケーション
  - ②DHCP
  - ③シグナリング
  - ④ACK
  - ⑤ルーティング
  - ⑥200OK
  - ⑦インターネット
  - ⑧回線制御
  - ⑨INVITE
  - ⑩ネーム
  - ⑪リダイレクト
  - ⑫アタッチ
  answer: 9
  explanation: |-
    SIPセッションの確立はINVITEメソッドによる要求から開始される。その後200 OK、ACKでセッションが確立する。
- id: r6_2_setubi_q02_エ
  number: 2-(2)
  text: |-
    IMSの構成要素であるCSCFの種類と機能について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①CSCFはSIPサーバに相当する機能を持ち、S-CSCF、P-CSCF、I-CSCFがある。
  - |-
    ②S-CSCFは、受信したSIPメッセージを分析し、適切なアプリケーションサーバへSIPメッセージを転送する機能を持つ。
  - |-
    ③P-CSCFは、ユーザ端末がIMSに登録されるときに固定的に割り当てられる。ユーザ端末とP-CSCFの間にはS/MIMEによるセキュアな通信が提供される。
  - |-
    ④I-CSCFは、ユーザの登録時において、必要に応じてSLF（Subscription Locator Function）にアクセスして接続ユーザのHSSを特定する。
  answer: 3
  explanation: |-
    ③が誤り。P-CSCFは固定的に割り当てられるのではなく、登録ごとに割り当てが変わる可能性がある。また認証はIPsecによるもので、S/MIMEではない。
- id: r6_2_setubi_q02_オ
  number: 2-(3)
  text: |-
    IP電話における音声パケット制御、トラヒックなどについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - ①ルータでは優先制御の機能が利用される。
  - ②パケットの送信間隔を長くすれば伝送効率は高くなるが、遅延は増加する。
  - |-
    ③帯域使用率の予測に使用される最繁時間帯におけるパケット到着間隔及びパケット長は、一般に、アクセスログから算出できる。
  - |-
    ④IP電話は一定の待ち時間（遅延）が許容されており、待ち時間はバッファのサイズを決定するための基本的なパラメータの一つ。
  answer: 3
  explanation: |-
    ③が誤り。パケット到着間隔やパケット長はパケットキャプチャデータから算出できるが、アクセスログからは算出できない。
- id: r6_2_setubi_q02_カ
  number: 2-(4)
  text: |-
    トラヒックの輻輳などについて述べた文章A～Cは＿＿。
    A：各種イベントやチケット販売の予約などにより特定の回線に予約受付呼等が集中するために起こるトラヒックの輻輳は、一般に、企画型輻輳といわれる。
    B：地震、台風などにより、被災地への見舞い呼や安否確認の問い合わせ呼が集中してネットワーク全体に影響を及ぼすトラヒックの輻輳は、一般に、災害型輻輳といわれる。
    C：災害時などネットワークが輻輳するおそれがある場合には、一般に、優先度が高い重要通信の発信呼を優先させる方法及び中継されてきた重要通信の端末への着信呼を優先させる方法が採られる。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 4
  explanation: |-
    A、Bが正しい。C：重要通信の優先化方法として、発信呼の優先は正しいが「着信呼を優先させる」という方法ではなく、発信規制をかけながら重要通信を優先させるのが一般的。
- id: r6_2_setubi_q03_ア
  number: 3-(1)-ア
  text: |-
    5Gは高速・大容量、低遅延及び多数端末接続を基本コンセプトとしている。3.7GHz帯及び4.5GHz帯は＿＿といわれる周波数帯である。
  options:
  - ①Sigfox
  - ②Sub6
  - ③ナローバンド
  - ④IaaS
  - ⑤プラチナバンド
  - ⑥LoRaWAN
  - ⑦MIMO
  - ⑧PaaS
  - ⑨LTE-M
  - ⑩ワイドバンド
  - ⑪グリッドコンピューティング
  - ⑫マルチアクセス・エッジ・コンピューティング
  answer: 2
  explanation: |-
    Sub6（サブ6GHz）は6GHz以下の5G用周波数帯の総称で、3.7GHz帯・4.5GHz帯が含まれる。
- id: r6_2_setubi_q03_イ
  number: 3-(1)-イ
  text: |-
    5Gで低遅延を実現するために、より端末に近いところにデータ処理を行うサーバを配置する＿＿といわれる技術を用いることによりエンド・ツー・エンドでの遅延の低減を図っている。
  options:
  - ①Sigfox
  - ②Sub6
  - ③ナローバンド
  - ④IaaS
  - ⑤プラチナバンド
  - ⑥LoRaWAN
  - ⑦MIMO
  - ⑧PaaS
  - ⑨LTE-M
  - ⑩ワイドバンド
  - ⑪グリッドコンピューティング
  - ⑫マルチアクセス・エッジ・コンピューティング
  answer: 12
  explanation: |-
    MEC（Multi-access Edge Computing：マルチアクセス・エッジ・コンピューティング）は端末近くのエッジにサーバを配置して遅延を低減する技術。
- id: r6_2_setubi_q03_ウ
  number: 3-(1)-ウ
  text: |-
    5GにおけるIoT端末の多数接続については、4Gでも用いられている＿＿などの技術を活用することにより可能となっている。ただし、運用周波数が3.8GHzまでに制限されており、今後はRedCapを用いることにより適用領域の拡大が期待されている。
  options:
  - ①Sigfox
  - ②Sub6
  - ③ナローバンド
  - ④IaaS
  - ⑤プラチナバンド
  - ⑥LoRaWAN
  - ⑦MIMO
  - ⑧PaaS
  - ⑨LTE-M
  - ⑩ワイドバンド
  - ⑪グリッドコンピューティング
  - ⑫マルチアクセス・エッジ・コンピューティング
  answer: 9
  explanation: |-
    LTE-M（LTE for Machine）はIoT端末向けのLTE規格で、4Gでも採用されており5Gでも活用される。
- id: r6_2_setubi_q03_エ
  number: 3-(2)
  text: |-
    5Gミリ波（5G millimeter wave）の特性などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①5GミリWavは4Gで用いられている周波数帯の電波と比較して、雨や霧による影響を受けにくい。
  - |-
    ②5GミリWavは4Gで用いられている周波数帯の電波と比較して、伝搬損失が大きいが障害物の影響を受けにくい。
  - |-
    ③5G基地局の5GミリWave用アレーアンテナでは、アンテナ利得の向上を図るため大規模MIMO（Massive MIMO）によるビームフォーミング技術が用いられている。
  - |-
    ④NRの規格において5GミリWaveのチャネル帯域幅は最大4GHzと定められており、4Gの約100倍の周波数帯域を利用できる。
  answer: 3
  explanation: |-
    ③が正しい。ミリ波ではMassive MIMOとビームフォーミングを組み合わせてアンテナ利得を高める。①ミリ波は雨や霧の影響を受けやすい。②障害物の影響を強く受ける。④最大400MHzであり4Gの約10倍程度。
- id: r6_2_setubi_q03_オ
  number: 3-(3)
  text: |-
    デジタル無線伝送に用いられるマルチプルアクセス方式の種類、特徴などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①CDMAでは、拡散符号で1次変調を施した広帯域の信号を、更にPSK方式などを用いて2次変調して狭帯域の信号としている。
  - |-
    ②OFDMAでは、周波数の異なる複数のサブキャリアをまとめ、各サブキャリアのセットを個々の端末に割り当てている。
  - |-
    ③TDMAでは、使用可能な周波数帯域を分割し、分割した各周波数帯を個々の端末に割り当てている。
  - |-
    ④FDMAでは、一つの周波数を時間で分割し、分割した各時間（タイムスロット）を個々の端末に割り当てている。
  answer: 2
  explanation: |-
    ②が正しい。OFDMAは複数の直交サブキャリアをグループ化して個々の端末に割り当てる方式。①CDMAの2次変調は拡散後の広帯域信号をそのまま送信する。③は周波数分割なのでFDMAの説明。④は時間分割なのでTDMAの説明。
- id: r6_2_setubi_q03_カ
  number: 3-(4)
  text: |-
    衛星通信回線の品質に影響を与える要因などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①衛星通信において自由空間伝搬損失は、一般に、波長の2乗に反比例し、伝搬距離の2乗に比例する。
  - |-
    ②衛星通信では、大気ガスのうち酸素及び水蒸気による減衰を避けた周波数帯の電波を使うため、大気ガスによる減衰の影響は降雨による減衰の影響と比較して小さい。
  - |-
    ③衛星通信の地球局におけるアンテナ雑音は、アンテナの大地方向のサイドローブからの雑音の影響を受けるため、アンテナ雑音を小さくするにはサイドローブレベルを低くすることが有効である。
  - |-
    ④増幅器の雑音指数は、回路入力端の信号電力対雑音電力比を回路出力端の信号電力対雑音電力比で除したものであり、回路出力端の出力信号電力を一定とすると、回路出力端の雑音電力が小さいほど雑音指数の値は大きくなる。
  answer: 4
  explanation: |-
    ④が誤り。雑音指数はNF = (入力SNR)/(出力SNR)。出力雑音電力が小さいほど出力SNRが大きくなり、NFは小さく（良く）なる。
- id: r6_2_setubi_q04_ア
  number: 4-(1)-ア
  text: 600Vを超え＿＿V以下の交流電圧は高圧といわれる。
  options:
  - ①6,000
  - ②6,600
  - ③7,000
  - ④10,000
  - ⑤地絡
  - ⑥対地電圧
  - ⑦電流増加
  - ⑧逆相電圧
  - ⑨相電圧
  - ⑩電圧上昇
  - ⑪正相電圧
  - ⑫フラッシオーバ
  answer: 3
  explanation: 電気設備技術基準で高圧は600Vを超え7,000V以下と定義されている。
- id: r6_2_setubi_q04_イ
  number: 4-(1)-イ
  text: |-
    高圧受電設備において高圧から低圧に変成する場合に、変圧器の高圧側と低圧側の混触による低圧側の＿＿を防止するために、一般に、低圧側の電圧線1線または中性点が接地される。
  options:
  - ①6,000
  - ②6,600
  - ③7,000
  - ④10,000
  - ⑤地絡
  - ⑥対地電圧
  - ⑦電流増加
  - ⑧逆相電圧
  - ⑨相電圧
  - ⑩電圧上昇
  - ⑪正相電圧
  - ⑫フラッシオーバ
  answer: 10
  explanation: 混触によって低圧側の電圧が異常に上昇する電圧上昇を防止するために接地が行われる。
- id: r6_2_setubi_q04_ウ
  number: 4-(1)-ウ
  text: |-
