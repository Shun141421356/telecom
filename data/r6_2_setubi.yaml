  - ⑩データハザード
  - ⑪エラー
  - ⑫中間者攻撃
  - ⑬SQLインジェクション
  - ⑭ディレクトリトラバーサル
  - ⑮ディレクトリハーベスト
  - ⑯ディレクトリリスティング
  answer: 13
  explanation: |-
    SQLインジェクションは不正なSQL文を入力することでデータベースを不正に操作する攻撃手法。
- id: r6_2_setubi_q09_ウ
  number: 9-(1)-ウ
  text: |-
    クロスサイトスクリプティングは、Webアプリケーションの脆弱性を悪用してWebページに不正なスクリプトを埋め込み、そのスクリプトを＿＿上で実行させる攻撃である。
  options:
  - ①APサーバ
  - ②Webサーバ
  - ③カプセル化
  - ④エスケープ
  - ⑤DBサーバ
  - ⑥Webブラウザ
  - ⑦DBD攻撃
  - ⑧DDoS攻撃
  - ⑨ポリシング
  - ⑩データハザード
  - ⑪エラー
  - ⑫中間者攻撃
  - ⑬SQLインジェクション
  - ⑭ディレクトリトラバーサル
  - ⑮ディレクトリハーベスト
  - ⑯ディレクトリリスティング
  answer: 6
  explanation: |-
    クロスサイトスクリプティング（XSS）は被害者のWebブラウザ上でスクリプトを実行させる攻撃。
- id: r6_2_setubi_q09_エ
  number: 9-(1)-エ
  text: |-
    クロスサイトスクリプティングへの対策として、HTML出力値の中のスクリプトの構成に必要な特殊記号を別の文字列に置換する＿＿処理を用いる方法がある。
  options:
  - ①APサーバ
  - ②Webサーバ
  - ③カプセル化
  - ④エスケープ
  - ⑤DBサーバ
  - ⑥Webブラウザ
