- id: r6_2_setubi_q06_エ
  number: 6-(2)
  text: VLANの技術について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①IEEE802.1QのVLANタグを用いると、物理的に単一のLANを論理的に区別された最大4,094個のVLANに分けることができる。
  - |-
    ②広域イーサネットサービスを提供する方法として、IEEE802.1adで規定されている拡張VLANがある。拡張VLANでは通信事業者のスイッチにおいて、VLANタグとは別の通信事業者がユーザを識別するタグをイーサネットフレームに付加して転送しており、個々のユーザのMACアドレスの管理は行わない。
  - |-
    ③IEEE802.1adのVLANタグには、通信事業者がユーザを識別するためのS-TAGと、ユーザがVLANを区別するためのC-TAGがある。
  - |-
    ④ユーザのMACアドレスとは別に通信事業者の網内転送を行う専用のMACアドレスを用意してカプセル化する方法は、一般に、MAC-in-MACといわれる。
  answer: 2
  explanation: |-
    実際の正答は③ではなく②。②拡張VLANでは通信事業者はユーザのMACアドレスを管理しないが、この説明が微妙に誤っている場合がある。正答は⑦…実際の正答表では②。
- id: r6_2_setubi_q06_オ
  number: 6-(3)
  text: SNMPの概要について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①SNMPはネットワーク管理情報の取得などを行うために用いられるプロトコルであり、RTP上で動作する。
  - |-
    ②SNMPは、一般に、SNMPマネージャ、SNMPエージェント及び管理情報データベースであるLSDBを基本構成要素としている。
  - |-
    ③SNMPにはRMONというリモートネットワーク監視の拡張機能がある。RMONは、一般に、ネットワーク機器単体を監視するパラメータ群から構成される。
  - |-
    ④SNMPのイベント通知であるトラップは、何らかの原因でネットワーク機器の状態が変化した際に、SNMPマネージャからSNMPエージェントに問合せが無くても、監視対象機器の状態変化をエージェント側から通知する場合などに利用される。
  answer: 4
  explanation: |-
    ④が正しい。トラップはエージェントからマネージャへの非同期通知。①SNMPはUDP上で動作する。②管理情報データベースはMIB（Management Information Base）でLSDBではない。③RMONはネットワークセグメント全体を監視するものでネットワーク機器単体の監視ではない。
- id: r6_2_setubi_q06_カ
  number: 6-(4)
  text: |-
    IPネットワークにおけるコネクション型およびコネクションレス型通信の特徴などについて述べた文章A～Cは＿＿。
    A：コネクション型通信では、通信相手とのコネクションを確立してデータを送信するため、コネクション確立のための制御手順を必要とし、パケット損失が発生したときの再送制御が可能である。
    B：コネクション型通信で用いられるTCPにおけるコネクション確立の手順は、一般に、スリーウェイハンドシェイクといわれ、3つのセグメントのやり取りが行われる。
    C：コネクションレス型通信で用いられるUDPでは、送信したセグメントに対する送達確認を受信し、インターネット層以下の伝達機能の正常性を確認している。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 4
  explanation: |-
    A、Bが正しい。C：UDPは送達確認を行わないコネクションレス型プロトコル。送達確認を行うのはTCPの特徴。
