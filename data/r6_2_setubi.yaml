  - ⑩データハザード
  - ⑪エラー
  - ⑫中間者攻撃
  - ⑬SQLインジェクション
  - ⑭ディレクトリトラバーサル
  - ⑮ディレクトリハーベスト
  - ⑯ディレクトリリスティング
  answer: 4
  explanation: |-
    エスケープ処理は「<」→「&lt;」「>」→「&gt;」などHTMLの特殊文字を無害な文字列に変換することでXSSを防止する。
- id: r6_2_setubi_q09_オ
  number: 9-(2)
  text: |-
    JIS Q 27001:2023に規定されているISMSの情報セキュリティ管理策について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①クラウドサービスの調達、利用、管理及び利用終了のプロセスを、組織の情報セキュリティ要求事項に従って確立しなければならない。
  - |-
    ②認証情報の割当て及び管理は、認証情報の適切な取扱いについて要員に助言することを含む管理プロセスによって管理しなければならない。
  - |-
    ③情報及びその他の関連資産へのアクセス権は、組織のアクセス制御に関するトピック固有の方針及び規則に従って、提供、レビュー、変更及び削除しなければならない。
  - |-
    ④ICT製品及びサービスのサプライチェーンに関連する情報セキュリティリスクを管理するためのプロセス及び手順を定め、実施しなければならない。
  - |-
    ⑤情報のラベル付けに関する適切な一連の手順は、認証機関が定める情報分類体系に従って策定し、実施しなければならない。
  answer: 5
  explanation: |-
    ⑤が誤り。情報のラベル付けの手順は「認証機関が定める情報分類体系」ではなく、「組織が採用した情報分類体系」に従って策定・実施しなければならない。
- id: r6_2_setubi_q09_カ
  number: 9-(3)
  text: |-
    不正アクセスで用いられるパスワード解析手法などについて述べた文章A～Cは＿＿。
    A：あらゆる文字列の組合せを総当たりで試すことによりパスワードを解析する手法は、一般に、パスワードリスト攻撃といわれる。
    B：パスワードによる認証には、固定パスワード、ワンタイムパスワードなどを用いる方式がある。ワンタイムパスワードは、固定パスワードと比較して盗聴に対する耐性が低い。
    C：ハッシュ化されたパスワードから元のパスワードを求めることは困難であるが、適当なパスワード候補からハッシュ値を生成し、ハッシュ化されたパスワードと同一となるものを探索する手法により元のパスワードが解析されるおそれがある。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 3
  explanation: |-
    Cのみ正しい。A：総当たりはブルートフォース攻撃で、パスワードリスト攻撃は既存のパスワードリストを使う攻撃。B：ワンタイムパスワードは使い捨てのため盗聴されても再利用できず、固定パスワードより盗聴耐性が高い。
- id: r6_2_setubi_q09_キ
  number: 9-(4)
  text: 暗号の特徴などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①非対称暗号方式は、公開鍵暗号方式ともいわれ、秘密鍵と公開鍵の二つの鍵を用いる方式である。非対称暗号方式は対称暗号方式と比較して、暗号アルゴリズムが単純であり、暗号化と復号にかかる処理時間が短い。
  - |-
    ②疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリーム暗号を構成できる。
  - |-
    ③暗号化だけでなくデジタル署名にも応用されているRSA暗号の安全性は、離散対数問題の数学的困難性に基づいている。
  - |-
    ④RSA暗号は、楕円曲線暗号と比較して、同じ鍵長の場合、公開鍵から秘密鍵を求めるのに必要な計算量が多いため安全性が高い。
  answer: 2
  explanation: |-
    ②が正しい。XOR演算を用いたOTP（One-Time Pad）やストリーム暗号の基本原理。①公開鍵暗号は処理が重く時間がかかる。③RSA暗号の安全性は素因数分解問題に基づく（離散対数は楕円曲線暗号等）。④楕円曲線暗号は同じ鍵長でRSAより高い安全性を持つ。
- id: r6_2_setubi_q09_ク
  number: 9-(5)
  text: 認証方式などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①PPPなどで使用されているCHAPは、チャレンジレスポンス方式による認証システムを実装している。
  - |-
    ②IEEE802.1Xは、LANに接続する端末を認証するためのプロトコルであり、認証情報を転送するためにFTPを用いている。
  - |-
    ③RADIUSには、認証、認可及びアカウンティングの三つの機能があり、AAA機能といわれる。
  - |-
    ④SAML（Security Assertion Markup Language）は、認証及び認可に関する情報を交換するための規格であり、複数のWebサービスへのシングルサインオンの実現などに用いられる。
  answer: 2
  explanation: |-
    ②が誤り。IEEE802.1XはLAN接続端末の認証プロトコルだが、認証情報の転送にはFTPではなくEAP（Extensible Authentication Protocol）を使用する。
