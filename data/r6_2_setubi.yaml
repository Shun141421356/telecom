- id: r6_2_setubi_q04_エ
  number: 4-(2)
  text: |-
    交流電源装置の給電方式の種類と特徴について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①常時インバータ給電方式のうち、商用同期方式では、インバータを商用電源と同期をとって運転しながら負荷へ給電し、インバータの故障時は商用バイパス回路からの給電に切り換えて負荷への給電を継続する。
  - |-
    ②常時商用給電方式のうち、インバータ運転待機方式では、インバータを商用電源と同期をとって無負荷で運転しながら商用バイパス回路から負荷へ給電し、商用電源停電時はインバータに切り換えて負荷への給電を継続する。
  - |-
    ③常時商用給電方式のうち、インバータ停止待機方式では、インバータを停止しておき商用バイパス回路から負荷へ給電し、商用電源停電時はインバータを起動して負荷へ給電する。
  - |-
    ④常時商用給電方式のうち、並列給電方式では、インバータと商用電源が非同期で独立に負荷へ給電し、片方が給電できなくなった場合は残る片方が全負荷へ給電する。
  answer: 4
  explanation: |-
    ④が誤り。並列給電方式ではインバータと商用電源を同期させて並列運転し、協調して負荷に給電する方式。「非同期で独立に」給電するというのは誤り。
- id: r6_2_setubi_q04_オ
  number: 4-(3)
  text: 通信ビルにおける雷害対策について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①外部雷保護システムは、一般に、受雷部システム、接地システム、引下げ導線システムで構成され、雷サージが建築物の内部へ侵入するのを防止する。
  - |-
    ②サージ防護デバイス（SPD）は、雷サージが印加されると非線形素子の効果によりインピーダンスが上昇し、雷サージ電流を遮断する。
  - |-
    ③電源線、通信線、接地線などから侵入する雷サージにより電気設備の絶縁破壊を発生させないようにするには、一般に、等電位ボンディングが有効である。
  - |-
    ④耐雷トランスは、入力側巻線と出力側巻線との間のシールド板を接地して、入出力間の雷サージの侵入を抑制する。
  answer: 2
  explanation: |-
    ②が誤り。SPDは雷サージが印加されるとインピーダンスが「低下」してサージ電流をバイパス（アース）に流す素子。インピーダンスが上昇するのは誤り。
- id: r6_2_setubi_q04_カ
  number: 4-(4)
  text: |-
    通信ビルにおける自家用発電設備について述べた文章A～Cは＿＿。
    A：契約電力の削減を目的としたピークカット運転用の電源として、一般に、非常用の自家用発電設備が用いられる。
    B：大規模な通信ビルにおける事業用電気通信設備に対する停電対策として、一般に、短時間のエネルギー源として蓄電池が用いられ、長時間のエネルギー源として常用の自家用発電設備が用いられる。
    C：常用の自家用発電設備の一つにCGSがあり、ガスタービン機関、ディーゼル機関などにより発電するとともに、その際に発生する廃熱を冷暖房、給湯などに活用することができる。
  options:
  - ①Aのみ正しい
  - ②Bのみ正しい
  - ③Cのみ正しい
  - ④A、Bが正しい
  - ⑤A、Cが正しい
  - ⑥B、Cが正しい
  - ⑦A、B、Cいずれも正しい
  - ⑧A、B、Cいずれも正しくない
  answer: 3
  explanation: |-
    Cのみ正しい。A：ピークカット運転は「常用」自家用発電設備を使用する。B：停電対策において短時間は蓄電池、長時間は非常用発電設備（常用ではなく非常用）が使われる。
