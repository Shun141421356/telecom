  answer: 7
  explanation: |-
    バーチャート（ガントチャート）は縦軸に作業内容、横軸に時間をとり各作業の期間を横棒で示す工程表。
- id: r6_2_setubi_q07_エ
  number: 7-(1)-エ
  text: 曲線式工程表における予定工程曲線は、一般に、＿＿字形の曲線となる。
  options:
  - ①U
  - ②相対
  - ③PERT図
  - ④限界
  - ⑤M
  - ⑥手順
  - ⑦バーチャート
  - ⑧教育
  - ⑨S
  - ⑩経済
  - ⑪斜線式工程表
  - ⑫環境
  - ⑬N
  - ⑭安全
  - ⑮レーダーチャート
  - ⑯最高応答
  answer: 9
  explanation: |-
    施工出来高の累積曲線は、工事初期はゆっくり、中期は急速に、終期はまたゆっくりとなるS字形（バナナ曲線）になる。
- id: r6_2_setubi_q07_オ
  number: 7-(2)
  text: |-
    労働安全衛生に関する法令に基づく高所作業における墜落災害防止対策などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①高さが1.5mをこえる箇所で作業を行うときは、当該作業に従事する労働者が安全に昇降するための設備等を設けなければならない。ただし、著しく困難なときは除く。
  - |-
    ②高さが2m以上の箇所で作業を行うときは、当該作業を安全に行うため必要な照度を保持しなければならない。
  - |-
    ③高さが2m以上の箇所で作業を行う場合において墜落のおそれがあるときは、足場を組み立てる等の方法により作業床を設けなければならない。
  - |-
    ④脚立は、丈夫な構造とし、脚と水平面の角度が法令で規定する80度以下で、折りたたみ式のものにあっては、脚と水平面との角度を確実に保つための金具等を備えたものを使用しなければならない。
  answer: 4
  explanation: ④が誤り。脚と水平面の角度は「75度以下」が正しく、80度以下は誤り。
- id: r6_2_setubi_q07_カ
  number: 7-(3)
  text: |-
    情報通信ネットワーク安全・信頼性基準における平常時の取組について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①教育・訓練における対策の一つに、各リスクに対して復旧措置等の訓練を実施することがある。
  - |-
    ②維持・運用における対策の一つに、データ投入等における高い信頼性が求められる作業において、容易に誤りが混入しないよう措置を講ずることがある。
  - |-
    ③ヒューマンエラー防止策における対策の一つに、情報通信ネットワークの設計、工事、維持および運用に係る各作業を複数の担当者で実施し、作業手順の承認手続は多段階にならないように迅速に行うことがある。
  - |-
    ④リスク管理における対策の一つに、利用者の利益に及ぼす影響が大きい設備の損壊または故障等の発生リスクを定期的に調査及び分析することがある。
  answer: 3
  explanation: |-
    ③が誤り。ヒューマンエラー防止のためには「作業手順の承認手続は多段階にする」（二重チェック等）ことが有効であり、「多段階にならないように」は誤り。
- id: r6_2_setubi_q07_キ
  number: 7-(4)
  text: 故障解析手法の一つであるFTAについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①FTAでは、故障要因と事象の因果関係について、事象記号、論理記号などを用いてPDPC図を作成し故障解析が行われる。
  - |-
    ②FTAは、FMEAでは扱いにくいとされるヒューマンエラーや多重故障に関係する事象の解析に用いられる。
  - |-
    ③FTAは、望ましくない事象（頂上事象）を明示し、その原因に向かって故障要因などを整理して基本事象にまで展開することで頂上事象の要因解析などを行うボトムアップ型の手法として用いられる。
  - |-
    ④FTAは、複雑なシステムに対して頂上事象までの故障経路を特定するための有効な手法ではあるが、基本事象の発生確率が判明していても頂上事象の発生確率を予測できない。
  answer: 2
  explanation: |-
    ②が正しい。FTAはFMEAが苦手とするヒューマンエラーや多重故障の解析に有効。①FTAはFT（Fault Tree）図を使用し、PDPC図ではない。③FTAはトップダウン型の手法。④基本事象の発生確率から頂上事象の発生確率を計算できる。
- id: r6_2_setubi_q07_ク
  number: 7-(5)
  text: 故障率の特徴などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ①ある部品の故障率がDFR型を示す期間内にあるとき、バーンインなどによりスクリーニングを行い、初期において故障率が高いものを除くことで故障率の低い良品を選ぶことができる。
  - |-
    ②ある部品の故障率がDFR型を示す期間内にあるとき、この部品はある特定期間に故障が集中する傾向があり、故障が集中的に起こる直前に事前取替を行うことで未然に故障を防止できる。
  - |-
    ③ある部品の故障率がCFR型を示す期間内にあるとき、この部品の寿命分布は正規分布に従う。
  - |-
    ④ある部品の故障率がCFR型を示す期間内にあるとき、この部品の時間当たりの故障の発生は一定で、その故障発生時期の予測が可能である。
  answer: 1
  explanation: |-
    ①が正しい。DFR（Decreasing Failure Rate）型は初期故障期で時間とともに故障率が下がる。バーンインで初期不良品を除去することで良品を選別できる。②特定期間に集中するのはIFR型（摩耗故障期）。③CFR型の寿命分布は指数分布に従う。④CFRは故障率一定だが故障発生時期は予測できない（ランダム）。
- id: r6_2_setubi_q07_ケ
  number: 7-(6)-(ⅰ)
  text: |-
    同じ信頼度の装置Ａ2台が1／2冗長構成であるサブシステム1の信頼度は＿＿である。（装置Aの信頼度は0.700）
  options:
  - ①0.090
  - ②0.251
  - ③0.490
  - ④0.510
  - ⑤0.815
  - ⑥0.896
  - ⑦0.903
  - ⑧0.910
  answer: 8
  explanation: |-
    1/2冗長（どちらか一方が動けばよい）の信頼度 = 1 - (1-0.7)×(1-0.7) = 1 - 0.3×0.3 = 1 - 0.09 = 0.910
- id: r6_2_setubi_q07_コ
  number: 7-(6)-(ⅱ)
  text: |-
    同じ信頼度の装置Ｂ3台からなるサブシステム2が2／3多数決冗長構成であるとき、サブシステム1とサブシステム2を接続した全体システムの信頼度は＿＿である。（装置Bの信頼度は0.800）
  options:
  - ①0.090
  - ②0.251
  - ③0.490
  - ④0.510
  - ⑤0.815
  - ⑥0.896
  - ⑦0.903
  - ⑧0.910
  answer: 5
  explanation: |-
    2/3多数決（3台中2台以上が正常）の信頼度 = C(3,2)×0.8²×0.2 + C(3,3)×0.8³ = 3×0.64×0.2 + 0.512 = 0.384 + 0.512 = 0.896。全体システム = サブシステム1 × サブシステム2 = 0.910 × 0.896 ≒ 0.815。正答は⑤0.815…実際にはサブシステム2の信頼度0.896が単体として算出され、全体は0.910×0.896=0.815→⑤。正答表では⑥0.896。
- id: r6_2_setubi_q08_ア
  number: 8-(1)-ア
  text: |-
    コンピュータシステムの信頼性などを評価するための代表的な指標に、信頼性、＿＿性及び保守性の三つがあり、RASといわれる。
  options:
  - ①俊敏
  - ②フェールオーバ
  - ③フォールバック
  - ④適合
  - ⑤フールプルーフ
  - ⑥クラスタリング
  - ⑦可用
  - ⑧フェールソフト
  - ⑨リスクアセスメント
  - ⑩耐久
  - ⑪フェールセーフ
  - ⑫デュプレクシング
  - ⑬フォールトアボイダンス
  - ⑭フォールトマスキング
  - ⑮フォールトトレランス
  - ⑯フォールトツリー
  answer: 7
  explanation: |-
    RAS = Reliability（信頼性）、Availability（可用性）、Serviceability（保守性）。
- id: r6_2_setubi_q08_イ
  number: 8-(1)-イ
  text: |-
    システム内に故障が発生したときに、その影響を軽減することで極力機能を維持しようとする考え方は、＿＿といわれる。
  options:
  - ①俊敏
  - ②フェールオーバ
  - ③フォールバック
  - ④適合
  - ⑤フールプルーフ
  - ⑥クラスタリング
  - ⑦可用
  - ⑧フェールソフト
  - ⑨リスクアセスメント
  - ⑩耐久
  - ⑪フェールセーフ
  - ⑫デュプレクシング
  - ⑬フォールトアボイダンス
  - ⑭フォールトマスキング
  - ⑮フォールトトレランス
  - ⑯フォールトツリー
  answer: 15
  explanation: |-
    フォールトトレランスは故障が発生してもシステムが機能を維持し続ける能力（耐故障性）。
- id: r6_2_setubi_q08_ウ
  number: 8-(1)-ウ
  text: |-
    フォールトトレランスのレベルのうち、故障に対し機能低下による外部への影響を完全に防止するレベルは＿＿といわれる。
  options:
  - ①俊敏
  - ②フェールオーバ
  - ③フォールバック
  - ④適合
  - ⑤フールプルーフ
  - ⑥クラスタリング
  - ⑦可用
  - ⑧フェールソフト
  - ⑨リスクアセスメント
  - ⑩耐久
  - ⑪フェールセーフ
  - ⑫デュプレクシング
  - ⑬フォールトアボイダンス
  - ⑭フォールトマスキング
  - ⑮フォールトトレランス
  - ⑯フォールトツリー
  answer: 14
  explanation: |-
    フォールトマスキングは故障の影響を完全に隠蔽し外部への機能低下を防ぐフォールトトレランスの最高レベル。
- id: r6_2_setubi_q08_エ
  number: 8-(1)-エ
  text: |-
    システムの利用者が誤操作をしにくくしたり、誤操作をしても致命的な事態や損害を生じさせずに機能を維持しようとする設計の考え方は、＿＿といわれる。
  options:
  - ①俊敏
  - ②フェールオーバ
  - ③フォールバック
  - ④適合
  - ⑤フールプルーフ
  - ⑥クラスタリング
  - ⑦可用
  - ⑧フェールソフト
  - ⑨リスクアセスメント
  - ⑩耐久
  - ⑪フェールセーフ
  - ⑫デュプレクシング
  - ⑬フォールトアボイダンス
  - ⑭フォールトマスキング
  - ⑮フォールトトレランス
  - ⑯フォールトツリー
  answer: 5
  explanation: |-
    フールプルーフは人間の誤操作を防止する設計思想。「fool（愚か者）でも proof（耐える）」の意味。
- id: r6_2_setubi_q08_オ
  number: 8-(2)
  text: ソフトウェアテストについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①運用中のプログラムを修正したときに、修正箇所のテストに加えて修正箇所以外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッションテスト（Regression Test）またはデグレードテスト（Degrade Test）といわれる。
  - |-
    ②実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できること、運用性に問題ないことなどを確認するテストは、一般に、運用テストといわれ、利用者や運用部門が中心となって行う。
  - |-
    ③納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側が最終的に判定するテストは、一般に、受入れテストといわれる。
  - |-
    ④新しくシステムを稼働させるために、プログラム、データなどを計画どおりに稼働環境に移すことができることを事前に確認するテストは、一般に、状態遷移テストといわれる。
  answer: 4
  explanation: |-
    ④が誤り。稼働環境への移行を確認するテストは「移行テスト」といわれる。状態遷移テストはソフトウェアの状態遷移図に基づいてテストを行う手法で、別の概念。
- id: r6_2_setubi_q08_カ
  number: 8-(3)
  text: |-
    JIS Q 20000-1:2020に規定されているリリース及び展開管理について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ①組織は、新規サービスまたはサービス変更、およびサービスコンポーネントの稼働環境への展開について計画をしなければならない。
  - |-
    ②稼働環境へのリリースの展開に先立って、影響を受けるCI（構成品目）のベースラインをとらなければならない。
  - |-
    ③リリースは、文書化した受入れ基準に基づいて検証し、展開後は速やかに承認しなければならない。受入れ基準を満たしていない場合には、組織及び利害関係者は必要な処置及び展開について決定しなければならない。
  - |-
    ④リリースの成功または失敗は、監視し、分析しなければならない。測定には、リリース展開後のリリースに関連するインシデントを含めなければならない。
  answer: 3
  explanation: |-
    ③が誤り。「展開後は速やかに承認しなければならない」ではなく、受入れ基準に基づく検証の後に承認するものであり、「速やかに承認」という表現は誤り。
- id: r6_2_setubi_q09_ア
  number: 9-(1)-ア
  text: |-
    利用者がサーバ内のファイル名を指定するWebサイトにおいて、攻撃者が相対パスを悪用するなどして本来アクセスが許容されないファイルに不正にアクセスする攻撃は、＿＿といわれる。
  options:
  - ①APサーバ
  - ②Webサーバ
  - ③カプセル化
  - ④エスケープ
  - ⑤DBサーバ
  - ⑥Webブラウザ
  - ⑦DBD攻撃
  - ⑧DDoS攻撃
  - ⑨ポリシング
  - ⑩データハザード
  - ⑪エラー
  - ⑫中間者攻撃
  - ⑬SQLインジェクション
  - ⑭ディレクトリトラバーサル
  - ⑮ディレクトリハーベスト
  - ⑯ディレクトリリスティング
  answer: 14
  explanation: |-
    ディレクトリトラバーサル攻撃は「../」などの相対パスを使って想定外のディレクトリ・ファイルにアクセスする攻撃。
- id: r6_2_setubi_q09_イ
  number: 9-(1)-イ
  text: |-
    データベースと連携したWebサイトにおいて、入力するデータの中に悪意のあるSQL文を埋め込むことでデータベースを不正に操作する攻撃は、一般に、＿＿といわれる。
  options:
  - ①APサーバ
  - ②Webサーバ
  - ③カプセル化
  - ④エスケープ
  - ⑤DBサーバ
  - ⑥Webブラウザ
  - ⑦DBD攻撃
  - ⑧DDoS攻撃
