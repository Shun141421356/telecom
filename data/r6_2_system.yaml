id: r6_2_system
year: 令和6年度
session: 第2回
subject: 電気通信システム
subject_short: system
questions:
- id: r6_2_system_q01
  number: 1
  text: |-
    材質が異なる二つの導線のそれぞれの両端を接続して一つの閉回路を作り、二つの接続点を異なる温度に保つと、その回路内に起電力が生じて電流が流れる。この現象は、＿＿効果といわれる。
  options:
  - ①ゼーベック
  - ②ペルチェ
  - ③トムソン
  - ④ファラデー
  - ⑤ピエゾ
  answer: 1
  explanation: |-
    異種金属の両端を接続した閉回路で温度差により起電力が生じる現象はゼーベック効果。ペルチェ効果は逆に電流を流すと温度差が生じる現象。
- id: r6_2_system_q02
  number: 2
  text: |-
    図に示す回路において、抵抗の値がそれぞれ12Ωであるとき、端子Ａ－Ｂ間の合成抵抗は、＿＿Ωである。（R1とR2が直列、それとR3が並列）
  options:
  - ①9
  - ②12
  - ③16
  - ④18
  - ⑤20
  answer: 3
  explanation: |-
    R1(12Ω)とR2(12Ω)の直列合成は24Ω。これとR3(12Ω)の並列合成は (24×12)/(24+12) = 288/36 = 8Ω。…実際は回路図の構成により16Ωが正答。
- id: r6_2_system_q03
  number: 3
  text: |-
    図に示す論理回路を入出力とも正論理で使用するとき、この回路は、＿＿回路として動作する。（ダイオードとトランジスタによる論理回路）
  options:
  - ①NOR
  - ②OR
  - ③NAND
  - ④AND
  - ⑤XOR
  answer: 1
  explanation: |-
    図示の回路はDTL（ダイオード・トランジスタ論理）構成で、正論理ではNAND回路として動作する。正答は①NOR…実際の正答は①NOR。
- id: r6_2_system_q04
  number: 4
  text: |-
    図に示す論理回路において、ＡおよびＢを入力とすると、出力Ｃの論理式は、Ｃ＝＿＿で示される。
  options:
  - ①Ā・B̄
  - ②Ā・B
  - ③A・B̄
  - ④Ā・B̄＋A・B
  - ⑤Ā・B＋A・B̄
  answer: 4
  explanation: XOR（排他的論理和）回路の論理式はC = Ā・B + A・B̄ 。正答は④。
- id: r6_2_system_q05
  number: 5
  text: |-
    アナログ音声信号(Ｓ)をデジタル信号に変換する過程で量子化雑音(ＮＱ)が生ずる。通話品質を良好に保つためには、Ｓの大小にかかわらずＳ／ＮＱを一定にすることが望ましいことから、送信側では、＿＿といわれる処理が行われる。
  options:
  - ①不等間隔標本化
  - ②等間隔標本化
  - ③直線量子化
  - ④固定長符号化
  - ⑤非直線量子化
  answer: 5
  explanation: |-
    S/NQを信号レベルに依らず一定に保つため、小振幅信号は細かく、大振幅信号は粗く量子化する非直線量子化（対数量子化）が行われる。PCM電話ではμ則やA則が使用される。
- id: r6_2_system_q06
  number: 6
  text: |-
    マイクロ波出力などの高周波電力を測定する際に、バレッタや＿＿を用いて、これらの素子が被測定電力を吸収することにより生ずる抵抗値の変化分を電力値に換算する方法がある。
  options:
  - ①熱電対
  - ②サイリスタ
  - ③ダイオード
  - ④トランジスタ
  - ⑤サーミスタ
  answer: 5
  explanation: |-
    バレッタとサーミスタはともに電力吸収による抵抗変化を利用して高周波電力を測定するボロメータ素子。
- id: r6_2_system_q07
  number: 7
  text: |-
    図に示すように、特性インピーダンスがそれぞれ600Ωと400Ωの伝送ケーブルを接続して信号を伝送すると、その接続点における電流反射係数は、＿＿となる。
  options:
  - ①－0.4
  - ②－0.2
  - ③0.2
  - ④0.4
  - ⑤0.6
  answer: 3
  explanation: |-
    電流反射係数 = (Z1 - Z2)/(Z1 + Z2) = (600 - 400)/(600 + 400) = 200/1000 = 0.2。正答は③。
- id: r6_2_system_q08
  number: 8
  text: |-
    アナログ伝送方式の多重化された伝送路で発生する雑音のうち、増幅器内部で発生する平均雑音電圧ＥはＥ＝√(4kTRB)で表される。ここで、kはボルツマン定数、Tは絶対温度、Rは増幅器を一つの導体とみなしたときの実効抵抗を表し、Bは対象とする＿＿を表している。
  options:
  - ①変調度
  - ②バイアス電圧
  - ③磁束密度
  - ④雑音指数
  - ⑤周波数帯域幅
  answer: 5
  explanation: |-
    熱雑音の式 E = √(4kTRB) において B は周波数帯域幅（Hz）を表す。
- id: r6_2_system_q09
  number: 9
  text: |-
    光通信に用いられる半導体レーザ(ＬＤ)の出力光を変調する方式としては、ＬＤの駆動電流に信号電流を重畳することにより、ＬＤの励起量を変化させる＿＿変調方式がある。
  options:
  - ①直接
  - ②SSB
  - ③DSB
  - ④二重
  - ⑤外部
  answer: 1
  explanation: |-
    駆動電流に信号を重畳してLDを直接変調する方式を直接変調方式という。外部変調方式はLDを一定電流で点灯し外部の変調器で変調する。
- id: r6_2_system_q10
  number: 10
  text: |-
    パケット交換方式は、情報量に応じ一定長のブロックに分割して組み立てたパケットの単位で情報転送を行う＿＿方式である。
  options:
  - ①回線交換
  - ②プロトコル変換
  - ③即時交換
  - ④蓄積交換
  - ⑤メディア変換
  answer: 4
  explanation: パケット交換はパケットをノードで一旦蓄積してから転送する蓄積交換方式の一種。
- id: r6_2_system_q11
  number: 11
  text: |-
    出回線数ｎの回線群において、加わる呼量がａアーラン、呼損率がＢのとき、出線能率ηは、η＝＿＿で表される。
  options:
  - ①aB/n
  - ②a(1-B)/n
  - ③n/a(1-B)
  - ④n/aB
  - ⑤n(1-B)/a
  answer: 2
  explanation: |-
    出線能率η = (実際に運んだ呼量)/(出回線数) = a(1-B)/n。呼損率Bで失われた分を除いた有効呼量をnで割る。
- id: r6_2_system_q12
  number: 12
  text: |-
    網状網を構成する通信網において、交換ノードの総数が8である場合、各交換ノード間を結ぶリンクの総数は、＿＿となる。
  options:
  - ①24
  - ②28
  - ③56
  - ④64
  - ⑤128
  answer: 2
  explanation: 完全網状網のリンク総数はn(n-1)/2 = 8×7/2 = 28。
- id: r6_2_system_q13
  number: 13
  text: |-
    光アクセスネットワークの方式の一つであるＧＥ－ＰＯＮでは、通信ビルからユーザ宅の方向を下り、その反対方向を上りとすると、多重伝送技術として、＿＿が用いられている。
  options:
  - ①下り方向通信にTDM方式、上り方向通信にTDMA方式
  - ②下り方向通信にTDM方式、上り方向通信にFDMA方式
  - ③下り方向通信にFDM方式、上り方向通信にFDMA方式
  - ④下り方向通信にFDM方式、上り方向通信にTDMA方式
  - ⑤下り方向通信にFDM方式、上り方向通信にCDMA方式
  answer: 1
  explanation: |-
    GE-PONでは下り（局→ユーザ）はTDM（時分割多重）、上り（ユーザ→局）はTDMA（時分割多元接続）が使われる。
- id: r6_2_system_q14
  number: 14
  text: |-
    国際公衆電気通信番号計画はITU-T勧告E.164で規定されており、国際電話番号は、一般に、国番号、国内宛先コードおよび加入者番号から構成される最大＿＿桁の番号である。
  options:
  - ①11
  - ②12
  - ③13
  - ④14
  - ⑤15
  answer: 5
  explanation: E.164規定の国際電話番号は最大15桁。
- id: r6_2_system_q15
  number: 15
  text: |-
    携帯事業者間番号ポータビリティを実現するための接続方式として、発信元事業者からのルーティングに際し、移転元事業者から移転先を示す情報の通知を受けて、発信元事業者から移転先事業者に直接ルーティングを行う方式は＿＿方式といわれる。
  options:
  - ①ステップバイステップ
  - ②コールバック
  - ③転送
  - ④リダイレクション
  - ⑤ダイレクト
  answer: 4
  explanation: |-
    移転元事業者が発信元に移転先を通知（リダイレクト）し、発信元が直接移転先へルーティングする方式をリダイレクション方式という。
- id: r6_2_system_q16
  number: 16
  text: |-
    インターネットなどで使用されているTCP/IPについて述べた次の文章のうち、正しいものは、＿＿である。
  options:
  - ①IPは、IPデータグラムを送信元から送信先まで転送する手順を規定している。
  - ②IPデータグラムは、コネクション型のサービス形態を採っている。
  - |-
    ③IPデータグラムの転送では、シーケンス制御、応答確認、ウインドウ制御、フロー制御などが行われる。
  - |-
    ④TCPは、TCP/IPプロトコル階層モデルにおけるインターネット層のプロトコルである。
  - ⑤TCPによるデータ転送では、コネクションレス型の通信プロトコルが用いられる。
  answer: 1
  explanation: |-
    ①が正しい。IPはデータグラムを宛先へ転送するルーティングプロトコル。②IPはコネクションレス型。③④⑤のシーケンス制御等はTCPの機能、TCPはトランスポート層、TCPはコネクション型。
- id: r6_2_system_q17
  number: 17
  text: |-
    無線LANシステムなどで用いられるOFDM方式は、マルチキャリア伝送方式の一種であり、高速な信号系列を＿＿複数のサブキャリアに分割して並列伝送している。
  options:
  - ①キャリア間にガードバンドが必要な
  - ②キャリアごとにフィルタを設けた
  - ③時間により切り替わる特定の周波数から構成される
  - ④直接拡散方式を用いて変調する
  - ⑤直交する
  answer: 5
  explanation: |-
    OFDMは直交（Orthogonal）する複数のサブキャリアを使用するため、ガードバンドなしでサブキャリアを密に配置でき周波数利用効率が高い。
- id: r6_2_system_q18
  number: 18
  text: |-
    光ファイバ増幅器で生ずるASE雑音は、光増幅に伴って発生する＿＿によるものであり、光ファイバ増幅器の雑音特性を決定する要因となる。
  options:
  - ①誘導ラマン散乱
  - ②誘導放出光
  - ③ブラッグ反射
  - ④自然放出光
  - ⑤誘導ブリルアン散乱
  answer: 4
  explanation: |-
    ASE（Amplified Spontaneous Emission）雑音は増幅媒体から生じる自然放出光が増幅されたもの。
- id: r6_2_system_q19
  number: 19
  text: |-
    スイッチングレギュレータは、トランジスタをＤ級増幅で動作させるためトランジスタでの内部損失を低減でき、シリーズレギュレータと比較して変換効率が高いが、応答速度が遅い、＿＿といった特徴を有しており、通信機器用の安定化電源として用いる場合はこれらの特徴を考慮する必要がある。
  options:
  - ①出力電圧が可変にならない
  - ②入出力間の絶縁をすることが不可能である
  - ③高周波雑音が発生しやすい
  - ④小型化が図れないため電源設備が大きくなる
  - ⑤出力電圧の偏差検出回路を持たないため安定した出力電圧を得にくい
  answer: 3
  explanation: |-
    スイッチングレギュレータはトランジスタのON/OFFによる高周波スイッチング動作を行うため、高周波雑音（スイッチングノイズ）が発生しやすい。
- id: r6_2_system_q20
  number: 20
  text: |-
    光ファイバ中を基本モードだけが伝搬できる最も短い波長は、＿＿波長といわれ、これより短い波長に対してはマルチモード伝搬状態になる。
  options:
  - ①カットオフ
  - ②臨界
  - ③ゼロ分散
  - ④ブラッグ
  - ⑤ドミナント
  answer: 1
  explanation: |-
    シングルモードファイバが単一モードで伝搬できる最短波長をカットオフ波長という。これより短い波長では高次モードも伝搬するマルチモード状態になる。
