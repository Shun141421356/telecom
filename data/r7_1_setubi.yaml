  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：ディーゼル機関の始動用蓄電池は専用の12V〜24V系蓄電池を使用し、48V通信用蓄電池とは共用しない。
- id: r7_1_setubi_q04_e
  number: 4-(オ)
  group: 問4
  points: 3
  text: |-
    通信ビルにおける直流給電方式について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    直流給電方式は、商用電源の交流電力を直流電力に変換する整流装置、蓄電池、直流給電電圧を負荷の要求する規格に補償する負荷電圧補償装置などを用いて直流電力を供給する。
  - |-
    直流給電方式は、直流電力の電圧値のみの調整により整流装置の並列運転が可能であることなどから、電力変換段数が多く複雑な制御を要する交流給電方式と比較して、一般に、電力供給に対する信頼性が高い。
  - |-
    高電圧直流（HVDC）給電方式は、従来の-48V直流給電方式と比較して給電電圧が高くなるため、電流増大効果により電流ケーブル本数の増加やケーブルの太径化が必要となる。
  - |-
    直流給電方式で用いられる整流装置は、大きな直流出力を得るために複数の整流器ユニットで構成して並列運転を行う。
  answer: 3
  explanation: |-
    ③が誤り。HVDC給電方式は電圧が高いため電流が小さくなる（P=VIより）。よってケーブル本数の削減や細径化が可能となる（電流増大ではなく電流減少）。
- id: r7_1_setubi_q04_f
  number: 4-(カ)
  group: 問4
  points: 3
  text: |-
    通信ビルにおける受電設備などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    高圧で受電する通信ビルでは、自ビル内の事故が他需要家に影響を与えること及び他需要家の事故の影響を受けることを防止するために、保護協調を保つ必要がある。
  - |-
    高圧受電装置の保護継電器には、短絡事故発生時に生ずる過大電流や過大電圧を検出するための過電流継電器や過電圧継電器、地絡事故発生時に生ずる零相地絡電流を検出するための地絡継電器などがある。
  - |-
    遮断器は、消弧媒質の違いにより、ガス遮断器、空気遮断器、油遮断器などに分類され、ガス遮断器では、消弧媒質として、一般に、アルゴンガスやフレオンガスが用いられる。
  - |-
    受電電圧には、交流600V以下の低圧、交流600Vを超え7,000V以下の高圧及び7,000Vを超える特別高圧の区分がある。
  answer: 3
  explanation: |-
    ③が誤り。ガス遮断器（GCB）の消弧媒質はSF₆（六フッ化硫黄）ガスが一般的。アルゴンやフレオンは使用しない。
