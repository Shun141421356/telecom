- id: r7_1_setubi_q03_d
  number: 3-(エ)
  group: 問3
  points: 3
  text: |-
    移動通信におけるOFDMによる信号伝送について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    OFDM信号は搬送波周波数が異なる複数のデジタル変調信号によって構成され、各デジタル変調信号の搬送波は直交関係にある。
  - |-
    OFDM信号を生成するため送信側では離散フーリエ変換（DFT）が行われ、受信側ではOFDM信号に対して逆離散フーリエ変換（IDFT）が行われる。
  - |-
    伝搬遅延によるシンボル間干渉を防ぐために、シンボル間にサイクリックプレフィックスを挿入する。
  - サブキャリアの変調方式として、QPSK、16QAMなどが用いられる。
  answer: 2
  explanation: |-
    ②が誤り。OFDM信号を生成するため送信側では「逆離散フーリエ変換（IDFT）」が行われ、受信側では「離散フーリエ変換（DFT）」が行われる（送受信が逆）。
- id: r7_1_setubi_q03_e
  number: 3-(オ)
  group: 問3
  points: 3
  text: |-
    アクセス系無線通信における高速化技術について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    デジタル変調方式においてQPSKでは多値数が4であることから、1シンボルで伝送できる情報量は4ビットである。
  - |-
    複数の送信アンテナを用いて複数のストリームを同時に送信するMIMOの送信手法は、空間多重といわれる。
  - |-
    無線伝搬環境の変動に対応して変調方式や誤り訂正符号化方式を選択する技術は、ハフマン符号化といわれる。
  - |-
    複数の周波数帯域を束ねて使用することによって通信速度を高速化する技術は、キャリアセンスといわれる。
  answer: 2
  explanation: |-
    ②が正しい。空間多重（Spatial Multiplexing）はMIMOの技術。①QPSKは2ビット/シンボル（4値=2ビット）。③は適応変調（AMC）。④はキャリアアグリゲーション。
- id: r7_1_setubi_q03_f
  number: 3-(カ)
  group: 問3
  points: 3
  text: |-
    第5世代移動通信システム（5G）のネットワーク構成などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    5GにはSA（Standalone）方式とNSA（Non-Standalone）方式があり、SA方式ではネットワークスライシング技術を用いたサービスを提供することができる。
  - SA方式では、制御に必要なパラメータの送受信にNR回線を用いている。
  - |-
    NSA方式では、制御信号の送受信にLTE回線を用い、データの送受信にLTE回線とNR回線の両方を用いている。
  - |-
    NSA方式において、ユーザ認証、位置登録、パケットの転送経路設定などの機能は、5GCが提供する。
  answer: 4
  explanation: |-
    ④が誤り。NSA方式ではコアネットワークにEPC（Evolved Packet Core）を使用し、5GC（5G Core）はSA方式で使用される。
- id: r7_1_setubi_q04_a
