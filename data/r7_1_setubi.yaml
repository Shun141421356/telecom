- id: r7_1_setubi_q06_d
  number: 6-(エ)
  group: 問6
  points: 3
  text: |-
    IPネットワークにおけるQoS制御技術などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    QoS制御技術には、ルータにおけるキューイング、トラヒックシェーピングなどがある。
  - |-
    IPv6の場合、DiffServでは、IPヘッダ内のトラヒッククラスフィールドを用いてDSCP値を伝達することにより優先制御を行う。
  - |-
    IntServは、アプリケーションのサービス品質を幾つかのクラスに分類し、クラスごとに優先制御の実施、最低帯域の確保などを行うベストエフォート型のQoS制御技術である。
  - |-
    ストリーミングによるマルチメディア通信などにおいて、データを送信するために必要なリソースを予約するプロトコルはRSVPといわれ、ユニキャスト通信とマルチキャスト通信の両方に適用可能である。
  answer: 3
  explanation: |-
    ③が誤り。IntServ（Integrated Services）は「ベストエフォート型」ではなく、フローごとにリソースを予約して品質を保証する「保証型」のQoS制御技術（RSVPと組み合わせて使用）。
- id: r7_1_setubi_q06_e
  number: 6-(オ)
  group: 問6
  points: 3
  text: |-
    IPネットワークにおけるMPLSのラベルスイッチングなどについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    MPLS網内で使用されるLSR（Label Switching Router）は、パケット内のラベル情報を参照して、IPパケットの転送処理を実行する。
  - |-
    LSRは、ラベル情報によりIPパケットを転送するための転送用テーブルを保持しており、一般に、LDP（Label Distribution Protocol）などの配布用プロトコルを使用して隣接LSRとラベル情報を交換する。
  - |-
    MPLS-VPNのネットワークでは、一般に、2種類のラベルが用いられ、先頭のラベルはユーザを識別するために、また、先頭から2番目のラベルは転送するために用いられる。
  - |-
    MPLSでは、ラベルスイッチングを行う前にLSP（Label Switched Path）を確立して通信を行っており、複数の異なる経路を指定したLSPを確立することもできることから、トラヒックの集中を回避するなどの負荷分散が可能である。
  answer: 3
  explanation: |-
    ③が誤り。MPLS-VPNでは2種類のラベルを使用するが、「先頭ラベルが転送（外側ラベル）、2番目ラベルがVPN/ユーザ識別（内側ラベル）」が正しい（先頭と2番目が逆）。
