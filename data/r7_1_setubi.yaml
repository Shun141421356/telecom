    B：TCP及びUDPは、トランスポート層のプロトコルであり、ポート番号を用いてアプリケーション層のアプリケーションプログラムが扱うサービスの種類などを識別している。
    C：IPv4ではUDPチェックサムの算出は必須であるが、IPv6ではUDPでのチェックサム計算はオプションである。
  options:
  - Aのみ正しい
