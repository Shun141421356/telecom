- id: r7_1_setubi_q02_d
  number: 2-(エ)
  group: 問2
  points: 3
  text: トラヒックの用語などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    1日のうちトラヒックの最大となる連続する1時間は最繁時といわれ、1日の全トラヒックに対する最繁時トラヒックの占める割合は、基礎トラヒックといわれる。
  - |-
    即時式の系において、加えられた呼量と運ばれた呼量との差である損失呼量の運ばれた呼量に対する比は、呼損率といわれる。
  - |-
    ある測定時間T時間中における総呼数をN呼、平均保留時間をt時間とすると、呼量A（アーラン）はA=Nt/Tで表される。
  - |-
    待時式完全群において、加わる呼量を一定とした場合、出回線数が多くなれば平均待合せ時間は長くなる。
  answer: 3
  explanation: |-
    ③が正しい。呼量A=Nt/T（アーラン）。①「基礎トラヒック」は誤りで正しくは「集中率」。②呼損率は損失呼量の加えられた呼量に対する比。④出回線数が多くなれば待合せ時間は短くなる。
- id: r7_1_setubi_q02_e
  number: 2-(オ)
  group: 問2
  points: 3
  text: |-
    電話番号マッピング技術ENUMの概要について述べた次のA〜Cの文章は正しいか。
    A：ENUMでは、電話番号をキーにしてメールアドレスやIP電話用のアドレスなど、インターネット上で扱う様々なアドレス情報との対応付けを行うことができる。
    B：ENUMにおいて、電話番号に対応付けられたURIには、URL、URNなどが含まれる。
    C：ENUM対応のDNSサーバには、電話番号にURIを対応付ける場合に使用されるNAPTRというタイプのリソースレコードが蓄えられている。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 7
  explanation: |-
    A・B・Cいずれも正しい。ENUMはE.164電話番号とインターネットアドレスを対応付けるDNS技術で、NAPTR（Naming Authority Pointer）リソースレコードを使用する。
- id: r7_1_setubi_q02_f
  number: 2-(カ)
  group: 問2
  points: 3
  text: |-
    IP電話の音声品質劣化要因などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    IP電話の送信側ゲートウェイで発生する遅延の主なものには、音声信号のデジタル化や圧縮に伴う遅延及びパケット化遅延がある。
  - |-
    IP網の経路上で発生したパケットロスは、受信側で再生される音声の途切れにつながる場合がある。この対策として、同じような波形が連続するという音声信号の特質を利用して欠落した音声を補完するARQといわれる機能が、一般に、利用されている。
  - |-
    VoIP技術を用いることにより、音声信号はパケット化されて一定の間隔で送信されるが、IP網を経由すると、ジッタといわれるパケットの到着間隔の揺らぎが発生する。
  - |-
    IP電話において発生するエコーには、4線式と2線式との変換過程で発生するハイブリッドエコー、受信側端末のマイクロホンとスピーカとの間で発生するアコースティックエコーなどがある。
  answer: 2
  explanation: |-
    ②が誤り。欠落した音声を補完する技術はARQ（自動再送要求）ではなく「音声補間（波形補間）」または「PLC（Packet Loss Concealment）」。ARQはパケット再送を要求する仕組みで遅延が大きくVoIPには不適。
- id: r7_1_setubi_q03_a
