- id: r7_1_setubi_q01_a
  number: 1-(ア)
  group: 問1
  points: 2
  text: |-
    WDM伝送システムにおいて、SDH/SONET伝送装置などから受信した光信号を電気信号に変換し、雑音除去・波形整形後に波長制御された光信号に変換するWDM端局装置の機能部品は（ア）である。
  options:
  - DSF
  - EDFA
  - DPLL
  - 半導体光増幅器
  - DSU
  - AWG
  - MEMS
  - ラマン増幅器
  - オーケストレータ
  - トランスポンダ
  - エラスティックストア
  - デジタルフィルタ
  answer: 10
  explanation: |-
    トランスポンダ：WDM端局装置の波長変換機能部。受信した光信号を電気信号に変換し、波長制御された光信号に再変換する。
