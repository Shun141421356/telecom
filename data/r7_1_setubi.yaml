    情報システム、装置又はその他の記憶媒体に保存している情報は、必要でなくなった時点で削除しなければならない。
  - |-
    データ漏えい防止対策を、取扱いに慎重を要する情報を処理、保存又は送信するシステム、ネットワーク及びその他の装置に適用しなければならない。
  - |-
    情報処理施設・設備は、機密性の要求事項を満たすのに十分な冗長性をもって、導入しなければならない。
  - |-
    組織が使用する情報処理システムのクロックは、組織が採用した時刻源と同期させなければならない。
  - 開発環境、テスト環境及び本番環境は、分離してセキュリティを保たなければならない。
  answer: 3
  explanation: |-
    ③が誤り。情報処理施設・設備の冗長性は「機密性」ではなく「可用性（Availability）」の要求事項を満たすために必要。
- id: r7_1_setubi_q09_f
  number: 9-(カ)
  group: 問9
  points: 3
  text: |-
    コンピュータシステムへの脅威などについて述べた次のA〜Cの文章は正しいか。
    A：データベースと連携したWebサイトへの入力データに悪意のあるSQL文を埋め込むことでデータベースを不正に操作する攻撃は、一般に、クロスサイトスクリプティングといわれる。
    B：他人のコンピュータやスマートフォンにマルウェアを感染させる等の方法により、所有者に無断でそのデバイスのリソースを使って暗号資産のマイニング処理を行う攻撃は、一般に、クリプトジャッキングといわれる。
    C：コンピュータプログラムのセキュリティ上の脆弱性が公表される前、又は脆弱性情報は公表されたがセキュリティパッチがまだ提供されていない状態において、その脆弱性を狙って行われる攻撃は、一般に、ゼロデイ攻撃といわれる。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCが正しい。Aが誤り：悪意のあるSQL文を埋め込む攻撃は「SQLインジェクション」。「クロスサイトスクリプティング（XSS）」は悪意のあるスクリプトをWebページに埋め込む攻撃。
- id: r7_1_setubi_q09_g
  number: 9-(キ)
  group: 問9
  points: 3
  text: |-
    セキュリティプロトコルなどについて述べた次のA〜Cの文章は正しいか。
    A：SSHは、リモートシェル、リモートログインなどのr系コマンドを暗号化機能と認証機能によりセキュアにするプロトコルであり、クライアント認証にパスワードは使用できない。
    B：S/MIMEは、公開鍵の安全性を保証する方法として公開鍵所有者の代表者が設置した公開鍵サーバに公開鍵を登録することにより、不特定多数の通信対象者への信頼性を確保している。
    C：PGPでは、メッセージ本文の暗号化、鍵管理及びデジタル署名に公開鍵暗号技術を用いている。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 8
  explanation: |-
    Cのみ正しい。Aが誤り：SSHはパスワード認証も使用できる（公開鍵認証に加えて）。Bが誤り：S/MIMEは認証局（CA）によるデジタル証明書で公開鍵の信頼性を確保する（公開鍵サーバではない）。
- id: r7_1_setubi_q09_h
  number: 9-(ク)
  group: 問9
  points: 3
  text: 利用者認証について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    利用者認証は、一般に、利用者だけが知り得る知識による認証、利用者の身体的特徴による認証、及び利用者だけが所持する物による認証の三つの方式に分類でき、これらは単独で又は複数を組み合わせて用いられる。
  - |-
    ネットワークを介した利用者認証プロセスで用いられるチャレンジレスポンス認証方式では、固定パスワードをネットワークにそのまま流さないようにしているため、パスワードが盗聴されるリスクを低減することができる。
  - |-
    最初にパスワードによる認証を行い、これに成功すると次に秘密の質問の答えによる認証を行うというように、利用者だけが知り得る知識による認証を2回続けて行う手法は、一般に、二要素認証といわれる。
  - |-
    生体認証は、利用者の指紋、虹彩、静脈パターンなどを用いて本人確認するため、知識や物による認証とは異なり、忘却、紛失などの心配はないが、一般に、他人受入率（FAR）を低く抑えようとすると本人拒否率（FRR）が高くなり、両方の値を0にすることはできない。
  answer: 3
  explanation: |-
    ③が誤り。パスワードと秘密の質問は、どちらも「知識による認証」であるため同一の認証要素であり「多要素認証」とは呼ばない。二要素認証は「知識」「所持」「生体」の異なる要素を2つ組み合わせる手法。
