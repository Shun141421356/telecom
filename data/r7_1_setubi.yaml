- id: r7_1_setubi_q07_e
  number: 7-(オ)
  group: 問7
  points: 3
  text: |-
    JIS Q 9000:2015品質マネジメントシステムの用語及び定義について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    品質計画とは、品質目標を設定すること及び必要な運用プロセスを規定すること、並びにその品質目標を達成するための関連する資源に焦点を合わせた品質マネジメントの一部をいう。
  - |-
    品質保証とは、品質要求事項を満たす能力を高めることに焦点を合わせた品質マネジメントの一部をいう。
  - |-
    要求事項とは、明示されている、通常暗黙のうちに了解されている又は義務として要求されている、ニーズ又は期待をいう。
  - |-
    プロジェクトマネジメントとは、プロジェクトの目標を達成するために、プロジェクトの全側面を計画し、組織し、監視し、管理し、報告すること、及びプロジェクトに参画する人々全員への動機付けを行うことをいう。
  answer: 2
  explanation: |-
    ②が誤り。「品質要求事項を満たす能力を高めることに焦点を合わせた品質マネジメントの一部」は「品質改善」の定義。「品質保証」は「品質要求事項が満たされるという確信を与えることに焦点を合わせた」部分。
- id: r7_1_setubi_q07_f
  number: 7-(カ)
  group: 問7
  points: 3
  text: |-
    工程管理で用いられるアローダイアグラムの特徴などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    作業相互間の関係を示すダミー作業は破線の矢線で表示され、所要日数が0であるため、クリティカルパスを決定する際に考慮する必要はない。
  - |-
    最早結合点時刻とは、スタートの結合点から対象となる結合点に至る経路のうち、時間的に最も短い経路を通って最も早く到達する結合点の時刻のことをいう。
  - |-
    最遅結合点時刻とは、対象となる結合点から終了結合点に至る経路のうち、時間的に最も長い経路を通ってプロジェクトの終了時刻に間に合う最も遅い開始時刻のことをいう。
  - |-
    作業の余裕時間としてこれ以上使ってしまうと工期が延びてしまうような最大限の余裕時間はトータルフロートといわれ、どの作業においてもトータルフロートはフリーフロートより小さいか同じとなる。
  answer: 3
  explanation: |-
    ③が正しい。最遅結合点時刻の定義として正確。①ダミー作業はクリティカルパス決定に考慮する必要がある。②最早は「最も長い経路」（最短ではなく）。④トータルフロート≧フリーフロートが常に成立する（逆ではない）。
- id: r7_1_setubi_q07_g
  number: 7-(キ)
  group: 問7
  points: 3
  text: |-
    予防保全の概要、種類などについて述べた次のA〜Cの文章は正しいか。
    A：設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は予防保全といわれ、予防保全を行わないと大きな休止損失を招いたり品質と安全性の面で問題を生じたりすることがある。
    B：あらかじめ設定した時間計画に従って実行される予防保全は時間計画保全といわれ、予定の時間間隔で実施する定期保全及び保全対象設備が予定の累積動作時間に達したときに行う経時保全に分類される。
    C：設備の故障の兆候を監視して必要なときに措置を行う状態監視保全は、予防保全の一形態であり、統計的・数理的に故障が予測できない場合に有効である。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 7
  explanation: A・B・Cいずれも正しい（JIS Z 8141 保全の分類）。
- id: r7_1_setubi_q07_h
  number: 7-(ク)
  group: 問7
  points: 3
  text: |-
    内閣府の事業継続ガイドライン（令和5年3月）におけるBCMの概要などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    BCMは、BCP策定や維持・更新、事業継続を実現するための予算・資源の確保、事前対策の実施、教育・訓練の実施、点検、継続的な改善などを行う平常時からのマネジメント活動とされている。
  - |-
    企業・組織は、様々な危機的な発生事象に直面しても、利害関係者から重要な事業の継続又は早期の復旧を望まれているため、このような利害関係者のニーズと期待を十分に認識し、BCMを積極的に経営戦略に反映すべきである。
  - |-
    BCMは、企業・組織全体のマネジメントとして継続的・体系的に取り組むことが重要である。その手法として、PDCAサイクルなどのマネジメントに関する仕組みの活用も有効である。
  - |-
    BCMは、どのような危機的な事象が発生しても重要業務を継続するという目的で実施するものであることを考慮することが重要である。この点から、BCMでは原因事象（例えば直下型地震）ではなく、結果事象（例えば自社の〇〇拠点が使用不能）により考え、対応策を検討することが推奨される。
  answer: 4
  explanation: |-
    ④が誤り。BCMガイドラインでは「原因事象」ではなく「結果事象」により考えることが推奨されている（④の前後が逆になっている）。
- id: r7_1_setubi_q07_i
  number: 7-(ケ)
  group: 問7
  points: 3
  text: |-
    信頼度0.7である装置Aがn台並列接続されている1/n冗長システムにおいて、システム全体の信頼度を0.9999以上にするためには、装置Aの台数nを少なくとも何台以上とする必要があるか。（log₁₀3＝0.477を用いる）
  options:
  - '5'
  - '6'
  - '8'
  - '10'
  - '20'
  - '26'
  answer: 3
  explanation: |-
    不信頼度(1-0.7)=0.3のn乗≦0.0001。0.3ⁿ≦10⁻⁴。n×log0.3≦-4。log0.3=log(3/10)=0.477-1=-0.523。n≦4/0.523≒7.65。n≧8。
- id: r7_1_setubi_q07_j
  number: 7-(コ)
  group: 問7
  points: 3
  text: |-
    アベイラビリティが99.5%、MTTRが4時間のシステムについて、調査した期間内の故障率（件/時間）はどれか。（四捨五入して有効数字3桁）
  options:
  - 1.26×10⁻³
  - 4.15×10⁻³
  - 2.01×10⁻²
  - 2.49×10⁻¹
  - 2.51×10⁻¹
  - 7.49×10⁻¹
  answer: 1
  explanation: |-
    A=MTBF/(MTBF+MTTR)=0.995。MTBF=0.995×MTTR/0.005=0.995×4/0.005=796時間。故障率λ=1/MTBF=1/796≒1.26×10⁻³件/時間。
