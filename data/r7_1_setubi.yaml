- id: r7_1_setubi_q05_d
  number: 5-(エ)
  group: 問5
  points: 3
  text: |-
    データベースのトランザクション処理について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    複数のユーザが同時にデータベースのデータを変更する場合、あるユーザによる変更が他のユーザによる変更に悪影響を与えないようにするための制御機構は、一般に、同時実行制御といわれる。
  - |-
    トランザクション処理において必要とされるACID特性のうち、Cは一貫性、Dは耐久性を表している。
  - |-
    トランザクション障害発生時には、一般に、データベースの更新が一部行われた場合でも、更新前ログを用いてロールバックが行われる。
  - |-
    複数のトランザクションが複数のデータ資源を交互に処理する場合、互いに相手のデータ資源の解放を永久に待ち続ける状態は、一般に、サスペンドといわれる。
  answer: 4
  explanation: |-
    ④が誤り。互いにデータ資源の解放を永久に待ち続ける状態はデッドロック（Deadlock）といわれる。サスペンドはプロセスを一時停止する操作。
- id: r7_1_setubi_q05_e
  number: 5-(オ)
  group: 問5
  points: 3
  text: |-
    情報システムにおける事業継続の指標について述べた次のA〜Cの文章は正しいか。
    A：情報システムが障害などで停止したときに、あらかじめ決められた一定のレベルに復旧するまでの目標時間はRTO（Recovery Time Objective）といわれ、RTOが短いほど対策コストは高くなる。
    B：情報システムが障害などで停止したときに、一定の時間内にどのレベルまで復旧を目指すかの目標水準はRLO（Recovery Level Objective）といわれ、RLOが高いほど対策コストは高くなる。
    C：障害で失われたデータをバックアップから復元するときに、過去のどの時点まで遡ることを許容するかの目標値はRPO（Recovery Point Objective）といわれ、RPOが大きいほど頻繁にバックアップする必要があるためコストは高くなる。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 4
  explanation: |-
    AとBが正しい。Cが誤り：RPOが大きい（許容期間が長い）ほどバックアップ頻度は少なくてよく、コストは低くなる（逆）。
- id: r7_1_setubi_q05_f
