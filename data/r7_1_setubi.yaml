- id: r7_1_setubi_q01_d
  number: 1-(エ)
  group: 問1
  points: 3
  text: 光ファイバの種類と特徴について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    SM光ファイバでは、伝送帯域を制限する主な要因となる波長分散の値が波長により異なり、1.65μm付近でゼロになる。
  - |-
    SM光ファイバでは、光ファイバのコア形状に僅かなゆがみがあると偏波モード分散（PMD）が生じ、高速かつ長距離伝送の場合にはPMDが伝送品質に影響を及ぼすことがある。
  - |-
    ノンゼロ分散シフト光ファイバは、屈折率分布を調整して分散シフト光ファイバのゼロ分散波長をずらすことでファラデー効果を抑制している。
  - |-
    MM光ファイバには、コアとクラッドとの間で屈折率が階段状に変化するGI型とコアの屈折率分布が緩やかに変化するSI型がある。
  answer: 2
  explanation: |-
    ②が正しい。PMDはコア形状のゆがみにより生じ高速・長距離伝送で問題になる。①SM光ファイバのゼロ分散波長は1.31μm付近（1.65μmではない）。③ファラデー効果でなく四光波混合（FWM）抑制。④GIとSIが逆（GIは緩やか、SIは階段状）。
- id: r7_1_setubi_q01_e
  number: 1-(オ)
  group: 問1
  points: 3
  text: |-
    光ファイバ伝送路及び光伝送装置において発生する雑音などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    受光素子に到来する光子数がランダムに揺らぐことに起因する雑音はショット雑音といわれ、雑音電力は光信号電力に反比例する。
  - |-
    光ファイバ増幅器により増幅された光信号に重畳される広帯域な雑音には、内部で生ずる自然放出光の一部が誘導放出により増幅されたASE雑音がある。
  - |-
    受信回路中の抵抗素子などを構成する金属が持つ伝導電子が原子などと衝突を起こして熱運動を行うことで発生する雑音は、一般に、熱雑音といわれる。
  - |-
    光ファイバ増幅器内部で生ずる自然放出光と信号光とによって生ずるビート雑音は、出力側においてSN比を低下させる要因となる。
  answer: 1
  explanation: ①が誤り。ショット雑音の雑音電力は光信号電力に「比例」する（反比例ではない）。
- id: r7_1_setubi_q01_f
  number: 1-(カ)
  group: 問1
  points: 3
  text: |-
    10Gbit/sの通信速度を実現するPONシステムの種類と特徴について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    10Gbit/sの通信速度を実現するPONシステムの規格には、IEEEで標準化された10G-EPON、ITU-Tで標準化されたXG-PON及びXGS-PONがある。
  - |-
    10G-EPONでは、OLTからの下り方向通信はWDM技術が用いられ、上り方向通信はOFDMA技術が用いられており、通信速度の異なるGE-PONとの同一光ファイバにおける混在収容が可能である。
  - |-
    XG-PONでは、上り下りともにG-PONとは異なる波長を用いており、WDM技術によりG-PONとの同一光ファイバにおける混在収容が可能である。
  - |-
    XGS-PONでは、OLTに上り2.5Gbit/sと10Gbit/sの二つの通信速度が異なる信号を受信可能とするデュアルレートバースト光受信器を搭載することで、同一光スプリッタ配下におけるXG-PON用のONUとの混在収容が可能である。
  answer: 2
  explanation: |-
    ②が誤り。10G-EPONの上り方向はOFDMAではなくTDMA（時分割多元接続）技術が用いられている。OFDMAはLTEなどの無線通信で使用される方式。
