    A：ディーゼル機関には水冷式と空冷式があるが、ガスタービン機関は専ら空冷式であり、運転に冷却水を必要としない。
    B：電気始動方式のディーゼル機関では、48Vの通信システム用蓄電池をディーゼル機関始動用蓄電池として共用している。
    C：ガスタービン機関は、ディーゼル機関と比較して、一般に、運転時の振動が小さく、建物の屋上や高層階にも設置が可能である。
  options:
