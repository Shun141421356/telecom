- id: r7_1_setubi_q08_e
  number: 8-(オ)
  group: 問8
  points: 3
  text: |-
    ソフトウェア開発のモデルなどについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    簡単な試作ソフトウェアにより、ユーザの評価と改善を繰り返しながらユーザ要求を明確にしていく進め方は、プロトタイピングモデルにおける要求定義の特徴である。
  - |-
    ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用できる。
  - |-
    スパイラルモデルでは、システム全体を一括で作るのではなく、分割された小さい単位で一連の開発プロセスを繰り返し、開発範囲や機能を拡張しながら開発を進めていく。
  - |-
    計画に従うことよりも変化への対応を重視し、新しい機能を短期間で継続的にリリースしていくソフトウェア開発の進め方は、アドオン開発の特徴であり、その開発手法にはスクラム、エクストリームプログラミングなどがある。
  answer: 4
  explanation: |-
    ④が誤り。変化への対応を重視し継続的にリリースしていく手法は「アジャイル開発」であり「アドオン開発」ではない。スクラムやXP（エクストリームプログラミング）はアジャイル開発手法の代表例。
- id: r7_1_setubi_q08_f
  number: 8-(カ)
  group: 問8
  points: 3
  text: |-
    JIS X 0161:2008ソフトウェア保守の種類について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    緊急保守とは、予防保守実施までシステム運用を確保するための、計画外で一時的な修正をいう。
  - 改良保守とは、新しい要求を満たすための既存のソフトウェア製品への修正をいう。
  - |-
    適応保守とは、引渡し後、変化した又は変化している環境において、ソフトウェア製品を使用できるように保ち続けるために実施するソフトウェア製品の修正をいう。
  - |-
    是正保守とは、ソフトウェア製品の引渡し後に発見された問題を訂正するために行う受身の修正をいう。
  answer: 1
  explanation: |-
    ①が誤り。緊急保守（Emergency maintenance）の正しい定義は「システムが使用できない状態、又は使用を継続すると危険な状態を回避するため、計画外で行われる是正保守」。「予防保守実施まで」という限定はない。
