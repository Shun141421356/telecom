  points: 3
  text: 職場における安全活動などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    5S活動の5Sは、整理・整頓・清掃・清潔・躾のそれぞれのローマ字表記の頭文字をとったものであり、このうち整理とは、必要なものと不必要なものを区分し、不必要なものを捨てることとされている。
  - |-
    QCサークル活動では、計画(PLAN)→実施(DO)→評価(CHECK)→改善(ACT)のPDCAサイクルを回すことによって職場の管理・改善が継続的に行われる。
  - |-
    ヒヤリハット活動は、労働災害における経験則の一つであるハインリッヒの法則などに基づいており、重大な事故の発生を未然に防止するための有効な活動とされている。
  - |-
    ハインリッヒの法則は、1：29：300の法則ともいわれ、1件の重い災害があったとすると、29件の無傷害事故、300件の不安全行動や不安全状態があることを指摘している。
  answer: 4
  explanation: |-
