  - |-
    著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約といわれ、クリックオン契約では購入者がソフトウェアをインストールした行為をもって使用許諾契約に同意したとみなされる。
  - |-
    企業・教育機関などの組織が同じソフトウェアを一括で購入して当該組織内の複数のユーザや複数のコンピュータで利用できるようにするライセンス形態は、一般に、サイトライセンスといわれる。
  - |-
