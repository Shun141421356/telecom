  text: |-
    クラウドサービスの提供形態・利用形態などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    IaaSでは、一般に、クラウド事業者がアプリケーションの実行環境を構成するサーバのハードウェア、OS、ミドルウェアなどのプラットフォームをクラウドサービスとして利用者に提供している。
  - |-
    SaaSでは、一般に、クラウド事業者がアプリケーションやデータベースをクラウドサービスとして利用者に提供している。
  - |-
    企業の情報システムなどにおいて、複数のクラウド事業者が提供するパブリッククラウドを組み合わせて利用する形態は、一般に、マルチクラウドといわれる。
  - |-
    クラウドサービスにおいて、システム、ソフトウェアなどを複数の利用者で共有できるような設計や構造は、一般に、マルチテナントといわれる。
  answer: 1
  explanation: |-
    ①が誤り。IaaSはハードウェアや仮想マシンを提供するもので、OS・ミドルウェアのプラットフォームを含むのはPaaS（Platform as a Service）の説明。
- id: r7_2_setubi_q06_a
  number: 6-(ア)
  group: 問6
  points: 2
  text: |-
    IPネットワークのルーティングプロトコルについて、AS内部の経路制御を行う際に利用されるプロトコルを（ア）という。（ア）に入るものはどれか。
  options:
  - IGMP
  - コスト値
  - ポート番号
  - Helloパケット
  - RSVP
  - ホップ数
  - パス属性
  - MTUサイズ
  - IMAP
  - IGP
  - 遅延時間
  - MACアドレス
  answer: 10
  explanation: |-
    IGP（Interior Gateway Protocol）：AS（自律システム）内部の経路制御プロトコル。OSPFやRIPなどが該当。EGP（BGPなど）はAS間の経路制御に使用。
- id: r7_2_setubi_q06_b
  number: 6-(イ)
  group: 問6
  points: 2
  text: |-
    BGPを実行するルータ（BGPスピーカ）が交換する経路情報として、通過してきたASの番号などの（イ）といわれる情報に入るものはどれか。
  options:
  - IGMP
  - コスト値
  - ポート番号
  - Helloパケット
  - RSVP
  - ホップ数
  - パス属性
  - MTUサイズ
  - IMAP
  - IGP
  - 遅延時間
  - MACアドレス
  answer: 7
  explanation: |-
    BGPではパス属性（AS_PATHなど）を用いてAS間の経路情報を交換する。AS_PATHには通過したASの番号が含まれ、最短のAS数の経路が選択される。
- id: r7_2_setubi_q06_c
  number: 6-(ウ)
  group: 問6
  points: 2
  text: |-
    OSPFの経路選択に用いる指標であるメトリックとしては、（ウ）を用いている。（ウ）に入るものはどれか。
  options:
  - IGMP
  - コスト値
  - ポート番号
  - Helloパケット
  - RSVP
  - ホップ数
  - パス属性
  - MTUサイズ
  - IMAP
  - IGP
  - 遅延時間
  - MACアドレス
  answer: 2
  explanation: |-
    OSPFのメトリックはコスト値（帯域幅の逆数で算出）。RIPのメトリックはホップ数。コスト値が最小の経路が最適経路として選択される。
- id: r7_2_setubi_q06_d
  number: 6-(エ)
  group: 問6
  points: 3
  text: |-
    IPv6について述べた次のA～Cの文章は正しいか。
    A：IPv6のアドレスサイズは128 bitであり、アドレス表記は16 bitずつ8個のブロックに分けて各ブロックを16進数で表し、ブロック間をドット記号で区切る。
    B：IPv6パケットの基本ヘッダのヘッダ長は64オクテットに固定されており、拡張ヘッダは必要に応じてペイロード部の先頭に配置される。
    C：インターネットにおいてIPv6とIPv4の共存を可能とするための方法の一つとして、IPv6パケットをIPv4パケットのペイロードとしてカプセル化して転送するデュアルスタックが用いられている。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 8
  explanation: |-
    A～Cすべて誤り。A：ブロック間の区切りはコロン（:）ではなくドット。B：基本ヘッダは40オクテット固定（64ではない）。C：IPv6-in-IPv4カプセル化はトンネリングであり、デュアルスタックとは異なる（デュアルスタックはIPv4とIPv6を同時サポートする方式）。
- id: r7_2_setubi_q06_e
  number: 6-(オ)
  group: 問6
  points: 3
  text: RTP/RTCPについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    RTPはリアルタイムデータを送信するためのプロトコルであり、ユニキャストセッション及びマルチキャストセッションで用いられる。
  - |-
    RTPでは、セッション内で送信元が独自に設定するSSRC識別子を用いてリアルタイム通信の送信元を識別する。
  - |-
    RTPでは、送信側でタイムスタンプ、シーケンス番号、ペイロードタイプなどをRTPヘッダ情報として送出し、受信側でそれらを参照することにより、タイミング情報の抽出、パケット損失の検出などを行う。
  - |-
    RTCPのセッション制御機能によって、データ転送におけるパケット損失などの品質低下を検知した場合、RTCPはRTPパケットの送受信を終了させる。
  answer: 4
  explanation: |-
    ④が誤り。RTCPはRTPの品質情報を制御するためのプロトコルだが、品質低下を検知してもRTPパケットの送受信を自動終了させる機能はない（セッションの終了制御はアプリケーション層が担う）。
- id: r7_2_setubi_q06_f
  number: 6-(カ)
  group: 問6
  points: 3
  text: |-
    TCPにおける通信制御の特徴について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    TCPは、コネクションを確立した通信相手への送信データにパケット損失が発生した場合、データを再送する再送制御の機能を有している。
  - |-
    TCPによる通信の開始時には、ネットワーク輻輳制御の一つであるスロースタートといわれるアルゴリズムに従って、送信するデータ量の制御が行われる。
  - |-
    送信ホストは、送信したセグメントに対する確認応答を待たずに複数のセグメントを送信する順序制御によりスループットの向上を図っている。
  - |-
    TCPは、受信側のバッファの空き状況に応じて受信可能なデータのサイズを受信側から送信側に対して通知することにより、送信するデータ量を調整するフロー制御の機能を有している。
  answer: 3
  explanation: |-
    ③が誤り。確認応答を待たずに複数セグメントを送信する機能はウィンドウ制御（フロー制御）であり、「順序制御」ではない。順序制御はパケットの受信順序を保証する機能。
- id: r7_2_setubi_q07_a
  number: 7-(ア)
  group: 問7
  points: 2
  text: |-
    アローダイアグラムにおいてクリティカルパス上の作業のうち、費用勾配が最も小さい作業の作業日数を短縮可能な日数分短縮した場合、その短縮費用はいくらか。（クリティカルパス：1→2→4→5→6→7、作業A(2日、5万円)、作業B(1日、10万円)、作業C(3日、30万円)、作業D(4日、60万円)、作業E(3日、60万円)、作業F(3日、15万円)、作業G(2日、40万円)）
  options:
  - 5万円
  - 50万円
  - 28日
  - A
  - 10万円
  - 55万円
  - 29日
  - B
  - 15万円
  - 60万円
  - 30日
  - C
  - 20万円
  - 65万円
  - 31日
  - D
  answer: 5
  explanation: |-
    クリティカルパス上の作業の費用勾配：A=5/2=2.5万円/日、C=30/3=10万円/日、F=15/3=5万円/日。最小はA（2.5万円/日）。Aを2日短縮すると費用は2日×2.5万円=5万円。よって10万円。
- id: r7_2_setubi_q07_b
  number: 7-(イ)
  group: 問7
  points: 2
  text: |-
    アローダイアグラムにおいて、次にクリティカルパス上で短縮可能な作業のうち、費用勾配が最も小さい作業はどれか。
  options:
  - 5万円
