- id: r7_2_setubi_q02_b
  number: 2-(イ)
  group: 問2
  points: 2
  text: |-
    LTE-Advancedにおいて、従来のマクロセル内にセル半径の小さいスモールセル基地局を配置する（イ）ネットワークに入るものはどれか。
