- id: r7_2_setubi_q05_d
  number: 5-(エ)
  group: 問5
  points: 3
  text: CPUにおけるプロセス制御などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    並行して動作しているプロセス間で排他制御や同期処理を行うための仕組みの一つに、セマフォがある。
  - |-
    活動中のプロセスが、新しいプロセスを作る場合、新しいプロセスは親プロセスといわれる。
  - |-
    プログラムがあるタスクから呼び出されて実行中であっても、別のタスクから呼び出して実行させ、どちらの処理も正常に終了させることができるプログラムの持つ性質は、一般に、リカーシブといわれる。
  - |-
    システムの過負荷状態などにより休止としたプロセスに割り当てていた主記憶領域の内容を2次記憶へ退避させて主記憶領域を解放する動作は、一般に、スワップインといわれる。
  answer: 1
  explanation: |-
    ①が正しい。セマフォはプロセス間の排他制御・同期に使用される。②新しいプロセスは子プロセス。③は再入可能（リエントラント）性。④はスワップアウト（スワップインはその逆）。
- id: r7_2_setubi_q05_e
  number: 5-(オ)
  group: 問5
  points: 3
  text: SQLについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    SQLは、C言語などのプログラミング言語が手続き型言語といわれるのに対して、基本的に一つの命令で操作が完結することから非手続き型言語といわれる。
  - |-
    SQLを用いて実現できる機能には、リレーショナルデータベース（RDB）の表などを定義する機能、機密保護の機能などがある。
  - |-
    RDBの表は順序付けられていない行の集合体であり、SQLにより行を表に追加・削除することができる。
  - |-
    SQLの予約語は、一般に、変数名、プログラム名、表の名前などに使用することが禁止されている半角及び全角の文字列である。
  answer: 4
  explanation: |-
    ④が誤り。SQLの予約語は「半角」の文字列のみ（全角は含まない）。また予約語を変数名等に使用することは禁止されているが、全角・半角の区別については「半角」が正しい。
- id: r7_2_setubi_q05_f
  number: 5-(カ)
  group: 問5
