- id: r7_2_setubi_q02_d
  number: 2-(エ)
  group: 問2
  points: 3
  text: |-
    VoIPシステムに用いられるSIP技術について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    SIPは、伝送制御プロトコルの一つであり、端末相互のメッセージの交換や通話の接続・切断などの手順を定めている。
  - |-
    SIPにおいて、プロトコル上で使用されるメッセージには、バイナリベースの表現形式が用いられている。
  - |-
    SIPサーバの構成要素であるレジストラは、一般に、UACからの登録・更新などのリクエストを受け付ける機能を有しており、受け付ける際にはUACを認証する。
  - |-
    IPネットワーク上のUACの位置情報は、一般に、レジストラで保持され、レジストラは問合せに応じてロケーションサーバなどへ位置情報を提供する。
  answer: 3
  explanation: |-
    ③が正しい。レジストラはUACのアドレス登録を管理しUACを認証する。①SIPはシグナリングプロトコル（伝送制御ではない）。②SIPはテキストベース。④位置情報はロケーションサーバが保持し、プロキシが問い合わせる。
- id: r7_2_setubi_q02_e
  number: 2-(オ)
  group: 問2
  points: 3
  text: |-
    IP電話などで用いられる音声符号化方式について述べた次のA～Cの文章は正しいか。
    A：CS-ACELP方式では、コードブックに登録された標準的な音声の波形パターンを示す番号と音声信号の特徴的な音響特性データを送信し、受信側でこれらの情報から元の音声波形を予測して音声を生成している。
    B：ADPCM方式は、過去の入力信号から現在の入力信号を予測し、実際の入力信号との差分を符号化して伝送する方式であり、ビットレートはPCM方式の2倍以上となる。
    C：ITU-T勧告で規定されたデュアルレートの音声コーデックで用いるACELP方式及びMP-MLQ方式のそれぞれのビットレートは、CS-ACELP方式のビットレートと比較して低い。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：ADPCMのビットレートはPCMの1/2以下（約32kbps対64kbps）となり、PCMより低い。
- id: r7_2_setubi_q02_f
  number: 2-(カ)
  group: 問2
  points: 3
  text: ランダム呼の生起条件などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - ランダム呼の条件を満たす呼が生起する確率は、二項分布に従う。
  - |-
    加えられた呼がランダム呼であっても、そのあふれ呼は、ランダム呼とは違った性質を示す。
  - |-
    平滑呼の前提条件は、入線数を有限としているところがランダム呼と異なるだけであり、平滑呼は準ランダム呼ともいわれる。
  - |-
    生起呼量は加えられた呼量ともいわれ、平均保留時間の間に全ての入線に生起する平均呼数で表される。
  answer: 1
  explanation: |-
    ①が誤り。ランダム呼が生起する確率はポアソン分布に従う（無限の発信源を仮定）。二項分布は有限の発信源（平滑呼）の場合。
- id: r7_2_setubi_q03_a
  number: 3-(ア)
  group: 問3
  points: 2
  text: |-
    アンテナの利得について、あらゆる方向に均一の強さの電磁界を放射する仮想的な等方性アンテナを基準としたアンテナの利得は（ア）といわれる。（ア）に入るものはどれか。
  options:
  - '1'
  - '3'
  - '6'
  - '10'
  - C/N
  - S/N
  - FB比
  - FS比
  - 放射効率
  - 絶対利得
  - 相対利得
  - 利得係数
  answer: 10
  explanation: |-
    等方性アンテナ（アイソトロピックアンテナ）を基準とした利得を絶対利得（dBi単位）という。半波長ダイポールアンテナを基準とする場合は相対利得（dBd単位）。
- id: r7_2_setubi_q03_b
  number: 3-(イ)
  group: 問3
  points: 2
  text: |-
    アンテナのビーム幅について、一般に、最大指向性を持つメインローブのピークである中心から（イ）dB低下したところの角度幅が放射特性の指標として用いられる。（イ）に入る数値はどれか。
  options:
  - '1'
  - '3'
  - '6'
  - '10'
  - C/N
  - S/N
  - FB比
  - FS比
  - 放射効率
  - 絶対利得
  - 相対利得
  - 利得係数
  answer: 2
  explanation: |-
    アンテナのビーム幅（半値角）は、最大放射方向から3dB低下（電力が半分）した点の角度幅で定義される。半値幅（HPBW：Half Power Beam Width）ともいう。
- id: r7_2_setubi_q03_c
  number: 3-(ウ)
  group: 問3
  points: 2
  text: |-
    メインローブの放射電界とメインローブの中心の逆方向から±60度の範囲にある最大放射電界との比は（ウ）といわれる。（ウ）に入るものはどれか。
  options:
  - '1'
  - '3'
  - '6'
  - '10'
  - C/N
  - S/N
  - FB比
  - FS比
  - 放射効率
  - 絶対利得
  - 相対利得
  - 利得係数
  answer: 7
  explanation: |-
    FB比（Front-to-Back ratio：前後比）は、メインビーム方向と後方方向の利得の比。ただし問題文の「±60度の範囲」はFS比（Front-to-Sidelobe ratio）に相当する場合もあるが、正答はFS比（⑧）。
- id: r7_2_setubi_q03_d
  number: 3-(エ)
  group: 問3
  points: 3
  text: |-
    デジタル無線伝送に用いられる変調方式の種類・特徴について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    FSKでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波の振幅は一定である。
  - |-
    PSKでは変調信号により搬送波の位相を変化させており、信号点を45度ごとに配置するものとしてQPSKやπ/4シフトQPSKがある。
  - |-
    ASKでは変調信号により搬送波の振幅を変化させており、オンオフキーイング（OOK）は4値ASKの一例である。
  - |-
    スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域の信号を直接乗積する手法は、一般に、周波数ホッピング（FH）といわれる。
  answer: 1
  explanation: |-
    ①が正しい。FSKは周波数変調で振幅は一定。②QPSKは90度間隔（45度ではない）、π/4QPSKは45度オフセット。③OOKは2値ASKの一例（4値ではない）。④直接拡散はDS（Direct Sequence）方式。
- id: r7_2_setubi_q03_e
  number: 3-(オ)
  group: 問3
  points: 3
  text: |-
    低軌道の非静止衛星による衛星通信について述べた次のA～Cの文章は正しいか。
    A：低軌道の非静止衛星を用いることにより、静止衛星を用いた場合と比較して、アンテナの小型化、通信速度の向上及び遅延時間の短縮が期待できる。
    B：低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、3機の非静止衛星を用いる必要がある。
    C：赤道上高度約36,000kmに位置する静止衛星は、一般に、極地域を除く通信が可能であるが、低軌道の非静止衛星は極地域の通信も可能である。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：低軌道衛星で連続通信サービスを提供するには一般に多数（数十機以上）の衛星が必要（3機では全球をカバーできない）。
- id: r7_2_setubi_q03_f
  number: 3-(カ)
  group: 問3
  points: 3
  text: |-
    移動通信で用いられる無線回線制御方式などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    複数の移動端末が共通に利用できる無線チャネルを幾つも用意しておき、呼が発生するたびに各移動端末に特定の無線チャネルを割り当てる方式は、一般に、デマンドアサイン方式といわれる。
  - |-
    セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。
  - |-
    セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動するときにセルを切替制御する技術は、一般に、ハンドオーバといわれる。
  - |-
    複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生する場合がある。この信号の衝突をできるだけ回避して無線チャネルを設定する技術としてランダムアクセス制御がある。
  answer: 2
  explanation: |-
    ②が誤り。「一つのセルは複数の位置登録エリアで構成される」が逆。正しくは「一つの位置登録エリアは複数のセルで構成される」。
- id: r7_2_setubi_q04_a
  number: 4-(ア)
  group: 問4
  points: 2
  text: |-
    受電設備の電圧区分について、交流の場合600Vを超え（ア）V以下の電圧が高圧に区分される。（ア）に入る数値はどれか。
  options:
  - 6,000
  - 6,600
  - 7,000
  - 7,500
  - UGS
  - LBS
  - PAS
  - VCB
  - 進相コンデンサ
  - デマンド制御装置
  - パワーコンディショナ
  - スイッチングレギュレータ
  answer: 3
  explanation: |-
