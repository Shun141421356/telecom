- id: r7_2_setubi_q04_d
  number: 4-(エ)
  group: 問4
  points: 3
  text: 二次電池の種類・特徴などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    シール鉛蓄電池は、蓄電池内部で発生する酸素ガスを負極で電気化学的に反応させて元の水に戻す機能により完全密閉化が可能で、補水及び比重測定の定期作業が不要である。
  - |-
    ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較してエネルギー密度が高く、放電時の電圧変動が小さい。
  - |-
    リチウムイオン電池は、負極にリチウムイオンを吸蔵した炭素材料を用いており、ニッケル水素電池と比較してエネルギー密度は高いが、作動電圧は低い。
  - |-
    ナトリウム硫黄電池は、固体電解質であるベータアルミナを用いて300℃程度の高温で動作しており、電力負荷の平準化や再生可能エネルギーの安定化に利用されている。
  answer: 3
  explanation: |-
    ③が誤り。リチウムイオン電池の作動電圧（約3.6V）はニッケル水素電池（約1.2V）より高い（低くはない）。
- id: r7_2_setubi_q04_e
  number: 4-(オ)
  group: 問4
  points: 3
  text: |-
    コージェネレーションシステム（CGS）について述べた次のA～Cの文章は正しいか。
    A：CGSは、原動機と発電機、排熱回収装置、排熱利用機器などで構成され、一つのエネルギー資源から電力及び有効な熱を同時に発生させ利用することにより、エネルギーの利用効率を高めている。
    B：CGSの運転形態には熱主電従運転方式と電主熱従運転方式があり、熱需要に応じて運転する電主熱従方式と電力需要に応じて運転する熱主電従方式がある。
    C：系統連系方式では、発電設備の検査・補修又は事故の際に生ずる不足電力を補塡するため、電力需給契約に加えて自家発補給電力契約の締結が必要となる。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 5
  explanation: |-
    AとCが正しい。Bが誤り：設問の「熱主電従」と「電主熱従」の説明が逆になっている（熱主電従は熱需要に応じて運転し不足電力を補う、電主熱従は電力需要に応じて運転）。
- id: r7_2_setubi_q04_f
  number: 4-(カ)
  group: 問4
  points: 3
  text: |-
    通信ビルにおける災害対策用に配備される移動電源車などについて述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    自然災害などによる商用電源の長時間又は広域での停電に対しては、移動電源車や可搬型ディーゼルエンジン発電装置を地域ごとに配備する対策が採られている。
  - |-
    予備エネルギー源が蓄電池のみである小規模通信設備に対しては、蓄電池の保持時間を超える長時間停電に対処するため、可搬型蓄電池を地域ごとに配備する対策が採られている。
  - |-
    地震や浸水による受配電装置の被災に対しては、整流装置などの電力変換装置や蓄電池を実装して電力を通信設備に直接供給できる可搬型電源装置を配備する対策が採られている。
  - |-
    移動電源車や可搬型ディーゼルエンジン発電装置は、通信ビルに設置されているエンジン発電装置や受配電装置のメンテナンス時にもバックアップ電源として利用されている。
  answer: 2
  explanation: |-
    ②が誤り。蓄電池のみの小規模通信設備への対策として「可搬型蓄電池」ではなく「可搬型発電機（ディーゼルエンジン等）」を配備するのが一般的。
