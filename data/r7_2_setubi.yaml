  options:
  - |-
    情報セキュリティ方針及びトピック固有の方針は、管理層が承認し発行し、関連する要員及び利害関係者に伝達し、認識させ、あらかじめ定めた間隔で及び重大な変化が発生した場合にレビューしなければならない。
  - |-
    管理層は、組織の確立された情報セキュリティ方針、トピック固有の方針及び手順に従った情報セキュリティの適用を、全ての要員に要求しなければならない。
  - |-
    情報セキュリティの役割及び責任は、組織のニーズに従って定め、割り当てなければならない。相反する職務及び相反する責任範囲は、分離してはならない。
  - |-
    要員及び必要に応じてその他の利害関係者は、雇用、契約又は合意の変更又は終了時に、自らが所持する組織の資産の全てを返却しなければならない。
  answer: 3
  explanation: |-
    ③が誤り。相反する職務（職務分掌）は「分離してはならない」ではなく「分離しなければならない」が正しい（職務の分離が情報セキュリティ管理策の基本）。
- id: r7_2_setubi_q09_f
  number: 9-(カ)
  group: 問9
  points: 3
  text: |-
    サイバーセキュリティ対策技術について述べた次のA～Cの文章は正しいか。
    A：コンピュータウイルス対策ソフトウェアにおけるパターンマッチング法は、プログラムの実際の動作を観察して、ウイルスに特有の挙動を検出する方法であり、未知のウイルスを検知できる可能性がある。
    B：WAF（Web Application Firewall）は、HTTPなどを用いた通信の内容を分析し、SQLインジェクション、クロスサイトスクリプティングなどの攻撃を検知・防御するために用いられる。
    C：CAPTCHAは、ひずんだり重なったりして判別しにくい文字の画像を表示し、その画像から読み取った文字を入力させるなどの方法を用いて、システムに対する操作が人間によって行われたかどうかを判定する仕組み。
  options:
  - Aのみ正しい
  - Bのみ正しい
  - Cのみ正しい
  - A、Bが正しい
  - A、Cが正しい
  - B、Cが正しい
  - A、B、Cいずれも正しい
  - A、B、Cいずれも正しくない
  answer: 6
  explanation: |-
    BとCが正しい。Aが誤り：パターンマッチング法は既知のウイルスのパターン（シグネチャ）と比較して検出する手法。動作を観察して未知ウイルスを検知するのはビヘイビア法（ヒューリスティック法）。
- id: r7_2_setubi_q09_g
  number: 9-(キ)
  group: 問9
  points: 3
  text: サイバー攻撃の手法について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    ICMP Flood攻撃は、IPパケットの上限サイズを超える長大なICMPエコー要求メッセージを攻撃対象に送りつけることにより行われる。
  - |-
    SYN Flood攻撃は、TCPコネクションの確立時に行われるチャレンジレスポンスの仕組みを悪用している。
  - |-
    Smurf攻撃は、DNSの問合せに対して応答パケットを送り返す仕組みを悪用している。
  - |-
    従量課金制のクラウドサービスを利用しているユーザに経済的な損失を与えるために、クラウドのリソースを大量に消費させるようなリクエストを持続的に行う攻撃は、一般に、EDoS攻撃といわれる。
  answer: 4
  explanation: |-
    ④が正しい。EDoS（Economic Denial of Sustainability）攻撃：クラウドの課金コストを増大させることでユーザに経済的損害を与える攻撃。①はPing of Death。②SYN FloodはTCPの3ウェイハンドシェイクを悪用（チャレンジレスポンスではない）。③SmurfはICMPブロードキャストを悪用。
- id: r7_2_setubi_q09_h
  number: 9-(ク)
  group: 問9
  points: 3
  text: |-
    PKI（Public Key Infrastructure）について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    デジタル証明書の申請者は、デジタル証明書に対応する秘密鍵を漏洩しないように厳重に保管しておく必要がある。
  - |-
    認証局は、デジタル証明書の申請者の秘密鍵と申請者の情報に対しデジタル署名を行い、デジタル証明書を作成する。
  - |-
    秘密鍵の漏洩やデジタル証明書に記載された内容に変更があった場合、又はデジタル証明書の申請者から失効の申出があった場合は、認証局は該当するデジタル証明書を失効させる。
  - |-
    認証局がデジタル証明書の失効情報を利用者に知らせる手段として、証明書失効リストをリポジトリに格納して利用者に公開する方法がある。
  answer: 2
  explanation: |-
    ②が誤り。認証局（CA）はデジタル証明書の申請者の「公開鍵」と申請者の情報に対してデジタル署名を行う（秘密鍵ではない）。秘密鍵は申請者が保管する。
