- id: r7_2_setubi_q07_g
  number: 7-(キ)
  group: 問7
  points: 3
  text: |-
    故障に対応するためのシステム設計技術などについて述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    システムの故障発生を少なくして平均動作可能時間を長くするための信頼性設計技術には、使用部品数の低減、実績のある標準品の採用、システムの直列化、フォールトトレランスの導入などがある。
  - |-
    システムや装置を構成する部品の特性値の経時変化による故障には劣化故障があり、劣化故障を設計段階から予測するための具体的な手法として、モンテカルロ法などが用いられる。
  - |-
    FMEAは、システムや装置の故障原因として考えられる故障モードなどがシステム全体に及ぼす影響を予測し、システムに潜在する弱点を摘出するトップダウン的手法である。
  - |-
    FTAは、あらかじめ対象システムにとって望ましくない複数の事象を規定し、それを発生させ得る原因事象を洗い出してツリー状に展開する手法である。FTAは、一般に、シンプルなシステムや顕在化した不具合事象を解析するのに適している。
  answer: 2
  explanation: |-
    ②が正しい。劣化故障の予測にはモンテカルロ法が用いられる。①「システムの直列化」ではなく並列化・冗長化。③FMEAはボトムアップ的手法。④FTAは複雑なシステムの解析に適している。
- id: r7_2_setubi_q07_h
  number: 7-(ク)
  group: 問7
  points: 3
  text: |-
    電気通信事故等に係る電気通信事業法関係法令の適用に関するガイドライン（第7版）における、総務大臣への報告に関する影響利用者数及び継続時間の算定について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    影響利用者数の算定に当たっては、現実に役務の提供の停止又は品質の低下に該当した利用者のみを算定し、二重化、ルート分散等によりこれらに該当しなかった利用者は対象としない。
  - |-
    緊急通報を扱う音声伝送役務において、電気通信設備が完全に故障して通信が全くできなくなった場合の緊急通報に影響を与えた影響利用者数は、故障中に使用しなかった者も含めた、故障した設備配下の全利用者の数とする。
  - |-
    携帯電話等において、役務の提供の停止を受けた利用者の数の把握が困難であると総務大臣が認める場合の影響利用者数は、停止基地局の提供区域にいる利用者の数とする。
  - |-
    継続時間の算定に当たっては、品質の低下の状態が一時的に改善した時間帯は、事故の継続時間から除外する。
  answer: 4
  explanation: |-
    ④が誤り。品質低下の状態が一時的に改善した時間帯があっても、事故の継続時間から除外しない（一連の事故として継続時間を算定する）。
- id: r7_2_setubi_q07_i
  number: 7-(ケ)
  group: 問7
  points: 3
  text: |-
    装置の稼働状況：12回の故障、動作時間の合計3,000時間、故障による休止時間の合計300時間。稼働開始後100時間経過時点における信頼度（%）はいくらか。（e⁰·²＝1.22、e⁰·⁴＝1.49、e¹＝2.72、e²＝7.39を用いて整数に四捨五入）
  options:
  - '67'
  - '72'
  - '77'
  - '82'
  - '88'
  - '89'
  - '90'
  - '91'
  answer: 1
  explanation: |-
    MTBF = 3,000/12 = 250時間。故障率λ = 1/250 = 0.004/時間。信頼度R(100) = e^(-λt) = e^(-0.004×100) = e^(-0.4) = 1/e^0.4 = 1/1.49 ≈ 0.671 ≈ 67%。
- id: r7_2_setubi_q07_j
  number: 7-(コ)
  group: 問7
  points: 3
  text: 同じ稼働状況データから、この装置の固有アベイラビリティ（%）はいくらか。
  options:
  - '67'
  - '72'
  - '77'
  - '82'
  - '88'
  - '89'
  - '90'
  - '91'
  answer: 8
  explanation: |-
    MTBF = 3,000/12 = 250時間。MTTR = 300/12 = 25時間。固有アベイラビリティA = MTBF/(MTBF+MTTR) = 250/(250+25) = 250/275 ≈ 0.909 ≈ 91%。
