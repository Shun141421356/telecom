  points: 2
  text: |-
    LTE-Advanced ProにおけるIoT機器向けの端末カテゴリである（ウ）は、LTEバンド内でスマートフォンなどと共存した運用に加えて、LTEキャリアのガードバンドなどを利用した運用がサポートされている。（ウ）に入るものはどれか。
