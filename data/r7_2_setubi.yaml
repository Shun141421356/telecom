- id: r7_2_setubi_q01_a
  number: 1-(ア)
  group: 問1
  points: 2
  text: |-
    中継光伝送における再生中継と線形中継について、中継光伝送は、等化増幅、リタイミング及び（ア）を行う再生中継と、光信号の等化増幅のみを行う線形中継の二つの方式に大別される。（ア）に入るものはどれか。
  options:
  - 符号間干渉
  - 補間雑音
  - ジッタ
  - フィルタリング
  - 量子化雑音
  - 識別再生
  - リターンロス
  - キャリア再生
  - ASE雑音
  - 保留時間
  - マイクロベンディングロス
  - クロック生成
  answer: 6
  explanation: |-
    再生中継では等化増幅、リタイミング、識別再生（波形整形）を行い電気信号として再生する。
- id: r7_2_setubi_q01_b
  number: 1-(イ)
  group: 問1
  points: 2
  text: |-
    再生中継方式において、リタイミングによって抽出される出力波の位相のずれに起因する（イ）の増大などが生じ、伝送品質を劣化させる要因となる。（イ）に入るものはどれか。
  options:
  - 符号間干渉
  - 補間雑音
  - ジッタ
  - フィルタリング
  - 量子化雑音
  - 識別再生
  - リターンロス
  - キャリア再生
  - ASE雑音
  - 保留時間
  - マイクロベンディングロス
  - クロック生成
  answer: 3
  explanation: リタイミングによる位相ずれに起因するジッタの累積が再生中継方式の問題点の一つ。
- id: r7_2_setubi_q01_c
  number: 1-(ウ)
  group: 問1
  points: 2
  text: |-
    線形中継方式において、線形中継器での光信号増幅に伴い発生する（ウ）の累積により受信特性が悪くなる。（ウ）に入るものはどれか。
  options:
  - 符号間干渉
  - 補間雑音
  - ジッタ
  - フィルタリング
  - 量子化雑音
  - 識別再生
  - リターンロス
  - キャリア再生
  - ASE雑音
  - 保留時間
  - マイクロベンディングロス
  - クロック生成
  answer: 9
  explanation: |-
    線形中継（光増幅中継）では増幅時にASE（自然放出光増幅：Amplified Spontaneous Emission）雑音が発生し、累積することで受信特性が劣化する。
- id: r7_2_setubi_q01_d
  number: 1-(エ)
  group: 問1
  points: 3
  text: |-
    光ファイバ伝送システムに用いられているコヒーレント方式について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    コヒーレント方式では、送信側でレーザダイオードの出力光の位相を変化させて信号光を生成し、受信側で信号光とローカルレーザ光を干渉させて信号を検出している。
  - |-
    コヒーレント方式では、受信側で信号光に対してローカルレーザ光の周波数を高くすることで受信特性が改善される。
  - デジタルコヒーレント方式では、光の振幅と位相を利用した高次多値信号を伝送できる。
  - |-
    デジタルコヒーレント方式では、受信側でのデジタル信号処理により偏波多重信号の偏波分離、光ファイバ内で生じた波形ひずみの補償などが可能となる。
  answer: 2
  explanation: |-
    ②が誤り。コヒーレント方式ではローカルレーザ光の周波数を信号光と同じ（ホモダイン）か近い（ヘテロダイン）周波数にすることで検出感度を高める。高くすることで改善されるわけではない。
- id: r7_2_setubi_q01_e
  number: 1-(オ)
  group: 問1
  points: 3
  text: |-
    デジタル伝送で用いられる符号の種類と特徴について述べた次の文章のうち、正しいものはどれか。
  options:
  - |-
    AMI符号は、2進符号の1の入力に対してその出力極性を交互に反転する形式の符号で、3値符号を使用しているため2値符号より情報量が多い。
  - |-
    BnZS符号は、バイポーラ符号列中の0がn個連続するブロックを特殊なビットパターンに置換する符号。nを小さくするとゼロ符号連続が短くなり、置換出現頻度が低くなる。
  - |-
    CMI符号は、0の入力に対しては01を、1の入力に対しては00と11を交互に送出する符号。クロック周波数が情報伝送速度の2倍となり高い周波数成分が増加するため中継距離が短くなるおそれがある。
  - |-
    スクランブル符号は、シフトレジスタと排他的論理和回路によって生成され、生成された符号列のマーク率は原信号のマーク率のほぼ1/3倍となり、多数の0が連続する確率を小さくできる。
  answer: 3
  explanation: |-
    ③が正しい。CMI符号の特徴として、クロック周波数が2倍となり高い周波数成分が増加する点は正しい。①AMI符号は3値だが情報量は2値と同じ。②BnZSでnを小さくすると置換頻度は高くなる。④マーク率は約1/2になる。
- id: r7_2_setubi_q01_f
  number: 1-(カ)
  group: 問1
  points: 3
  text: ROADMシステムの特徴について述べた次の文章のうち、誤っているものはどれか。
  options:
  - |-
    ROADMシステムは、多数のROADMノードが光ファイバケーブルを用いてメッシュ状に接続され、運用支援システムが監視制御する構成を有している。
  - |-
    ROADMノードには光合分波器と光スイッチを組み合わせた構成のものがあり、入力されたWDM信号は光合分波器で波長別の光信号に分離される。
  - |-
    ROADMノードのドロップ側の光スイッチ部では、光信号をそのROADMノードでドロップするか次のROADMノードに転送するかを、波長ごとに制御している。
  - |-
    CDC-ROADM（Colorless,Directionless and Contentionless-ROADM）ノードでは、従来のAWGの代わりにWSSを用いることにより、光信号の経路設定における柔軟性を向上させている。
  answer: 1
  explanation: |-
    ②が誤り。ROADMノードのドロップ側（正しくは「アド/ドロップ」）の光スイッチで波長ごとに制御するのは正しいが、選択肢②の「光合分波器でWDM信号を波長別に分離する」という記述では、WSSを使うCDC-ROADMの説明と混同している。従来型ROADMの説明として不正確。
